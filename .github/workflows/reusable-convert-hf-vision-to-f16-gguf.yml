# This workflow converts HF LLaVA (vision) models to GGUF format using a multi-job structure:
# - Job 1: Detects Granite version and sets up shared variables
# - Job 2: Converts Granite 3 models using llava surgery tooling
# - Job 3: Converts Granite 4+ models using convert_hf_to_gguf.py with --mmproj flag

name: convert-hf-vision-to-f16-gguf-reusable

on:
  workflow_call:
    secrets:
      hf_token:
        required: true
      ibm_granite_token:
        required: true
    inputs:
      enable_vision_jobs:
        type: boolean
        required: false
        default: false
      repo_id:
        type: string
        required: true
      hf_collection_config:
        type: string
        required: true
      target_repo_owner:
        type: string
        required: true
      target_repo_name_ext:
        type: string
        required: true
      transformers_version:
        type: string
        required: false
        default: "4.52.1"
        description: "HuggingFace Transformers version to install (e.g., '4.52.1' or '4.57.3'). Defaults to 4.52.1 for Granite 3.x models."
      debug:
        type: boolean
        required: true
        default: false
      trace:
        type: boolean
        required: true
        default: false

env:
  DEF_SEP: "-"
  DEF_PRECISION: "bf16"
  DEF_MMPROJ_PRECISION: "f16"
  EXT_GGUF: .gguf
  EXT_NAME_F16: "-f16.gguf"
  EXT_NAME_BF16: "-bf16.gguf"
  F16_MMPROJ_MODEL_BASE_FILENAME: mmproj-model
  FIND_ARGS: "-not -path '*/.*' -print | sed -e 's;[^/]*/;|___;g;s;___|; |;g'"
  LLAMACPP_DIR: llama.cpp
  MODEL_DOWNLOAD_DIR: models
  LLAVA_PROJECTOR_KEYS_FILE: projector_keys.txt
  HF_HUB_DISABLE_XET: 1
  HF_HUB_ENABLE_HF_TRANSFER: 0
  HF_TRANSFORMERS_LLAVA_NEXT_INIT_CHANGE: "4.52.1"
  LLAMA_CPP_VERSION: b7951

jobs:
  # ===========================================================================
  # Job 1: Detect Granite version and setup shared variables
  # ===========================================================================
  detect-and-setup:
    runs-on: ubuntu-latest
    if: ${{ inputs.enable_vision_jobs == true }}
    timeout-minutes: 5
    outputs:
      use_convert_script_with_mmproj: ${{ steps.detect.outputs.use_convert_script_with_mmproj }}
      repo_org: ${{ steps.setup.outputs.repo_org }}
      repo_name: ${{ steps.setup.outputs.repo_name }}
      target_repo_id: ${{ steps.setup.outputs.target_repo_id }}
      local_model_path: ${{ steps.setup.outputs.local_model_path }}
      base_fname_bf16_gguf: ${{ steps.setup.outputs.base_fname_bf16_gguf }}
      base_fname_mmproj_f16_gguf: ${{ steps.setup.outputs.base_fname_mmproj_f16_gguf }}
      visual_encoder_path: ${{ steps.setup.outputs.visual_encoder_path }}
    steps:
      - name: Dump GitHub inputs
        if: ${{ inputs.debug }}
        env:
          GITHUB_INPUTS: ${{ toJson(inputs) }}
        run: echo "$GITHUB_INPUTS"

      - name: detect-granite-version
        id: detect
        run: |
          REPO_NAME=$(basename '${{ inputs.repo_id }}')
          echo "REPO_NAME: $REPO_NAME"

          # Granite 4+ vision models use convert_hf_to_gguf.py with --mmproj flag
          # Granite 3 and earlier use llava_surgery_v2.py for tensor separation
          if [[ "$REPO_NAME" =~ granite-([4-9]|[1-9][0-9]+)\. ]]; then
            echo "use_convert_script_with_mmproj=true" >> $GITHUB_OUTPUT
            echo "Detected Granite 4+ vision model: will use convert_hf_to_gguf.py with --mmproj"
          else
            echo "use_convert_script_with_mmproj=false" >> $GITHUB_OUTPUT
            echo "Detected Granite 3 or earlier: will use llava_surgery_v2.py tooling"
          fi

      - name: setup-shared-variables
        id: setup
        run: |
          REPO_ORG=$(dirname '${{ inputs.repo_id }}')
          REPO_NAME=$(basename '${{ inputs.repo_id }}')

          echo "repo_org=$REPO_ORG" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "target_repo_id=${{inputs.target_repo_owner}}/${REPO_NAME}${{inputs.target_repo_name_ext}}" >> $GITHUB_OUTPUT
          echo "local_model_path=${{ env.MODEL_DOWNLOAD_DIR }}/${{ inputs.repo_id }}" >> $GITHUB_OUTPUT
          echo "base_fname_bf16_gguf=${REPO_NAME}${{env.EXT_NAME_BF16}}" >> $GITHUB_OUTPUT
          echo "base_fname_mmproj_f16_gguf=${{ env.F16_MMPROJ_MODEL_BASE_FILENAME }}${{env.EXT_NAME_F16}}" >> $GITHUB_OUTPUT
          echo "visual_encoder_path=visual_encoder" >> $GITHUB_OUTPUT

      - name: verify-outputs
        run: |
          echo "use_convert_script_with_mmproj: ${{ steps.detect.outputs.use_convert_script_with_mmproj }}"
          echo "repo_org: ${{ steps.setup.outputs.repo_org }}"
          echo "repo_name: ${{ steps.setup.outputs.repo_name }}"
          echo "target_repo_id: ${{ steps.setup.outputs.target_repo_id }}"
          echo "local_model_path: ${{ steps.setup.outputs.local_model_path }}"
          echo "base_fname_bf16_gguf: ${{ steps.setup.outputs.base_fname_bf16_gguf }}"
          echo "base_fname_mmproj_f16_gguf: ${{ steps.setup.outputs.base_fname_mmproj_f16_gguf }}"
          echo "visual_encoder_path: ${{ steps.setup.outputs.visual_encoder_path }}"

  # ===========================================================================
  # Job 2: Convert Granite 3 vision models (llava surgery path)
  # ===========================================================================
  convert-granite3-vision:
    needs: detect-and-setup
    if: ${{ needs.detect-and-setup.outputs.use_convert_script_with_mmproj == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            requirements.txt
            scripts/hf_model_download_snapshot.py
            scripts/torch_llava_validate_tensors.py
            scripts/torch_llava_save_llm.py
            scripts/hf_model_upload.py
            scripts/get_vision_config_path.py
            resources/json/
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: shallow-clone-llamacpp
        uses: actions/checkout@v6
        with:
          path: ${{ env.LLAMACPP_DIR }}
          repository: 'ggerganov/llama.cpp'
          ref: ${{env.LLAMA_CPP_VERSION}}
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            convert_hf_to_gguf.py
            convert_lora_to_gguf.py
            requirements/requirements-convert_hf_to_gguf.txt
            requirements/requirements-convert_lora_to_gguf.txt
            requirements/requirements-convert_legacy_llama.txt
            gguf-py
            tools/mtmd/requirements.txt
            tools/mtmd/legacy-models

      - name: print-llamacpp-clone
        run: |
          echo "PATH: '$PATH'"
          ls -al llama.cpp
          find llama.cpp ${{env.FIND_ARGS}}

      - name: install-dependencies
        run: |
          python -m pip install -r ./requirements.txt
          python -m pip install -r ./llama.cpp/requirements/requirements-convert_hf_to_gguf.txt
          python -m pip install -r ./llama.cpp/tools/mtmd/requirements.txt
          pip uninstall --yes transformers
          pip install transformers==${{ inputs.transformers_version }}
          echo "✅ Installed transformers version: ${{ inputs.transformers_version }}"

      - name: download-model-snapshot
        run: |
          python ./scripts/hf_model_download_snapshot.py ${{ env.MODEL_DOWNLOAD_DIR }} ${{ needs.detect-and-setup.outputs.repo_org }} ${{ needs.detect-and-setup.outputs.repo_name }} ${{secrets.ibm_granite_token}}

      - name: print-model-snapshot
        run: |
          find models ${{env.FIND_ARGS}}

      - name: separate-clip-and-projector-tensors
        run: |
          echo "Separating CLIP and projector tensors..."
          python ./llama.cpp/tools/mtmd/legacy-models/llava_surgery_v2.py -C -m ${{ needs.detect-and-setup.outputs.local_model_path }}
          ls -al ${{ needs.detect-and-setup.outputs.local_model_path }}

      - name: validate-clip-and-projector-tensors
        run: |
          python ./scripts/torch_llava_validate_tensors.py ${{ needs.detect-and-setup.outputs.local_model_path }}/llava.clip ${{ needs.detect-and-setup.outputs.local_model_path }}/llava.projector ${{ env.LLAVA_PROJECTOR_KEYS_FILE }}
          cat ${{ env.LLAVA_PROJECTOR_KEYS_FILE }}

      - name: get-vision-config-path
        run: |
          VISION_CONFIG=$(python ./scripts/get_vision_config_path.py resources/json/latest/hf_collection_mapping_gguf.json ${{ inputs.repo_id }})
          echo "VISION_CONFIG=$VISION_CONFIG" >> $GITHUB_ENV
          if [ -n "$VISION_CONFIG" ]; then
            echo "✅ Using vision_config: $VISION_CONFIG"
          else
            echo "⚠️ No vision_config found in collection mapping"
          fi

      # Note that currently you cannot quantize the visual encoder because granite
      # vision models use SigLIP as the visual encoder, which has tensor dimensions
      # that are not divisible by 32.
      - name: convert-image-encoder-to-gguf
        run: |
          mkdir ${{ needs.detect-and-setup.outputs.visual_encoder_path }}
          cp ${{ needs.detect-and-setup.outputs.local_model_path }}/llava.projector ${{ needs.detect-and-setup.outputs.visual_encoder_path }}/llava.projector
          cp ${{ needs.detect-and-setup.outputs.local_model_path }}/llava.clip ${{ needs.detect-and-setup.outputs.visual_encoder_path }}/pytorch_model.bin

          # Copy vision config if specified
          if [ -n "$VISION_CONFIG" ]; then
            if [ -f "./$VISION_CONFIG" ]; then
              cp ./$VISION_CONFIG ${{ needs.detect-and-setup.outputs.visual_encoder_path }}/config.json
              echo "✅ Successfully copied vision config: $VISION_CONFIG"
            else
              echo "❌ Error: vision_config specified but file not found: $VISION_CONFIG"
              exit 1
            fi
          else
            echo "⚠️ Warning: No vision_config specified in collection mapping"
            echo "⚠️ Skipping convert_image_encoder_to_gguf.py step"
            exit 0
          fi
          # Run the conversion
          python ./llama.cpp/tools/mtmd/legacy-models/convert_image_encoder_to_gguf.py \
            -m ${{ needs.detect-and-setup.outputs.visual_encoder_path }} \
            --llava-projector ${{ needs.detect-and-setup.outputs.visual_encoder_path }}/llava.projector \
            --output-dir ${{ needs.detect-and-setup.outputs.visual_encoder_path }} \
            --clip-model-is-vision \
            --clip-model-is-siglip \
            --image-mean 0.5 0.5 0.5 --image-std 0.5 0.5 0.5
          ls -al ${{ needs.detect-and-setup.outputs.visual_encoder_path }}

      - name: upload-mmproj-f16-gguf-to-target-repo
        run: |
          python ./scripts/hf_model_upload.py ${{ needs.detect-and-setup.outputs.target_repo_id }} ${{ needs.detect-and-setup.outputs.visual_encoder_path }}/mmproj-model-f16.gguf ${{secrets.hf_token}} ${{github.workflow_ref}} ${{github.run_id}}

      - name: separate-llm-from-vision-model
        run: |
          python ./scripts/torch_llava_save_llm.py ${{ needs.detect-and-setup.outputs.local_model_path }} $PWD/granite_vision_llm
          ls -al $PWD/granite_vision_llm

      - name: fix-granite-architecture-in-config
        run: |
          CONFIG_FILE="$PWD/granite_vision_llm/config.json"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "Config file not found: $CONFIG_FILE"
            exit 0
          fi

          echo "Checking architecture in config.json..."
          ARCHITECTURE=$(GREP_COLORS='' grep --color=never -A 1 '"architectures"' "$CONFIG_FILE" | grep --color=never -o '"[^"]*"' | tail -1 | tr -d '"' | sed $'s/\x1b\\[[0-9;]*m//g' | sed $'s/\x1b\\[K//g')

          if [ "$ARCHITECTURE" = "GraniteModel" ]; then
            echo "✏️ Fixing architecture from 'GraniteModel' to 'GraniteForCausalLM'..."
            sed -i 's/"GraniteModel"/"GraniteForCausalLM"/g' "$CONFIG_FILE"
            echo "✅ Updated config.json:"
            cat "$CONFIG_FILE"
          else
            echo "✅ Architecture is already correct: $ARCHITECTURE"
          fi

      - name: convert-vision-model-llm-to-gguf-bf16
        run: |
          python ./llama.cpp/convert_hf_to_gguf.py $PWD/granite_vision_llm \
            --outfile ${{ needs.detect-and-setup.outputs.base_fname_bf16_gguf }} \
            --outtype ${{env.DEF_PRECISION}} \
            --verbose
          ls -al *.gguf

      - name: upload-vision-llm-bf16-gguf-to-target-repo
        run: |
          python ./scripts/hf_model_upload.py ${{ needs.detect-and-setup.outputs.target_repo_id }} ${{ needs.detect-and-setup.outputs.base_fname_bf16_gguf }} ${{secrets.hf_token}} ${{github.workflow_ref}} ${{github.run_id}}

  # ===========================================================================
  # Job 3: Convert Granite 4+ vision models (direct conversion with --mmproj)
  # ===========================================================================
  convert-granite4-vision:
    needs: detect-and-setup
    if: ${{ needs.detect-and-setup.outputs.use_convert_script_with_mmproj == 'true' }}
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            requirements.txt
            scripts/hf_model_download_snapshot.py
            scripts/hf_model_upload.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: shallow-clone-llamacpp
        uses: actions/checkout@v6
        with:
          path: ${{ env.LLAMACPP_DIR }}
          repository: 'ggerganov/llama.cpp'
          ref: ${{env.LLAMA_CPP_VERSION}}
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            convert_hf_to_gguf.py
            requirements/requirements-convert_hf_to_gguf.txt
            requirements/requirements-convert_legacy_llama.txt
            gguf-py/gguf
            scripts

      - name: install-dependencies
        run: |
          python -m pip install -r ./requirements.txt
          python -m pip install -r ./llama.cpp/requirements/requirements-convert_hf_to_gguf.txt
          pip uninstall --yes transformers
          pip install transformers==${{ inputs.transformers_version }}
          echo "✅ Installed transformers version: ${{ inputs.transformers_version }}"

      - name: download-model-snapshot
        run: |
          python ./scripts/hf_model_download_snapshot.py ${{ env.MODEL_DOWNLOAD_DIR }} ${{ needs.detect-and-setup.outputs.repo_org }} ${{ needs.detect-and-setup.outputs.repo_name }} ${{secrets.ibm_granite_token}}

      - name: convert-mmproj-with-convert-script
        run: |
          echo "DEF_MMPROJ_PRECISION=${{env.DEF_MMPROJ_PRECISION}}"
          echo "local_model_path=${{ needs.detect-and-setup.outputs.local_model_path }}"
          echo "visual_encoder_path=${{ needs.detect-and-setup.outputs.visual_encoder_path }}"
          mkdir -p ${{ needs.detect-and-setup.outputs.visual_encoder_path }}
          python ./llama.cpp/convert_hf_to_gguf.py ${{ needs.detect-and-setup.outputs.local_model_path }} \
            --outfile ${{ needs.detect-and-setup.outputs.visual_encoder_path }}/mmproj-model-f16.gguf \
            --outtype ${{env.DEF_MMPROJ_PRECISION}} \
            --mmproj \
            --verbose
          ls -al ${{ needs.detect-and-setup.outputs.visual_encoder_path }}

      - name: upload-mmproj-f16-gguf-to-target-repo
        run: |
          python ./scripts/hf_model_upload.py ${{ needs.detect-and-setup.outputs.target_repo_id }} ${{ needs.detect-and-setup.outputs.visual_encoder_path }}/mmproj-model-f16.gguf ${{secrets.hf_token}} ${{github.workflow_ref}} ${{github.run_id}}

      - name: convert-vision-model-llm-to-gguf-bf16
        run: |
          echo "DEF_PRECISION=${{env.DEF_PRECISION}}"
          echo "local_model_path=${{ needs.detect-and-setup.outputs.local_model_path }}"
          echo "base_fname_bf16_gguf=${{ needs.detect-and-setup.outputs.base_fname_bf16_gguf }}"
          python ./llama.cpp/convert_hf_to_gguf.py ${{ needs.detect-and-setup.outputs.local_model_path }} \
            --outfile ${{ needs.detect-and-setup.outputs.base_fname_bf16_gguf }} \
            --outtype ${{env.DEF_PRECISION}} \
            --verbose
          ls -al *.gguf

      - name: upload-vision-llm-bf16-gguf-to-target-repo
        run: |
          python ./scripts/hf_model_upload.py ${{ needs.detect-and-setup.outputs.target_repo_id }} ${{ needs.detect-and-setup.outputs.base_fname_bf16_gguf }} ${{secrets.hf_token}} ${{github.workflow_ref}} ${{github.run_id}}

