# This workflow pulls quantized models from HF and pushes them to IBM datastores.
# Currently the workflow is designed to push the model up to Data Model Factory using the dmf cli.
name: push-models-to-dmf

on:
  workflow_dispatch:
    inputs:
      enable_dmf_push:
        type: boolean
        required: false
        default: false
        description: 'Enable dmf push job'
      repo_id:
        type: string
        required: true
        description: 'HuggingFace repository ID (e.g., ibm-granite/granite-3.0-2b-instruct)'
      quantization:
        type: string
        required: true
        description: 'Quantization type (e.g., Q4_K_M)'
      model_size:
        type: string
        required: true
        description: 'Model size (e.g.,1b, 3b, 13b, 20b)'
      target_repo_owner:
        type: string
        required: true
        description: 'Target repository owner'
      target_repo_name_ext:
        type: string
        required: false
        description: 'Target repository name extension'
      served_model_name:
        type: string
        required: true
        description: 'Custom model name for hosting (e.g., ibm-granite/granite-3.0-2b-instruct-v1)'
      ext_log:
        type: string
        required: false
        default: '.log.txt'
        description: 'Log file extension'
      ext_response:
        type: string
        required: false
        default: '.response.txt'
        description: 'Response file extension'
      debug:
        type: boolean
        required: false
        default: false
        description: 'Enable debug mode'
      trace:
        type: boolean
        required: false
        default: false
        description: 'Enable trace mode'
      is_split_gguf:
        type: boolean
        required: false
        default: false
        description: 'Enable split GGUF file download (for multi-part files like *-00001-of-00005.gguf)'
  workflow_call:
    secrets:
      hf_token:
        required: true
      IBM_DMF_TOKEN:
        required: true
      ARTIFACTORY_USER:
        required: true
      ARTIFACTORY_API_KEY:
        required: true
    inputs:
      enable_dmf_push:
        type: boolean
        required: false
        default: false
      repo_id:
        type: string
        required: true
      quantization:
        type: string
        required: true
      model_size:
        type: string
        required: true
      target_repo_owner:
        type: string
        required: true
      target_repo_name_ext:
        type: string
        required: true
      ext_log:
        type: string
        required: false
        default: '.log.txt'
      ext_response:
        type: string
        required: false
        default: '.response.txt'
      debug:
        type: boolean
        required: false
        default: false
      trace:
        type: boolean
        required: false
        default: false
      is_split_gguf:
        type: boolean
        required: false
        default: false

# See: https://github.com/ggerganov/llama.cpp/blob/master/examples/server/tests/unit/test_completion.py
env:
  DEBUG: ${{inputs.debug}}
  # FIND_ARGS: "-not -path '*/.*' -print | sed -e 's;[^/]*/;|___;g;s;___|; |;g'"
  EXT_GGUF: .gguf
  # LLAMA_REQUEST_SEED: 647063347
  # LLAMA_REQUEST_PROMPT: "What is the professional answer to \"Why is the sky blue?\""
  LLAMA_SYSTEM_PROMPT: "You are a helpful assistant. Please ensure responses are professional, accurate, and safe."
  LLAMA_REQUEST_PROMPT: "Why is the sky blue according to science?"
  LLAMA_REQUEST_N_PREDICT: 128
  LLAMA_CLI_TOOL: llama-cli
  LLAMA_CLI_TEMP: 0.8
  # LLAMA_RUN_BIN: ./bin/llama-run
  # LLAMA_RUN_FLAGS: "-v -n 9"
  LLAMA_RESPONSE_WORDS:  "Rayleigh,scatter,atmosphere"
  LLAMA_SERVER_HOST: localhost
  LLAMA_SERVER_PORT: 8080
  LLAMACPP_DIR: llama.cpp
  MODEL_DOWNLOAD_DIR: models
  QUANTIZED_MODEL_EXISTS: false
  TEST_LLAMA_SERVER: false
  TEST_LLAMA_CLI: false
  TEST_LLAMA_RUN: false
  GH_ARTIFACT_RETENTION: 2

jobs:
  push-quantized-model-to-dmf:
    runs-on: macos-latest # should be faster to provision mac runtime then ubuntu runtime
    if: ${{ inputs.enable_dmf_push == true }}
    env:
      HF_HUB_DISABLE_XET: 1
      HF_HUB_ENABLE_HF_TRANSFER: 0
    steps:
    - uses: actions/checkout@v6
    - name: confirm-environment
      run: |
        echo "[INFO] github.env:"
        echo "[INFO] >> run_id: '${{ github.run_id }}'"
        echo "[INFO] >> ref: '${{ github.ref }}', ref_name: '${{ github.ref_name }}', ref_type: '${{ github.ref_type }}'"
        echo "[INFO] >> workflow_ref: '${{ github.workflow_ref }}'"
        echo "[INFO] >> event_type: '${{ github.event_type }}'"
        echo "[INFO] >> event.: action: '${{ github.event.action }}'"
        echo "[INFO] >> event.: base_ref: '${{ github.event.base_ref }}'"
        echo "[INFO] >> event.: workflow_run.conclusion: '${{ github.event.workflow_run.conclusion }}'"
        echo "[INFO] >> event.release.: name: '${{ github.event.release.name }}', tag_name: '${{ github.event.release.tag_name }}'"

    - name: Dump GitHub context
      env:
        GH_CONTEXT: ${{ toJson(github) }}
      run: echo "$GH_CONTEXT"

    - name: Dump GitHub inputs
      env:
        GITHUB_INPUTS: ${{ toJson(inputs) }}
      run: echo "$GITHUB_INPUTS"

    # - name: List all environment variables
    #   if: ${{ github.event.inputs.debug }}
    #   run: env | sort

    # Note: at the current time, we cannot use Python versions > 3.11 due to HF and langchain deps.
    # Note: you can verify in a step using: run: python -c "import sys; print(sys.version)"
    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # primarily huggingface_hub
    - name: install-dependencies
      run: |
        python -m pip install -r ./requirements.txt
        pip list

    # Use this step to set values to the github context (shared across jobs/steps)
    # Note: using $GITHUB_OUTPUT sets values under the current step's namespace
    # whereas using $GITHUB_ENV sets values in the job's underlying environment.
    # Note: for each 'repo_id' we parse out e.g., REPO_ORG=ibm-granite REPO_NAME=granite-3.0-2b-instruct
    - name: set-github-env
      id: set_github_env
      run: |
        echo "REPO_ORG=$(dirname '${{ inputs.repo_id }}')" >> $GITHUB_ENV
        echo "REPO_NAME=$(basename '${{ inputs.repo_id }}')" >> $GITHUB_ENV

    - name: set-derivative-env-vars-1
      run: |
        echo "TARGET_REPO_ID=${{inputs.target_repo_owner}}/${{env.REPO_NAME}}${{inputs.target_repo_name_ext}}" >> $GITHUB_ENV
        echo "BASE_FNAME_QUANTIZED_GGUF=${{ env.REPO_NAME }}-${{inputs.quantization}}${{env.EXT_GGUF}}" >> $GITHUB_ENV
        echo "BASE_FNAME_LOG_FILE=${{env.REPO_NAME}}-${{inputs.quantization}}-${{env.LLAMA_CLI_TOOL}}${{inputs.ext_log}}" >> $GITHUB_ENV
        echo "BASE_FNAME_RESPONSE_FILE=${{env.REPO_NAME}}-${{inputs.quantization}}-${{env.LLAMA_CLI_TOOL}}${{inputs.ext_response}}" >> $GITHUB_ENV
        # For split GGUF files, set the base pattern (without .gguf extension and without part numbers)
        echo "SPLIT_GGUF_BASE_PATTERN=${{ env.REPO_NAME }}-${{inputs.quantization}}" >> $GITHUB_ENV
        # DMF derives the model label as {type}-{size}-{variant}; the follow-up push-files calls need this.
        echo "DMF_MODEL_LABEL=granite-${{ inputs.model_size }}-${{ inputs.quantization }}" >> $GITHUB_ENV

    - name: set-derivative-env-vars-2
      run: |
        echo "LOCAL_MODEL_PATH=${{env.MODEL_DOWNLOAD_DIR}}/${{ env.TARGET_REPO_ID }}" >> $GITHUB_ENV

    - name: set-derivative-env-vars-3
      run: |
        echo "LOCAL_FNAME_QUANTIZED_GGUF=${{env.LOCAL_MODEL_PATH}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}" >> $GITHUB_ENV

    - name: verify-github-env
      run: |
        echo "================== Derivative Environment Variables 1 =================="
        echo "TARGET_REPO_ID='$TARGET_REPO_ID' (${{ env.TARGET_REPO_ID }})"
        echo "BASE_FNAME_QUANTIZED_GGUF='$BASE_FNAME_QUANTIZED_GGUF' (${{ env.BASE_FNAME_QUANTIZED_GGUF }})"
        echo "BASE_FNAME_LOG_FILE='$BASE_FNAME_LOG_FILE' (${{ env.BASE_FNAME_LOG_FILE }})"
        echo "BASE_FNAME_RESPONSE_FILE='$BASE_FNAME_RESPONSE_FILE' (${{ env.BASE_FNAME_RESPONSE_FILE }})"
        echo "================== Derivative Environment Variables 2 =================="
        echo "LOCAL_MODEL_PATH='$LOCAL_MODEL_PATH' (${{ env.LOCAL_MODEL_PATH }})"
        echo "================== Derivative Environment Variables 3 =================="
        echo "LOCAL_FNAME_QUANTIZED_GGUF='$LOCAL_FNAME_QUANTIZED_GGUF' (${{ env.LOCAL_FNAME_QUANTIZED_GGUF }})"

    - name: install-dmf-library
      run: |
        echo "[INFO] Installing dmf-lib from Artifactory..."
        pip install "dmf-lib==1.10.2" \
          --index-url https://${{ secrets.ARTIFACTORY_USER }}:${{ secrets.ARTIFACTORY_API_KEY }}@na.artifactory.swg-devops.com/artifactory/api/pypi/res-data-model-factory-team-pypi-local/simple \
          --extra-index-url https://pypi.org/simple \
          --trusted-host na.artifactory.swg-devops.com
        echo "[INFO] Verifying dmf-lib installation..."
        pip show dmf-lib

    - name: test-quantized-model-exists
      run: |
        if [[ "${{ inputs.is_split_gguf }}" == "true" ]]; then
          echo "Checking for split GGUF files with pattern: ${{ env.SPLIT_GGUF_BASE_PATTERN }}-*-of-*.gguf"
          # For split files, we'll check if any files matching the pattern exist
          # The actual download script will handle finding all parts
          echo "Split GGUF mode enabled - will download all matching parts"
          echo "QUANTIZED_MODEL_EXISTS=true" >> $GITHUB_ENV
        else
          exists=$(python ./scripts/hf_model_file_exists.py ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_QUANTIZED_GGUF }} ${{secrets.hf_token}})
          echo "exists: '$exists'"
          if [[ "$exists" == "False" ]]; then
            echo "FAILURE: model file: '${{env.TARGET_REPO_ID}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}' does not exist."
            exit 2
          else
            echo "SUCCESS: model file: '${{env.TARGET_REPO_ID}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}' exists."
            echo setting environment variable: QUANTIZED_MODEL_EXISTS='true'...
            echo "QUANTIZED_MODEL_EXISTS=true" >> $GITHUB_ENV
          fi
        fi

    - name: download-quantized-gguf-from-huggingface
      if: env.QUANTIZED_MODEL_EXISTS == 'true' && inputs.is_split_gguf == false
      run: |
        echo "Downloading single GGUF file to: ${{env.LOCAL_FNAME_QUANTIZED_GGUF}}..."
        echo "--------------------"
        python ./scripts/hf_file_download.py ${{ env.MODEL_DOWNLOAD_DIR}} ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_QUANTIZED_GGUF }} ${{secrets.hf_token}}
        ls -al ${{env.MODEL_DOWNLOAD_DIR}}/${{ env.TARGET_REPO_ID }}/*${{env.EXT_GGUF}}

    - name: push-model-to-dmf
      if: env.QUANTIZED_MODEL_EXISTS == 'true' && inputs.is_split_gguf == false
      env:
        DMF_TOKEN: ${{ secrets.IBM_DMF_TOKEN }}
      run: |
        echo "[INFO] Pushing model to Data Model Factory..."
        echo "[INFO] Model path: ${{env.LOCAL_MODEL_PATH}}"
        echo "[INFO] Target repo: ${{env.TARGET_REPO_ID}}"
        echo "[INFO] Using DMF namespace: granite_gguf"
        echo "[INFO] Using DMF table: model"

        DMF_COMMENTS='{"stack":"","instance_profile":"","served_model_name":"${{env.TARGET_REPO_ID}}/*${{env.EXT_GGUF}}","metadata":[{"supplemental_arguments":[]}]}'

        cat > lh-conf.yaml <<EOF
        lakehouse:
          environment: PROD
          token: ${DMF_TOKEN}
        EOF

        echo "[INFO] Verifying local model directory contents..."
        ls -al "${{ env.LOCAL_MODEL_PATH }}"

        dmf model push \
          -n granite_gguf \
          -t model \
          --dir "${{ env.LOCAL_MODEL_PATH }}" \
          --base-model "${{ env.REPO_NAME }}" \
          --type granite \
          --size "${{ inputs.model_size }}" \
          --variant "${{ inputs.quantization }}" \
          --comments "$DMF_COMMENTS"

    # For split GGUF files, the runner does not have enough disk to hold every shard
    # at once. We list shards up front, then loop: download one shard, push it to DMF
    # (the first shard creates the model+revision via `dmf model push`; subsequent
    # shards append into the same revision via `dmf model push-files`), then delete
    # the local file before fetching the next shard.
    - name: download-and-push-split-gguf-shards
      if: env.QUANTIZED_MODEL_EXISTS == 'true' && inputs.is_split_gguf == true
      env:
        DMF_TOKEN: ${{ secrets.IBM_DMF_TOKEN }}
        REVISION: ${{ github.run_id }}
      run: |
        set -euo pipefail

        SHARDS_FILE="split-shards.txt"

        echo "[INFO] Listing split shards for pattern: ${SPLIT_GGUF_BASE_PATTERN}"
        python ./scripts/hf_split_file_download.py \
          "${TARGET_REPO_ID}" "${SPLIT_GGUF_BASE_PATTERN}" "${{ secrets.hf_token }}" \
          "${SHARDS_FILE}"

        if [[ ! -s "${SHARDS_FILE}" ]]; then
          echo "[ERROR] Shard manifest ${SHARDS_FILE} is missing or empty"
          exit 2
        fi

        TOTAL=$(grep -c . "${SHARDS_FILE}" || true)
        echo "[INFO] Found ${TOTAL} shards. Revision='${REVISION}', label='${DMF_MODEL_LABEL}'"
        sed 's/^/  - /' "${SHARDS_FILE}"

        DMF_COMMENTS='{"stack":"","instance_profile":"","served_model_name":"'"${TARGET_REPO_ID}"'/*'"${EXT_GGUF}"'","metadata":[{"supplemental_arguments":[]}]}'

        cat > lh-conf.yaml <<EOF
        lakehouse:
          environment: PROD
          token: ${DMF_TOKEN}
        EOF

        mkdir -p "${LOCAL_MODEL_PATH}"

        i=0
        while IFS= read -r SHARD || [[ -n "${SHARD}" ]]; do
          # Skip blank lines defensively.
          [[ -z "${SHARD}" ]] && continue
          i=$((i+1))

          echo "==================================================="
          echo "[INFO] Shard ${i}/${TOTAL}: ${SHARD}"
          echo "==================================================="

          # Defensive: ensure --dir has only the next shard's *.gguf at push-files time.
          find "${LOCAL_MODEL_PATH}" -maxdepth 1 -type f -name "*${EXT_GGUF}" -delete || true

          python ./scripts/hf_file_download.py \
            "${MODEL_DOWNLOAD_DIR}" "${TARGET_REPO_ID}" "${SHARD}" "${{ secrets.hf_token }}"

          ls -al "${LOCAL_MODEL_PATH}"
          df -h .

          if [[ ${i} -eq 1 ]]; then
            echo "[INFO] First shard: dmf model push (creates model + revision)"
            dmf model push \
              -n granite_gguf \
              -t model \
              --dir "${LOCAL_MODEL_PATH}" \
              --base-model "${REPO_NAME}" \
              --type granite \
              --size "${{ inputs.model_size }}" \
              --variant "${{ inputs.quantization }}" \
              --revision "${REVISION}" \
              --comments "${DMF_COMMENTS}"
          else
            echo "[INFO] Subsequent shard: dmf model push-files (appends to revision)"
            dmf model push-files "${DMF_MODEL_LABEL}" \
              --revision "${REVISION}" \
              -n granite_gguf \
              -t model \
              --dir "${LOCAL_MODEL_PATH}"
          fi

          echo "[INFO] Cleaning up shard ${SHARD}"
          rm -f "${LOCAL_MODEL_PATH}/${SHARD}"
          df -h .
        done < "${SHARDS_FILE}"

        echo "[INFO] All ${TOTAL} shards downloaded, pushed, and cleaned up."