name: granite-3.1-tagged-test-release
run-name: "[TEST] Granite 3.1 - CI/CD quantized GGUF models [${{github.ref_type}}: ${{github.ref_name}}]"

on:
  push:
    tags:
      - "test-v3.1*"
  workflow_dispatch:

permissions:
 contents: read
 packages: read

env:
  DEBUG: true
  TRACE: false
  ENABLE_LANGUAGE_JOBS: false
  ENABLE_GUARDIAN_JOBS: true

  # Enable appending the converted format (BF16/F16) to BVT test matrix
  ENABLE_BVT_TEST_CONVERTED_FORMAT: true

  TARGET_HF_REPO_NAME_EXT: -GGUF
  TARGET_HF_REPO_OWNER: mrutkows
  TARGET_HF_REPO_PRIVATE: false
  COLLECTION_CONFIG: "resources/json/latest/hf_collection_mapping_gguf.json"

  DEFAULT_ARTIFACTS_DIR: 'artifacts'
  ARTIFACT_LOGS_NAME: 'bvt-logs'
  ARTIFACT_RESPONSES_NAME: 'bvt-responses'
  EXT_LOG: '.log.txt'
  EXT_RESPONSE: '.response.txt'

  # HuggingFace Transformers versions
  # V4.52.1 is the last well-tested version we know the CI can support for Granite 3.1
  TRANSFORMERS_VERSION_LANGUAGE: "4.52.1"
  TRANSFORMERS_VERSION_GUARDIAN: "4.52.1"

  # llama.cpp build tags per model type - determines which binary tools to use from ./bin subdirectory
  # Available tags: b6569, b6808, b8100 (corresponds to llama.cpp release tags)
  LLAMACPP_BUILD_TAG_LANGUAGE: b6569
  LLAMACPP_BUILD_TAG_GUARDIAN: b6569

  # 'ibm-granite/granite-3.1-2b-base',
  # 'ibm-granite/granite-3.1-8b-base',
  # 'ibm-granite/granite-3.1-1b-a400m-base',
  # 'ibm-granite/granite-3.1-3b-a800m-base',
  # 'ibm-granite/granite-3.1-2b-instruct',
  # 'ibm-granite/granite-3.1-8b-instruct',
  # 'ibm-granite/granite-3.1-1b-a400m-instruct',
  # 'ibm-granite/granite-3.1-3b-a800m-instruct',
  SOURCE_LANGUAGE_REPOS: "[
      'ibm-granite/granite-3.1-8b-base'
    ]"
  # 'Q2_K',
  # 'Q3_K_L', 'Q3_K_M', 'Q3_K_S',
  # 'Q4_0', 'Q4_1', 'Q4_K_M', 'Q4_K_S',
  # 'Q5_0', 'Q5_1', 'Q5_K_M', 'Q5_K_S',
  # 'Q6_K',
  # 'Q8_0'
  TARGET_LANGUAGE_QUANTIZATIONS: "[
      'Q2_K',
      'Q3_K_L', 'Q3_K_M', 'Q3_K_S',
      'Q4_0', 'Q4_1', 'Q4_K_M', 'Q4_K_S',
      'Q5_0', 'Q5_1', 'Q5_K_M', 'Q5_K_S',
      'Q6_K',
      'Q8_0'
    ]"
  # 'ibm-granite/granite-guardian-3.1-2b',
  # 'ibm-granite/granite-guardian-3.1-8b'
  SOURCE_GUARDIAN_REPOS: "[
      'ibm-granite/granite-guardian-3.1-2b',
      'ibm-granite/granite-guardian-3.1-8b'
    ]"
  # 'Q4_K_M',
  # 'Q5_K_M',
  # 'Q6_K',
  # 'Q8_0'
  TARGET_GUARDIAN_QUANTIZATIONS: "[
      'Q4_K_M',
      'Q5_K_M',
      'Q6_K',
      'Q8_0'
    ]"

jobs:
  # ===========================================================================
  # Environment setup
  # ===========================================================================
  # TODO: use conditionals for skipping jobs: if: ${{ false }} such as TEST_ONLY
  environment-setup:
    runs-on: ubuntu-latest
    # Note: declaration of these outputs is essential to pass to the next job
    outputs:
      debug: ${{ steps.set-vars.outputs.debug }}
      trace: ${{ steps.set-vars.outputs.trace }}
      enable_language_jobs: ${{ steps.set-vars.outputs.enable_language_jobs }}
      enable_guardian_jobs: ${{ steps.set-vars.outputs.enable_guardian_jobs }}
      enable_bvt_test_converted_format: ${{ steps.set-vars.outputs.enable_bvt_test_converted_format }}
      hf_collection_config: ${{ steps.set-vars.outputs.hf_collection_config }}
      target_repo_private: ${{ steps.set-vars.outputs.target_repo_private }}
      target_repo_owner: ${{ steps.set-vars.outputs.target_repo_owner }}
      target_repo_name_ext: ${{ steps.set-vars.outputs.target_repo_name_ext }}
      source_language_repos: "${{ steps.set-vars.outputs.source_language_repos }}"
      target_language_quantizations: "${{ steps.set-vars.outputs.target_language_quantizations }}"
      target_language_quantizations_bvt: "${{ steps.append-converted-format.outputs.target_language_quantizations_bvt }}"
      source_guardian_repos: "${{ steps.set-vars.outputs.source_guardian_repos }}"
      target_guardian_quantizations: "${{ steps.set-vars.outputs.target_guardian_quantizations }}"
      target_guardian_quantizations_bvt: "${{ steps.append-converted-format.outputs.target_guardian_quantizations_bvt }}"
      default_artifacts_dir: "${{ steps.set-vars.outputs.default_artifacts_dir }}"
      artifact_logs_name: "${{ steps.set-vars.outputs.artifact_logs_name }}"
      artifact_responses_name: "${{ steps.set-vars.outputs.artifact_responses_name }}"
      ext_log: "${{ steps.set-vars.outputs.ext_log }}"
      ext_response: "${{ steps.set-vars.outputs.ext_response }}"
      transformers_version_language: "${{ steps.set-vars.outputs.transformers_version_language }}"
      transformers_version_guardian: "${{ steps.set-vars.outputs.transformers_version_guardian }}"
      llamacpp_build_tag_language: "${{ steps.set-vars.outputs.llamacpp_build_tag_language }}"
      llamacpp_build_tag_guardian: "${{ steps.set-vars.outputs.llamacpp_build_tag_guardian }}"
      def_converted_quant_language: "${{ steps.set-vars.outputs.def_converted_quant_language }}"
      def_converted_quant_guardian: "${{ steps.set-vars.outputs.def_converted_quant_guardian }}"
    env:
      ARRAY_SEP: "','"
      DEF_CONVERTED_QUANT_LANGUAGE: "bf16"
      DEF_CONVERTED_QUANT_GUARDIAN: "bf16"
    steps:
      - name: Set environment variables in GitHub output
        id: set-vars
        run: |
            echo "DEBUG: $DEBUG"
            echo "TRACE: $TRACE"
            echo "COLLECTION_CONFIG: $COLLECTION_CONFIG"
            echo "TARGET_HF_REPO_OWNER: $TARGET_HF_REPO_OWNER"
            echo "TARGET_HF_REPO_NAME_EXT: $TARGET_HF_REPO_NAME_EXT"
            echo "debug=$DEBUG" >> "$GITHUB_OUTPUT"
            echo "trace=$TRACE" >> "$GITHUB_OUTPUT"
            echo "enable_language_jobs=$ENABLE_LANGUAGE_JOBS" >> "$GITHUB_OUTPUT"
            echo "enable_guardian_jobs=$ENABLE_GUARDIAN_JOBS" >> "$GITHUB_OUTPUT"
            echo "enable_bvt_test_converted_format=$ENABLE_BVT_TEST_CONVERTED_FORMAT" >> "$GITHUB_OUTPUT"
            echo "hf_collection_config=$COLLECTION_CONFIG" >> "$GITHUB_OUTPUT"
            echo "target_repo_owner=$TARGET_HF_REPO_OWNER" >> "$GITHUB_OUTPUT"
            echo "target_repo_name_ext=$TARGET_HF_REPO_NAME_EXT" >> "$GITHUB_OUTPUT"
            echo "source_language_repos=$SOURCE_LANGUAGE_REPOS" >> "$GITHUB_OUTPUT"
            echo "target_language_quantizations=$TARGET_LANGUAGE_QUANTIZATIONS" >> "$GITHUB_OUTPUT"
            echo "target_repo_private=$TARGET_HF_REPO_PRIVATE" >> "$GITHUB_OUTPUT"
            echo "source_guardian_repos=$SOURCE_GUARDIAN_REPOS" >> "$GITHUB_OUTPUT"
            echo "target_guardian_quantizations=$TARGET_GUARDIAN_QUANTIZATIONS" >> "$GITHUB_OUTPUT"
            echo "default_artifacts_dir=$DEFAULT_ARTIFACTS_DIR" >> "$GITHUB_OUTPUT"
            echo "artifact_logs_name=$ARTIFACT_LOGS_NAME" >> "$GITHUB_OUTPUT"
            echo "artifact_responses_name=$ARTIFACT_RESPONSES_NAME" >> "$GITHUB_OUTPUT"
            echo "ext_log=$EXT_LOG" >> "$GITHUB_OUTPUT"
            echo "ext_response=$EXT_RESPONSE" >> "$GITHUB_OUTPUT"
            echo "transformers_version_language=$TRANSFORMERS_VERSION_LANGUAGE" >> "$GITHUB_OUTPUT"
            echo "transformers_version_guardian=$TRANSFORMERS_VERSION_GUARDIAN" >> "$GITHUB_OUTPUT"
            echo "llamacpp_build_tag_language=$LLAMACPP_BUILD_TAG_LANGUAGE" >> "$GITHUB_OUTPUT"
            echo "llamacpp_build_tag_guardian=$LLAMACPP_BUILD_TAG_GUARDIAN" >> "$GITHUB_OUTPUT"
            echo "def_converted_quant_language=$DEF_CONVERTED_QUANT_LANGUAGE" >> "$GITHUB_OUTPUT"
            echo "def_converted_quant_guardian=$DEF_CONVERTED_QUANT_GUARDIAN" >> "$GITHUB_OUTPUT"

      - name: Append converted format to BVT test matrices
        id: append-converted-format
        run: |
            echo "ENABLE_BVT_TEST_CONVERTED_FORMAT: $ENABLE_BVT_TEST_CONVERTED_FORMAT"

            if [ "$ENABLE_BVT_TEST_CONVERTED_FORMAT" = "true" ]; then
              echo "✅ Appending converted formats to BVT test matrices"

              # Language models (BF16)
              echo "Appending ${{env.DEF_CONVERTED_QUANT_LANGUAGE}} to TARGET_LANGUAGE_QUANTIZATIONS for BVT"
              TEMP_ARRAY_STRING="${{ join(fromJSON(env.TARGET_LANGUAGE_QUANTIZATIONS), env.ARRAY_SEP) }}"
              if [ "$TEMP_ARRAY_STRING" != "None" ]; then
                TARGET_LANGUAGE_QUANTIZATIONS_BVT="['${TEMP_ARRAY_STRING}${{env.ARRAY_SEP}}${{env.DEF_CONVERTED_QUANT_LANGUAGE}}']"
              else
                TARGET_LANGUAGE_QUANTIZATIONS_BVT="$TARGET_LANGUAGE_QUANTIZATIONS"
              fi
              echo "target_language_quantizations_bvt=$TARGET_LANGUAGE_QUANTIZATIONS_BVT" >> "$GITHUB_OUTPUT"

              # Guardian models (BF16)
              TARGET_GUARDIAN_QUANTIZATIONS_BVT="$TARGET_GUARDIAN_QUANTIZATIONS"
              echo "target_guardian_quantizations_bvt=$TARGET_GUARDIAN_QUANTIZATIONS_BVT" >> "$GITHUB_OUTPUT"
            else
              echo "ℹ️  Skipping append of converted formats (ENABLE_BVT_TEST_CONVERTED_FORMAT=false)"
              echo "target_language_quantizations_bvt=$TARGET_LANGUAGE_QUANTIZATIONS" >> "$GITHUB_OUTPUT"
              echo "target_guardian_quantizations_bvt=$TARGET_GUARDIAN_QUANTIZATIONS" >> "$GITHUB_OUTPUT"
            fi

      - name: Confirm GitHub output values were set
        run: |
            echo "debug: ${{ steps.set-vars.outputs.debug }}"
            echo "trace: ${{ steps.set-vars.outputs.trace }}"
            echo "enable_language_jobs: ${{ steps.set-vars.outputs.enable_language_jobs }}"
            echo "enable_guardian_jobs: ${{ steps.set-vars.outputs.enable_guardian_jobs }}"
            echo "hf_collection_config: '${{ steps.set-vars.outputs.hf_collection_config }}'"
            echo "target_repo_owner: '${{ steps.set-vars.outputs.target_repo_owner }}'"
            echo "target_repo_name_ext: '${{ steps.set-vars.outputs.target_repo_name_ext }}'"
            echo "target_repo_private: '${{ steps.set-vars.outputs.target_repo_private }}'"
            echo "source_language_repos: '${{ steps.set-vars.outputs.source_language_repos }}'"
            echo "target_language_quantizations: '${{ steps.set-vars.outputs.target_language_quantizations }}'"
            echo "source_guardian_repos: '${{ steps.set-vars.outputs.source_guardian_repos }}'"
            echo "target_guardian_quantizations: '${{ steps.set-vars.outputs.target_guardian_quantizations }}'"

      # - name: List all environment variables
      #   run: env | sort

      # - name: Dump runner context
      #   env:
      #     RUNNER_CONTEXT: ${{ toJson(runner) }}
      #   run: |
      #     uname -a
      #     echo "$RUNNER_CONTEXT"

      # - name: Dump GitHub context
      #   env:
      #     GH_CONTEXT: ${{ toJson(github) }}
      #   run: echo "$GH_CONTEXT"

      # - name: Dump GitHub quiet
      #   env:
      #     GH_QUIET: ${{ toJson(secrets) }}
      #   run: echo "$GH_QUIET"

  # ===========================================================================
  # Granite LLMs
  # ===========================================================================
  language-create-hf-repos:
    needs: [ environment-setup ]
    uses: IBM/gguf/.github/workflows/reusable-create-hf-repos.yml@main
    with:
      debug: ${{ needs.environment-setup.outputs.debug == 'true' }}
      granite_family: "instruct"
      enable_language_jobs: ${{ needs.environment-setup.outputs.enable_language_jobs == 'true' }}
      hf_collection_config: ${{ needs.environment-setup.outputs.hf_collection_config }}
      target_repos: ${{ needs.environment-setup.outputs.source_language_repos }}
      target_repo_owner: ${{ needs.environment-setup.outputs.target_repo_owner }}
      target_repo_name_ext: ${{ needs.environment-setup.outputs.target_repo_name_ext }}
      target_repo_private: ${{ needs.environment-setup.outputs.target_repo_private == 'true' }}
    secrets:
      hf_token: ${{ secrets.HF_TOKEN_TEST }}

  convert-hf-to-bf16-gguf:
    needs: [ environment-setup, language-create-hf-repos ]
    uses: IBM/gguf/.github/workflows/reusable-convert-hf-to-bf16-gguf.yml@main
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        repo_id: ${{ fromJson(needs.environment-setup.outputs.source_language_repos) }}
    with:
      debug: ${{ needs.environment-setup.outputs.debug == 'true' }}
      trace: ${{ needs.environment-setup.outputs.trace == 'true' }}
      llamacpp_build_tag: ${{ needs.environment-setup.outputs.llamacpp_build_tag_language }}
      enable_language_jobs: ${{ needs.environment-setup.outputs.enable_language_jobs == 'true' }}
      hf_collection_config: ${{ needs.environment-setup.outputs.hf_collection_config }}
      target_repo_owner: ${{ needs.environment-setup.outputs.target_repo_owner }}
      target_repo_name_ext: ${{ needs.environment-setup.outputs.target_repo_name_ext }}
      repo_id: ${{ matrix.repo_id }}
      converted_quantization: ${{ needs.environment-setup.outputs.def_converted_quant_language }}
      transformers_version: ${{ needs.environment-setup.outputs.transformers_version_language }}
    secrets:
      hf_token: ${{ secrets.HF_TOKEN_TEST }}
      ibm_granite_token: ${{ secrets.HF_TOKEN_IBM_GRANITE }}

  quantize-upload-gguf:
    needs: [ environment-setup, convert-hf-to-bf16-gguf ]
    if: ${{ always() && (needs.convert-hf-to-bf16-gguf.result == 'success' || needs.convert-hf-to-bf16-gguf.result == 'skipped') }}
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        repo_id: ${{ fromJson(needs.environment-setup.outputs.source_language_repos) }}
        quantization: ${{ fromJson(needs.environment-setup.outputs.target_language_quantizations) }}
    uses: IBM/gguf/.github/workflows/reusable-quantize-upload-gguf.yml@main
    with:
      debug: ${{ needs.environment-setup.outputs.debug == 'true' }}
      trace: ${{ needs.environment-setup.outputs.trace == 'true' }}
      llamacpp_build_tag: ${{ needs.environment-setup.outputs.llamacpp_build_tag_language }}
      enable_language_jobs: ${{ needs.environment-setup.outputs.enable_language_jobs == 'true' }}
      hf_collection_config: "${{ needs.environment-setup.outputs.hf_collection_config }}"
      target_repo_owner: "${{ needs.environment-setup.outputs.target_repo_owner }}"
      target_repo_name_ext: "${{ needs.environment-setup.outputs.target_repo_name_ext }}"
      repo_id: "${{ matrix.repo_id }}"
      quantization: "${{ matrix.quantization }}"
      converted_quantization: ${{ needs.environment-setup.outputs.def_converted_quant_language }}
    secrets:
      hf_token: ${{ secrets.HF_TOKEN_TEST }}

  bvt-language-quantized-gguf-models:
    needs: [ environment-setup, quantize-upload-gguf ]
    if: ${{ always() && (needs.quantize-upload-gguf.result == 'success' || needs.quantize-upload-gguf.result == 'skipped') }}
    uses: IBM/gguf/.github/workflows/reusable-bvt-instruct-quantized-models-gguf.yml@main
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        repo_id: ${{ fromJson(needs.environment-setup.outputs.source_language_repos) }}
        quantization: ${{ fromJson(needs.environment-setup.outputs.target_language_quantizations_bvt) }}
    with:
      debug: ${{ needs.environment-setup.outputs.debug == 'true' }}
      trace: ${{ needs.environment-setup.outputs.trace == 'true' }}
      llamacpp_build_tag: ${{ needs.environment-setup.outputs.llamacpp_build_tag_language }}
      enable_language_jobs: ${{ needs.environment-setup.outputs.enable_language_jobs == 'true' }}
      target_repo_owner: "${{ needs.environment-setup.outputs.target_repo_owner }}"
      target_repo_name_ext: "${{ needs.environment-setup.outputs.target_repo_name_ext }}"
      repo_id: "${{ matrix.repo_id }}"
      quantization: "${{ matrix.quantization }}"
      ext_log: "${{ needs.environment-setup.outputs.ext_log }}"
      ext_response: "${{ needs.environment-setup.outputs.ext_response }}"
    secrets:
      hf_token: ${{ secrets.HF_TOKEN_TEST }}

  # TODO: change collection from private to public (on success)
  create-hf-collections:
    needs: [
      environment-setup,
      bvt-language-quantized-gguf-models,
    ]
    uses: IBM/gguf/.github/workflows/reusable-create-hf-collections.yml@main
    with:
      granite_family: "instruct"
      debug: ${{ needs.environment-setup.outputs.debug == 'true' }}
      enable_language_jobs: ${{ needs.environment-setup.outputs.enable_language_jobs == 'true' }}
      hf_collection_config: ${{ needs.environment-setup.outputs.hf_collection_config }}
      target_repo_owner: ${{ needs.environment-setup.outputs.target_repo_owner }}
      target_repo_name_ext: ${{ needs.environment-setup.outputs.target_repo_name_ext }}
      target_collection_private: ${{ needs.environment-setup.outputs.target_repo_private == 'true' }}
    secrets:
      hf_token: ${{ secrets.HF_TOKEN_TEST }}

  # ===========================================================================
  # Granite Guardian
  # ===========================================================================
  guardian-create-hf-repos:
    needs: [ environment-setup ]
    uses: IBM/gguf/.github/workflows/reusable-create-hf-repos.yml@main
    with:
      debug: ${{ needs.environment-setup.outputs.debug == 'true' }}
      granite_family: "guardian"
      enable_guardian_jobs: ${{ needs.environment-setup.outputs.enable_guardian_jobs == 'true' }}
      hf_collection_config: ${{ needs.environment-setup.outputs.hf_collection_config }}
      target_repos: ${{ needs.environment-setup.outputs.source_guardian_repos }}
      target_repo_owner: ${{ needs.environment-setup.outputs.target_repo_owner }}
      target_repo_name_ext: ${{ needs.environment-setup.outputs.target_repo_name_ext }}
      target_repo_private: ${{ needs.environment-setup.outputs.target_repo_private == 'true' }}
    secrets:
      hf_token: ${{ secrets.HF_TOKEN_TEST }}

  guardian-convert-hf-to-f16-gguf:
    needs: [ environment-setup, guardian-create-hf-repos ]
    uses: IBM/gguf/.github/workflows/reusable-convert-hf-to-bf16-gguf.yml@main
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        repo_id: ${{ fromJson(needs.environment-setup.outputs.source_guardian_repos) }}
    with:
      debug: ${{ needs.environment-setup.outputs.debug == 'true' }}
      trace: ${{ needs.environment-setup.outputs.trace == 'true' }}
      llamacpp_build_tag: ${{ needs.environment-setup.outputs.llamacpp_build_tag_guardian }}
      enable_guardian_jobs: ${{ needs.environment-setup.outputs.enable_guardian_jobs == 'true' }}
      hf_collection_config: ${{ needs.environment-setup.outputs.hf_collection_config }}
      target_repo_owner: ${{ needs.environment-setup.outputs.target_repo_owner }}
      target_repo_name_ext: ${{ needs.environment-setup.outputs.target_repo_name_ext }}
      repo_id: ${{ matrix.repo_id }}
      converted_quantization: ${{ needs.environment-setup.outputs.def_converted_quant_guardian }}
      transformers_version: ${{ needs.environment-setup.outputs.transformers_version_guardian }}
    secrets:
      hf_token: ${{ secrets.HF_TOKEN_TEST }}
      ibm_granite_token: ${{ secrets.HF_TOKEN_IBM_GRANITE }}

  guardian-quantize-upload-gguf:
    needs: [ environment-setup, guardian-convert-hf-to-f16-gguf ]
    if: ${{ always() && (needs.guardian-convert-hf-to-f16-gguf.result == 'success' || needs.guardian-convert-hf-to-f16-gguf.result == 'skipped') }}
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        repo_id: ${{ fromJson(needs.environment-setup.outputs.source_guardian_repos) }}
        quantization: ${{ fromJson(needs.environment-setup.outputs.target_guardian_quantizations) }}
    uses: IBM/gguf/.github/workflows/reusable-quantize-upload-gguf.yml@main
    with:
      debug: ${{ needs.environment-setup.outputs.debug == 'true' }}
      trace: ${{ needs.environment-setup.outputs.trace == 'true' }}
      llamacpp_build_tag: ${{ needs.environment-setup.outputs.llamacpp_build_tag_guardian }}
      enable_guardian_jobs: ${{ needs.environment-setup.outputs.enable_guardian_jobs == 'true' }}
      hf_collection_config: "${{ needs.environment-setup.outputs.hf_collection_config }}"
      target_repo_owner: "${{ needs.environment-setup.outputs.target_repo_owner }}"
      target_repo_name_ext: "${{ needs.environment-setup.outputs.target_repo_name_ext }}"
      repo_id: "${{ matrix.repo_id }}"
      quantization: "${{ matrix.quantization }}"
      converted_quantization: ${{ needs.environment-setup.outputs.def_converted_quant_guardian }}
    secrets:
      hf_token: ${{ secrets.HF_TOKEN_TEST }}

  guardian-bvt-quantized-gguf-models:
    needs: [ environment-setup, guardian-quantize-upload-gguf ]
    if: ${{ always() && (needs.guardian-quantize-upload-gguf.result == 'success' || needs.guardian-quantize-upload-gguf.result == 'skipped') }}
    uses: IBM/gguf/.github/workflows/reusable-bvt-guardian-quantized-models-gguf.yml@main
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        repo_id: ${{ fromJson(needs.environment-setup.outputs.source_guardian_repos) }}
        quantization: ${{ fromJson(needs.environment-setup.outputs.target_guardian_quantizations_bvt) }}
    with:
      debug: ${{ needs.environment-setup.outputs.debug == 'true' }}
      trace: ${{ needs.environment-setup.outputs.trace == 'true' }}
      llamacpp_build_tag: ${{ needs.environment-setup.outputs.llamacpp_build_tag_guardian }}
      enable_guardian_jobs: ${{ needs.environment-setup.outputs.enable_guardian_jobs == 'true' }}
      target_repo_owner: "${{ needs.environment-setup.outputs.target_repo_owner }}"
      target_repo_name_ext: "${{ needs.environment-setup.outputs.target_repo_name_ext }}"
      repo_id: "${{ matrix.repo_id }}"
      quantization: "${{ matrix.quantization }}"
      converted_quantization: ${{ needs.environment-setup.outputs.def_converted_quant_guardian }}
      ext_log: "${{ needs.environment-setup.outputs.ext_log }}"
      ext_response: "${{ needs.environment-setup.outputs.ext_response }}"
    secrets:
      hf_token: ${{ secrets.HF_TOKEN_TEST }}

  # TODO: change collection from private to public (on success)
  guardian-create-hf-collections:
    needs: [
      environment-setup,
      guardian-bvt-quantized-gguf-models,
    ]
    uses: IBM/gguf/.github/workflows/reusable-create-hf-collections.yml@main
    with:
      granite_family: "guardian"
      debug: ${{ needs.environment-setup.outputs.debug == 'true' }}
      enable_guardian_jobs: ${{ needs.environment-setup.outputs.enable_guardian_jobs == 'true' }}
      hf_collection_config: ${{ needs.environment-setup.outputs.hf_collection_config }}
      target_repo_owner: ${{ needs.environment-setup.outputs.target_repo_owner }}
      target_repo_name_ext: ${{ needs.environment-setup.outputs.target_repo_name_ext }}
      target_collection_private: ${{ needs.environment-setup.outputs.target_repo_private == 'true' }}
    secrets:
      hf_token: ${{ secrets.HF_TOKEN_TEST }}

