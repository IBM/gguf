# This workflow runs Build Verification Tests (BVT) on quantized embedding models
# using keyword extraction to validate embedding quality for supported architectures.
#
# Supported Architectures:
# ------------------------
# This workflow is designed for SPARSE embedding models that output vocabulary-sized
# vectors (logits). The keyword extraction applies the sparse sentence transformer
# approach: log(1 + relu(x)) transformation followed by top-k selection.
#
# ✅ WORKS WITH: Sparse embedding models (e.g., granite-embedding-30m-sparse)
#    - Output dimension matches vocabulary size (~30k tokens)
#    - Each dimension represents a token's activation weight
#    - Keywords extracted via top-k token selection
#
# ❌ NOT FOR: Dense embedding models (e.g., granite-embedding-125m-english)
#    - Output dimension is fixed (e.g., 768, 1024)
#    - Dimensions are abstract features, not token logits
#    - Cannot be directly mapped to keywords
#
# Usage Example:
# --------------
# Call this workflow from a parent workflow to test keyword extraction:
#
# jobs:
#   test-keyword-extraction:
#     uses: ./.github/workflows/reusable-bvt-embedding-keyword-extraction-gguf.yml
#     with:
#       enable_keyword_extraction_jobs: true
#       repo_id: "ibm-granite/granite-embedding-30m-sparse"  # Must be SPARSE model
#       quantization: "Q4_K_M"
#       target_repo_owner: "ibm-granite"
#       target_repo_name_ext: "-GGUF"
#       llamacpp_build_tag: "b8100"
#       max_keywords: 30
#     secrets:
#       hf_token: ${{ secrets.HF_TOKEN }}
#
name: bvt-embedding-keyword-extraction-gguf

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      hf_token:
        required: true
    inputs:
      enable_keyword_extraction_jobs:
        type: boolean
        required: false
        default: false
      repo_id:
        type: string
        required: true
      quantization:
        type: string
        required: true
      target_repo_owner:
        type: string
        required: true
      target_repo_name_ext:
        type: string
        required: true
      llamacpp_build_tag:
        type: string
        required: true
        description: "llama.cpp build tag to use (e.g., 'b6569', 'b6808', 'b8100'). Determines which binary tools to use from ./bin subdirectory."
      ext_log:
        type: string
        required: false
        default: '.log.txt'
      ext_response:
        type: string
        required: false
        default: '.response.txt'
      max_keywords:
        type: number
        required: false
        default: 30
        description: "Maximum number of keywords to extract from embeddings"
      debug:
        type: boolean
        required: true
        default: false
      trace:
        type: boolean
        required: false
        default: false

env:
  DEBUG: ${{inputs.debug}}
  EXT_GGUF: .gguf
  TEST_SENTENCE: "Artificial intelligence was founded as an academic discipline in 1956."
  OUTPUT_FORMAT: "json"
  MODEL_DOWNLOAD_DIR: models
  QUANTIZED_MODEL_EXISTS: false
  GH_ARTIFACT_RETENTION: 2

  # Dynamically set variables (pre-declared to avoid linter warnings)
  REPO_ORG: ""  # Set in set-github-env step
  REPO_NAME: ""  # Set in set-github-env step
  SOURCE_REPO_ID: ""  # Set in set-derivative-env-vars-1 step (original repo with config.json)
  TARGET_REPO_ID: ""  # Set in set-derivative-env-vars-1 step (GGUF repo)
  BASE_FNAME_QUANTIZED_GGUF: ""  # Set in set-derivative-env-vars-1 step
  BASE_FNAME_LOG_FILE: ""  # Set in set-derivative-env-vars-1 step
  BASE_FNAME_RESPONSE_FILE: ""  # Set in set-derivative-env-vars-1 step (processed output with tensor arrays only)
  BASE_FNAME_RAW_RESPONSE_FILE: ""  # Set in set-derivative-env-vars-1 step (raw llama-embedding output)
  LOCAL_MODEL_PATH: ""  # Set in set-derivative-env-vars-2 step (GGUF model path)
  SOURCE_MODEL_PATH: ""  # Set in set-derivative-env-vars-2 step (source repo for config.json)
  LLAMA_EMBEDDING_BIN: ""  # Set in verify-llama-embedding-binary step

jobs:
  test-keyword-extraction:
    runs-on: macos-latest
    timeout-minutes: 30
    if: ${{ inputs.enable_keyword_extraction_jobs == true }}
    steps:
    - uses: actions/checkout@v6
      with:
        sparse-checkout: |
          bin/${{ inputs.llamacpp_build_tag }}/llama-embedding
          scripts/hf_model_file_exists.py
          scripts/hf_file_download.py
          scripts/validate_embedding_json.py
          scripts/analyze_embedding_tensors.py
          scripts/extract_embedding_keywords.py
        sparse-checkout-cone-mode: false
        fetch-depth: 1

    - name: confirm-environment
      run: |
        echo "[INFO] github.env:"
        echo "[INFO] >> run_id: '${{ github.run_id }}'"
        echo "[INFO] >> ref: '${{ github.ref }}', ref_name: '${{ github.ref_name }}', ref_type: '${{ github.ref_type }}'"
        echo "[INFO] >> workflow_ref: '${{ github.workflow_ref }}'"
        echo "[INFO] >> event_name: '${{ github.event_name }}'"
        echo "[INFO] >> event.: action: '${{ github.event.action }}'"
        echo "[INFO] >> event.: base_ref: '${{ github.event.base_ref }}'"
        echo "[INFO] >> event.: workflow_run.conclusion: '${{ github.event.workflow_run.conclusion }}'"
        echo "[INFO] >> event.release.: name: '${{ github.event.release.name }}', tag_name: '${{ github.event.release.tag_name }}'"
        echo "[INFO] >> llamacpp_build_tag: '${{ inputs.llamacpp_build_tag }}'"

    - name: Dump GitHub inputs
      env:
        GITHUB_INPUTS: ${{ toJson(inputs) }}
      run: echo "$GITHUB_INPUTS"

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Install minimal dependencies for HF file operations and tensor analysis
    - name: install-dependencies
      run: |
        python -m pip install huggingface_hub requests torch transformers
        pip list

    # Use this step to set values to the github context (shared across jobs/steps)
    # Note: using $GITHUB_OUTPUT sets values under the current step's namespace
    # whereas using $GITHUB_ENV sets values in the job's underlying environment.
    # Note: for each 'repo_id' we parse out e.g., REPO_ORG=ibm-granite REPO_NAME=granite-embedding-30m-sparse
    - name: set-github-env
      id: set_github_env
      run: |
        echo "REPO_ORG=$(dirname '${{ inputs.repo_id }}')" >> $GITHUB_ENV
        echo "REPO_NAME=$(basename '${{ inputs.repo_id }}')" >> $GITHUB_ENV

    - name: set-derivative-env-vars-1
      run: |
        echo "SOURCE_REPO_ID=${{ inputs.repo_id }}" >> $GITHUB_ENV
        echo "TARGET_REPO_ID=${{inputs.target_repo_owner}}/${{env.REPO_NAME}}${{inputs.target_repo_name_ext}}" >> $GITHUB_ENV
        echo "BASE_FNAME_QUANTIZED_GGUF=${{ env.REPO_NAME }}-${{inputs.quantization}}${{env.EXT_GGUF}}" >> $GITHUB_ENV
        echo "BASE_FNAME_LOG_FILE=${{env.REPO_NAME}}-${{inputs.quantization}}-keyword-extraction${{inputs.ext_log}}" >> $GITHUB_ENV
        echo "BASE_FNAME_RESPONSE_FILE=${{env.REPO_NAME}}-${{inputs.quantization}}-keyword-extraction${{inputs.ext_response}}" >> $GITHUB_ENV
        echo "BASE_FNAME_RAW_RESPONSE_FILE=${{env.REPO_NAME}}-${{inputs.quantization}}-keyword-extraction_RAW${{inputs.ext_response}}" >> $GITHUB_ENV

    - name: set-derivative-env-vars-2
      run: |
        echo "LOCAL_MODEL_PATH=${{env.MODEL_DOWNLOAD_DIR}}/${{env.TARGET_REPO_ID}}" >> $GITHUB_ENV
        echo "SOURCE_MODEL_PATH=${{env.MODEL_DOWNLOAD_DIR}}/${{env.SOURCE_REPO_ID}}" >> $GITHUB_ENV

    - name: verify-github-env
      run: |
        echo "================== Derivative Environment Variables 1 =================="
        echo "SOURCE_REPO_ID='$SOURCE_REPO_ID' (${{ env.SOURCE_REPO_ID }})"
        echo "TARGET_REPO_ID='$TARGET_REPO_ID' (${{ env.TARGET_REPO_ID }})"
        echo "BASE_FNAME_QUANTIZED_GGUF='$BASE_FNAME_QUANTIZED_GGUF' (${{ env.BASE_FNAME_QUANTIZED_GGUF }})"
        echo "BASE_FNAME_LOG_FILE='$BASE_FNAME_LOG_FILE' (${{ env.BASE_FNAME_LOG_FILE }})"
        echo "BASE_FNAME_RESPONSE_FILE='$BASE_FNAME_RESPONSE_FILE' (${{ env.BASE_FNAME_RESPONSE_FILE }})"
        echo "BASE_FNAME_RAW_RESPONSE_FILE='$BASE_FNAME_RAW_RESPONSE_FILE' (${{ env.BASE_FNAME_RAW_RESPONSE_FILE }})"
        echo "================== Derivative Environment Variables 2 =================="
        echo "LOCAL_MODEL_PATH='$LOCAL_MODEL_PATH' (${{ env.LOCAL_MODEL_PATH }})"
        echo "SOURCE_MODEL_PATH='$SOURCE_MODEL_PATH' (${{ env.SOURCE_MODEL_PATH }})"

    - name: test-quantized-model-exists
      run: |
        exists=$(python ./scripts/hf_model_file_exists.py ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_QUANTIZED_GGUF }} ${{secrets.hf_token}})
        echo "exists: '$exists'"
        if [[ "$exists" == "False" ]]; then
          echo "FAILURE: model file: '${{env.TARGET_REPO_ID}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}' does not exist."
          exit 2
        else
          echo "SUCCESS: model file: '${{env.TARGET_REPO_ID}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}' exists."
          echo "setting environment variable: QUANTIZED_MODEL_EXISTS='true'..."
          echo "QUANTIZED_MODEL_EXISTS=true" >> $GITHUB_ENV
        fi

    - name: download-quantized-gguf-hf-hub-download
      if: env.QUANTIZED_MODEL_EXISTS == 'true'
      run: |
        echo "Downloading GGUF model to: ${{env.LOCAL_MODEL_PATH}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}..."
        echo "--------------------"
        python ./scripts/hf_file_download.py ${{ env.MODEL_DOWNLOAD_DIR}} ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_QUANTIZED_GGUF }} ${{secrets.hf_token}}
        ls -al ${{env.MODEL_DOWNLOAD_DIR}}/${{ env.TARGET_REPO_ID }}/*${{env.EXT_GGUF}}

    - name: verify-llama-embedding-binary
      run: |
        echo "Verifying llama-embedding binary from build tag: ${{ inputs.llamacpp_build_tag }}"
        LLAMA_EMBEDDING_BIN="./bin/${{ inputs.llamacpp_build_tag }}/llama-embedding"
        if [ ! -f "$LLAMA_EMBEDDING_BIN" ]; then
          echo "[ERROR] llama-embedding binary not found at: $LLAMA_EMBEDDING_BIN"
          exit 1
        fi
        chmod +x "$LLAMA_EMBEDDING_BIN"
        echo "[SUCCESS] llama-embedding binary found"
        echo "Testing binary..."
        $LLAMA_EMBEDDING_BIN --help | head -20
        echo "LLAMA_EMBEDDING_BIN=$LLAMA_EMBEDDING_BIN" >> $GITHUB_ENV

    - name: generate-embedding-for-keyword-extraction
      timeout-minutes: 10
      run: |
        echo "[INFO] =========================================="
        echo "[INFO] Granite Embedding Model Keyword Extraction Test"
        echo "[INFO] =========================================="
        echo "[INFO] Model path: ${{env.LOCAL_MODEL_PATH}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}"
        echo "[INFO] Test sentence: ${{env.TEST_SENTENCE}}"
        echo "[INFO] Output format: ${{env.OUTPUT_FORMAT}}"
        echo "[INFO] llama-embedding binary: ${{env.LLAMA_EMBEDDING_BIN}}"
        echo "[INFO] Build tag: ${{ inputs.llamacpp_build_tag }}"
        echo "[INFO] =========================================="
        echo ""

        # Run llama-embedding with simplified parameters
        echo "[INFO] Running llama-embedding..."
        ${{env.LLAMA_EMBEDDING_BIN}} \
          -m "${{env.LOCAL_MODEL_PATH}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}" \
          --embd-output-format "${{env.OUTPUT_FORMAT}}" \
          -p "${{env.TEST_SENTENCE}}" \
          2>&1 | tee ${{env.BASE_FNAME_LOG_FILE}}

        exit_code=${PIPESTATUS[0]}

        echo ""
        echo "[INFO] =========================================="

        if [ $exit_code -eq 0 ]; then
          echo "[SUCCESS] Embedding generation completed successfully!"

          # Save raw output to RAW response file
          echo "[INFO] Saving raw output to: ${{env.BASE_FNAME_RAW_RESPONSE_FILE}}"
          cp "${{env.BASE_FNAME_LOG_FILE}}" "${{env.BASE_FNAME_RAW_RESPONSE_FILE}}"

          # Verify raw file was created
          if [ -f "${{env.BASE_FNAME_RAW_RESPONSE_FILE}}" ]; then
            echo "[SUCCESS] Raw response file created"
            ls -lh "${{env.BASE_FNAME_RAW_RESPONSE_FILE}}"
          else
            echo "[ERROR] Failed to create raw response file"
            exit 1
          fi

          echo "[INFO] =========================================="
        else
          echo "[ERROR] Embedding generation failed with exit code: $exit_code"
          echo "[INFO] =========================================="
          cat ${{env.BASE_FNAME_LOG_FILE}}
          exit 1
        fi

    - name: show-raw-response
      run: |
        echo "================== Raw Test Results =================="
        cat ${{env.BASE_FNAME_RAW_RESPONSE_FILE}}
        echo "======================================================"

    - name: validate-output-format
      run: |
        echo "Validating output format..."
        echo "[INFO] Raw response file: ${{env.BASE_FNAME_RAW_RESPONSE_FILE}}"
        echo "[INFO] Processed response file: ${{env.BASE_FNAME_RESPONSE_FILE}}"
        echo "=================================================="

        # Check if the raw response file exists and has content
        if [ ! -s "${{env.BASE_FNAME_RAW_RESPONSE_FILE}}" ]; then
          echo "[ERROR] Raw response file is empty or does not exist: ${{env.BASE_FNAME_RAW_RESPONSE_FILE}}"
          echo "[INFO] Listing current directory files:"
          ls -la *.txt 2>/dev/null || echo "[INFO] No .txt files found"
          exit 1
        fi

        echo "[SUCCESS] Raw response file exists and has content"

        # For JSON output, validate JSON structure and extract tensor arrays using Python script
        if [ "${{env.OUTPUT_FORMAT}}" = "json" ] || [ "${{env.OUTPUT_FORMAT}}" = "json+" ]; then
          echo "[INFO] Validating JSON embedding format and extracting tensor arrays..."
          python3 ./scripts/validate_embedding_json.py "${{env.BASE_FNAME_RAW_RESPONSE_FILE}}" -o "${{env.BASE_FNAME_RESPONSE_FILE}}"

          if [ $? -eq 0 ]; then
            echo "[SUCCESS] JSON validation passed and tensor arrays extracted!"

            # Verify the processed output file was created
            if [ -f "${{env.BASE_FNAME_RESPONSE_FILE}}" ]; then
              echo "[SUCCESS] Processed response file created"
              ls -lh "${{env.BASE_FNAME_RESPONSE_FILE}}"
              echo ""
              echo "================== Processed Output (Tensor Arrays Only) =================="
              head -20 "${{env.BASE_FNAME_RESPONSE_FILE}}"
              echo "..."
              echo "============================================================================"
            else
              echo "[ERROR] Failed to create processed response file"
              exit 1
            fi
          else
            echo "[ERROR] JSON validation failed"
            echo "[INFO] Raw response file contents:"
            cat "${{env.BASE_FNAME_RAW_RESPONSE_FILE}}"
            exit 1
          fi
        else
          # For other formats, just check that we have numeric output
          if grep -qE "[0-9]+\.[0-9]+" "${{env.BASE_FNAME_RAW_RESPONSE_FILE}}"; then
            echo "[SUCCESS] Output contains numeric embedding values"
            # Copy raw to processed for non-JSON formats
            cp "${{env.BASE_FNAME_RAW_RESPONSE_FILE}}" "${{env.BASE_FNAME_RESPONSE_FILE}}"
          else
            echo "[ERROR] Output does not contain expected numeric values"
            exit 1
          fi
        fi

        echo "[SUCCESS] Output format validation passed!"

    - name: analyze-embedding-tensors
      run: |
        echo "[INFO] Analyzing embedding tensors with PyTorch..."
        echo "[INFO] Processed response file: ${{env.BASE_FNAME_RESPONSE_FILE}}"
        echo "=================================================="

        # Check if the processed response file exists
        if [ ! -f "${{env.BASE_FNAME_RESPONSE_FILE}}" ]; then
          echo "[ERROR] Processed response file not found: ${{env.BASE_FNAME_RESPONSE_FILE}}"
          exit 1
        fi

        # Run the tensor analysis script
        python3 ./scripts/analyze_embedding_tensors.py "${{env.BASE_FNAME_RESPONSE_FILE}}" --num-rows 10

        if [ $? -eq 0 ]; then
          echo ""
          echo "[SUCCESS] Tensor analysis completed successfully!"
        else
          echo ""
          echo "[ERROR] Tensor analysis failed"
          exit 1
        fi

    - name: extract-embedding-keywords
      run: |
        set +e  # Don't exit on command failures - keyword extraction is experimental
        echo "[INFO] =========================================="
        echo "[INFO] Extracting Keywords from Embedding Tensors"
        echo "[INFO] =========================================="
        echo "[INFO] Source model repo: ${{env.SOURCE_REPO_ID}}"
        echo "[INFO] Processed response file: ${{env.BASE_FNAME_RESPONSE_FILE}}"
        echo "[INFO] Max keywords: ${{ inputs.max_keywords }}"
        echo "=================================================="

        # Check if the processed response file exists
        if [ ! -f "${{env.BASE_FNAME_RESPONSE_FILE}}" ]; then
          echo "[ERROR] Processed response file not found: ${{env.BASE_FNAME_RESPONSE_FILE}}"
          exit 1
        fi

        # Run the keyword extraction script
        # Use the SOURCE_REPO_ID to load the tokenizer from HuggingFace
        python3 ./scripts/extract_embedding_keywords.py \
          "${{env.BASE_FNAME_RESPONSE_FILE}}" \
          "${{env.SOURCE_REPO_ID}}" \
          --max-tokens ${{ inputs.max_keywords }} \
          --hf-token "${{secrets.hf_token}}"

        EXTRACTION_EXIT_CODE=$?

        if [ $EXTRACTION_EXIT_CODE -eq 0 ]; then
          echo ""
          echo "[SUCCESS] =========================================="
          echo "[SUCCESS] Keyword extraction completed successfully!"
          echo "[SUCCESS] =========================================="
        else
          echo ""
          echo "=========================================="
          echo "⚠️  WARNING: Keyword extraction failed or not supported"
          echo "⚠️  WARNING: This model architecture may not support keyword extraction"
          echo "⚠️  WARNING: This is a non-blocking warning - workflow will continue"
          echo "=========================================="
        fi

        exit 0  # Always exit successfully

    # ========================= Upload log as artifact ======================================

    - name: Upload log artifact
      id: artifact-upload-log
      uses: actions/upload-artifact@v4
      with:
        overwrite: true
        retention-days: ${{env.GH_ARTIFACT_RETENTION}}
        name: ${{env.REPO_NAME}}-${{inputs.quantization}}-keyword-extraction-log
        path: ${{env.BASE_FNAME_LOG_FILE}}

    - name: Show log artifact ID
      id: show-artifact-id-log
      run:  echo 'Artifact ID is ${{ steps.artifact-upload-log.outputs.artifact-id }}'

    # ========================= Upload raw response as artifact ======================================

    - name: Upload raw response artifact
      id: artifact-upload-raw-response
      uses: actions/upload-artifact@v4
      with:
        overwrite: true
        retention-days: ${{env.GH_ARTIFACT_RETENTION}}
        name: ${{env.REPO_NAME}}-${{inputs.quantization}}-keyword-extraction-raw-response
        path: ${{env.BASE_FNAME_RAW_RESPONSE_FILE}}

    - name: Show raw response artifact ID
      id: show-artifact-id-raw-response
      run:  echo 'Artifact ID is ${{ steps.artifact-upload-raw-response.outputs.artifact-id }}'

    # ========================= Upload processed response as artifact ======================================

    - name: Upload processed response artifact
      id: artifact-upload-response
      uses: actions/upload-artifact@v4
      with:
        overwrite: true
        retention-days: ${{env.GH_ARTIFACT_RETENTION}}
        name: ${{env.REPO_NAME}}-${{inputs.quantization}}-keyword-extraction-response
        path: ${{env.BASE_FNAME_RESPONSE_FILE}}

    - name: Show processed response artifact ID
      id: show-artifact-id-response
      run:  echo 'Artifact ID is ${{ steps.artifact-upload-response.outputs.artifact-id }}'

