# This workflow runs Build Verification Tests (BVT) on the quantized embedding models
# using llama-embedding binary from llama.cpp.
name: bvt-embedding-quantized-models-gguf

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      hf_token:
        required: true
    inputs:
      enable_embedding_jobs:
        type: boolean
        required: false
        default: false
      repo_id:
        type: string
        required: true
      quantization:
        type: string
        required: true
      target_repo_owner:
        type: string
        required: true
      target_repo_name_ext:
        type: string
        required: true
      llamacpp_build_tag:
        type: string
        required: true
        description: "llama.cpp build tag to use (e.g., 'b6569', 'b6808', 'b8100'). Determines which binary tools to use from ./bin subdirectory."
      ext_log:
        type: string
        required: false
        default: '.log.txt'
      ext_response:
        type: string
        required: false
        default: '.response.txt'
      debug:
        type: boolean
        required: true
        default: false
      trace:
        type: boolean
        required: false
        default: false

env:
  DEBUG: ${{inputs.debug}}
  EXT_GGUF: .gguf
  # Test sentences for similarity testing
  TEST_SENTENCE_1: "Artificial intelligence was founded as an academic discipline in 1956."
  TEST_SENTENCE_2: "AI started as an academic field in the 1950s."
  TEST_SENTENCE_3: "Delicious pepperoni pizza with extra cheese and mushrooms makes my favorite weekend meal."
  OUTPUT_FORMAT: "json"
  MODEL_DOWNLOAD_DIR: models
  QUANTIZED_MODEL_EXISTS: false
  GH_ARTIFACT_RETENTION: 2
  SIMILARITY_THRESHOLD_HIGH: 0.6  # Threshold for similar sentences
  SIMILARITY_THRESHOLD_LOW: 0.4   # Threshold for dissimilar sentences

  # Dynamically set variables (pre-declared to avoid linter warnings)
  REPO_ORG: ""  # Set in set-github-env step
  REPO_NAME: ""  # Set in set-github-env step
  SOURCE_REPO_ID: ""  # Set in set-derivative-env-vars-1 step (original repo with config.json)
  TARGET_REPO_ID: ""  # Set in set-derivative-env-vars-1 step (GGUF repo)
  BASE_FNAME_QUANTIZED_GGUF: ""  # Set in set-derivative-env-vars-1 step
  BASE_FNAME_LOG_FILE: ""  # Set in set-derivative-env-vars-1 step
  BASE_FNAME_RESPONSE_FILE: ""  # Set in set-derivative-env-vars-1 step (processed output with tensor arrays only)
  BASE_FNAME_RAW_RESPONSE_FILE: ""  # Set in set-derivative-env-vars-1 step (raw llama-embedding output)
  LOCAL_MODEL_PATH: ""  # Set in set-derivative-env-vars-2 step (GGUF model path)
  SOURCE_MODEL_PATH: ""  # Set in set-derivative-env-vars-2 step (source repo for config.json)
  LLAMA_EMBEDDING_BIN: ""  # Set in verify-llama-embedding-binary step

jobs:
  test-quantized-embedding-model:
    runs-on: macos-latest
    timeout-minutes: 30
    if: ${{ inputs.enable_embedding_jobs == true }}
    steps:
    - uses: actions/checkout@v6
      with:
        sparse-checkout: |
          bin/${{ inputs.llamacpp_build_tag }}/llama-embedding
          scripts/hf_model_file_exists.py
          scripts/hf_file_download.py
          scripts/validate_embedding_json.py
          scripts/analyze_embedding_tensors.py
          scripts/test_embedding_similarity.py
          scripts/get_similarity_thresholds.py
          resources/json/latest/hf_collection_mapping_gguf.json
        sparse-checkout-cone-mode: false
        fetch-depth: 1

    - name: confirm-environment
      run: |
        echo "[INFO] github.env:"
        echo "[INFO] >> run_id: '${{ github.run_id }}'"
        echo "[INFO] >> ref: '${{ github.ref }}', ref_name: '${{ github.ref_name }}', ref_type: '${{ github.ref_type }}'"
        echo "[INFO] >> workflow_ref: '${{ github.workflow_ref }}'"
        echo "[INFO] >> event_name: '${{ github.event_name }}'"
        echo "[INFO] >> event.: action: '${{ github.event.action }}'"
        echo "[INFO] >> event.: base_ref: '${{ github.event.base_ref }}'"
        echo "[INFO] >> event.: workflow_run.conclusion: '${{ github.event.workflow_run.conclusion }}'"
        echo "[INFO] >> event.release.: name: '${{ github.event.release.name }}', tag_name: '${{ github.event.release.tag_name }}'"
        echo "[INFO] >> llamacpp_build_tag: '${{ inputs.llamacpp_build_tag }}'"

    - name: Dump GitHub inputs
      env:
        GITHUB_INPUTS: ${{ toJson(inputs) }}
      run: echo "$GITHUB_INPUTS"

    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # Install minimal dependencies for HF file operations and tensor analysis
    - name: install-dependencies
      run: |
        python -m pip install huggingface_hub requests torch transformers
        pip list

    # Use this step to set values to the github context (shared across jobs/steps)
    # Note: using $GITHUB_OUTPUT sets values under the current step's namespace
    # whereas using $GITHUB_ENV sets values in the job's underlying environment.
    # Note: for each 'repo_id' we parse out e.g., REPO_ORG=ibm-granite REPO_NAME=granite-embedding-30m-sparse
    - name: set-github-env
      id: set_github_env
      run: |
        echo "REPO_ORG=$(dirname '${{ inputs.repo_id }}')" >> $GITHUB_ENV
        echo "REPO_NAME=$(basename '${{ inputs.repo_id }}')" >> $GITHUB_ENV

    - name: set-derivative-env-vars-1
      run: |
        echo "SOURCE_REPO_ID=${{ inputs.repo_id }}" >> $GITHUB_ENV
        echo "TARGET_REPO_ID=${{inputs.target_repo_owner}}/${{env.REPO_NAME}}${{inputs.target_repo_name_ext}}" >> $GITHUB_ENV
        echo "BASE_FNAME_QUANTIZED_GGUF=${{ env.REPO_NAME }}-${{inputs.quantization}}${{env.EXT_GGUF}}" >> $GITHUB_ENV
        echo "BASE_FNAME_LOG_FILE=${{env.REPO_NAME}}-${{inputs.quantization}}-embedding-test${{inputs.ext_log}}" >> $GITHUB_ENV
        echo "BASE_FNAME_RESPONSE_FILE=${{env.REPO_NAME}}-${{inputs.quantization}}-embedding-test${{inputs.ext_response}}" >> $GITHUB_ENV
        echo "BASE_FNAME_RAW_RESPONSE_FILE=${{env.REPO_NAME}}-${{inputs.quantization}}-embedding-test_RAW${{inputs.ext_response}}" >> $GITHUB_ENV

    - name: set-derivative-env-vars-2
      run: |
        echo "LOCAL_MODEL_PATH=${{env.MODEL_DOWNLOAD_DIR}}/${{env.TARGET_REPO_ID}}" >> $GITHUB_ENV
        echo "SOURCE_MODEL_PATH=${{env.MODEL_DOWNLOAD_DIR}}/${{env.SOURCE_REPO_ID}}" >> $GITHUB_ENV

    - name: verify-github-env
      run: |
        echo "================== Derivative Environment Variables 1 =================="
        echo "SOURCE_REPO_ID='$SOURCE_REPO_ID' (${{ env.SOURCE_REPO_ID }})"
        echo "TARGET_REPO_ID='$TARGET_REPO_ID' (${{ env.TARGET_REPO_ID }})"
        echo "BASE_FNAME_QUANTIZED_GGUF='$BASE_FNAME_QUANTIZED_GGUF' (${{ env.BASE_FNAME_QUANTIZED_GGUF }})"
        echo "BASE_FNAME_LOG_FILE='$BASE_FNAME_LOG_FILE' (${{ env.BASE_FNAME_LOG_FILE }})"
        echo "BASE_FNAME_RESPONSE_FILE='$BASE_FNAME_RESPONSE_FILE' (${{ env.BASE_FNAME_RESPONSE_FILE }})"
        echo "BASE_FNAME_RAW_RESPONSE_FILE='$BASE_FNAME_RAW_RESPONSE_FILE' (${{ env.BASE_FNAME_RAW_RESPONSE_FILE }})"
        echo "================== Derivative Environment Variables 2 =================="
        echo "LOCAL_MODEL_PATH='$LOCAL_MODEL_PATH' (${{ env.LOCAL_MODEL_PATH }})"
        echo "SOURCE_MODEL_PATH='$SOURCE_MODEL_PATH' (${{ env.SOURCE_MODEL_PATH }})"

    - name: test-quantized-model-exists
      run: |
        exists=$(python ./scripts/hf_model_file_exists.py ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_QUANTIZED_GGUF }} ${{secrets.hf_token}})
        echo "exists: '$exists'"
        if [[ "$exists" == "False" ]]; then
          echo "FAILURE: model file: '${{env.TARGET_REPO_ID}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}' does not exist."
          exit 2
        else
          echo "SUCCESS: model file: '${{env.TARGET_REPO_ID}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}' exists."
          echo "setting environment variable: QUANTIZED_MODEL_EXISTS='true'..."
          echo "QUANTIZED_MODEL_EXISTS=true" >> $GITHUB_ENV
        fi

    - name: download-quantized-gguf-hf-hub-download
      if: env.QUANTIZED_MODEL_EXISTS == 'true'
      run: |
        echo "Downloading GGUF model to: ${{env.LOCAL_MODEL_PATH}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}..."
        echo "--------------------"
        python ./scripts/hf_file_download.py ${{ env.MODEL_DOWNLOAD_DIR}} ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_QUANTIZED_GGUF }} ${{secrets.hf_token}}
        ls -al ${{env.MODEL_DOWNLOAD_DIR}}/${{ env.TARGET_REPO_ID }}/*${{env.EXT_GGUF}}

    - name: verify-llama-embedding-binary
      run: |
        echo "Verifying llama-embedding binary from build tag: ${{ inputs.llamacpp_build_tag }}"
        LLAMA_EMBEDDING_BIN="./bin/${{ inputs.llamacpp_build_tag }}/llama-embedding"
        if [ ! -f "$LLAMA_EMBEDDING_BIN" ]; then
          echo "[ERROR] llama-embedding binary not found at: $LLAMA_EMBEDDING_BIN"
          exit 1
        fi
        chmod +x "$LLAMA_EMBEDDING_BIN"
        echo "[SUCCESS] llama-embedding binary found"
        echo "Testing binary..."
        $LLAMA_EMBEDDING_BIN --help | head -20
        echo "LLAMA_EMBEDDING_BIN=$LLAMA_EMBEDDING_BIN" >> $GITHUB_ENV

    - name: generate-embeddings-for-similarity-test
      timeout-minutes: 10
      run: |
        echo "[INFO] =========================================="
        echo "[INFO] Granite Embedding Model GGUF Test"
        echo "[INFO] =========================================="
        echo "[INFO] Model path: ${{env.LOCAL_MODEL_PATH}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}"
        echo "[INFO] Output format: ${{env.OUTPUT_FORMAT}}"
        echo "[INFO] llama-embedding binary: ${{env.LLAMA_EMBEDDING_BIN}}"
        echo "[INFO] Build tag: ${{ inputs.llamacpp_build_tag }}"
        echo "[INFO] =========================================="
        echo ""

        # Generate embedding for sentence 1
        # Note: Using default --embd-normalize=2 (Euclidean/L2 normalization) for optimal cosine similarity
        echo "[INFO] Generating embedding for sentence 1: ${{env.TEST_SENTENCE_1}}"
        ${{env.LLAMA_EMBEDDING_BIN}} \
          -m "${{env.LOCAL_MODEL_PATH}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}" \
          --embd-output-format "${{env.OUTPUT_FORMAT}}" \
          -p "${{env.TEST_SENTENCE_1}}" \
          2>&1 | tee embedding_1.log

        # Check if the embedding generation command (first command in pipeline) failed
        # PIPESTATUS is a bash built-in array variable that stores exit status of each command in a pipeline
        # ${PIPESTATUS[0]} = exit status of llama-embedding (first command before pipe)
        # ${PIPESTATUS[1]} = exit status of tee (second command after pipe)
        # We check [0] because we care if llama-embedding failed, not if tee succeeded
        # Note: PIPESTATUS is bash-specific and not available in POSIX sh
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "[ERROR] Embedding generation failed for sentence 1"
          cat embedding_1.log
          exit 1
        fi
        echo "[SUCCESS] Embedding 1 generated"

        # Generate embedding for sentence 2
        # Note: Using default --embd-normalize=2 (Euclidean/L2 normalization) for optimal cosine similarity
        echo ""
        echo "[INFO] Generating embedding for sentence 2: ${{env.TEST_SENTENCE_2}}"
        ${{env.LLAMA_EMBEDDING_BIN}} \
          -m "${{env.LOCAL_MODEL_PATH}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}" \
          --embd-output-format "${{env.OUTPUT_FORMAT}}" \
          -p "${{env.TEST_SENTENCE_2}}" \
          2>&1 | tee embedding_2.log

        # Check pipeline status (see comment above for PIPESTATUS explanation)
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "[ERROR] Embedding generation failed for sentence 2"
          cat embedding_2.log
          exit 1
        fi
        echo "[SUCCESS] Embedding 2 generated"

        # Generate embedding for sentence 3
        echo ""
        echo "[INFO] Generating embedding for sentence 3: ${{env.TEST_SENTENCE_3}}"
        ${{env.LLAMA_EMBEDDING_BIN}} \
          -m "${{env.LOCAL_MODEL_PATH}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}" \
          --embd-output-format "${{env.OUTPUT_FORMAT}}" \
          -p "${{env.TEST_SENTENCE_3}}" \
          2>&1 | tee embedding_3.log

        # Check pipeline status (see comment above for PIPESTATUS explanation)
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "[ERROR] Embedding generation failed for sentence 3"
          cat embedding_3.log
          exit 1
        fi
        echo "[SUCCESS] Embedding 3 generated"

        echo ""
        echo "[SUCCESS] All embeddings generated successfully!"

    - name: validate-and-extract-embeddings
      run: |
        echo "[INFO] Validating and extracting embeddings from log files..."
        echo "=================================================="

        # Process each embedding log file
        for i in 1 2 3; do
          log_file="embedding_${i}.log"
          output_file="embedding_${i}.json"

          echo "[INFO] Processing $log_file..."

          # Check if log file exists
          if [ ! -f "$log_file" ]; then
            echo "[ERROR] Log file not found: $log_file"
            exit 1
          fi

          # Validate JSON and extract tensor arrays
          python3 ./scripts/validate_embedding_json.py "$log_file" -o "$output_file"

          if [ $? -ne 0 ]; then
            echo "[ERROR] Failed to validate/extract embedding from $log_file"
            exit 1
          fi

          echo "[SUCCESS] Extracted embedding to $output_file"
        done

        echo ""
        echo "[SUCCESS] All embeddings validated and extracted!"

    - name: set-similarity-thresholds
      run: |
        echo "[INFO] =========================================="
        echo "[INFO] Getting Model-Specific Similarity Thresholds"
        echo "[INFO] =========================================="
        echo "[INFO] Repository: ${{ inputs.repo_id }}"
        echo ""

        # Get thresholds from configuration file
        THRESHOLDS=$(python3 ./scripts/get_similarity_thresholds.py "${{ inputs.repo_id }}" --verbose)

        if [ $? -ne 0 ]; then
          echo "[ERROR] Failed to get similarity thresholds"
          exit 1
        fi

        # Parse the output (format: "threshold_high threshold_low")
        THRESHOLD_HIGH=$(echo $THRESHOLDS | awk '{print $1}')
        THRESHOLD_LOW=$(echo $THRESHOLDS | awk '{print $2}')

        echo "[INFO] Similarity Threshold (High/Similar): $THRESHOLD_HIGH"
        echo "[INFO] Similarity Threshold (Low/Dissimilar): $THRESHOLD_LOW"
        echo ""

        # Set as environment variables for subsequent steps
        echo "SIMILARITY_THRESHOLD_HIGH=$THRESHOLD_HIGH" >> $GITHUB_ENV
        echo "SIMILARITY_THRESHOLD_LOW=$THRESHOLD_LOW" >> $GITHUB_ENV

    - name: test-embedding-similarity
      run: |
        set +e  # Don't exit on command failures
        echo "[INFO] =========================================="
        echo "[INFO] Testing Embedding Similarity"
        echo "[INFO] =========================================="
        echo "[INFO] Test 1: Similar sentences (1 vs 2)"
        echo "[INFO] Sentence 1: ${{env.TEST_SENTENCE_1}}"
        echo "[INFO] Sentence 2: ${{env.TEST_SENTENCE_2}}"
        echo "[INFO] Expected: High similarity (>= ${{env.SIMILARITY_THRESHOLD_HIGH}})"
        echo ""

        # Test 1: Similar sentences should have high similarity
        python3 ./scripts/test_embedding_similarity.py \
          embedding_1.json \
          embedding_2.json \
          --threshold ${{env.SIMILARITY_THRESHOLD_HIGH}} \
          --similar \
          --labels "AI academic discipline 1956" "AI academic field 1950s"
        TEST1_EXIT_CODE=$?

        if [ $TEST1_EXIT_CODE -ne 0 ]; then
          echo ""
          echo "=========================================="
          echo "⚠️  WARNING: Similarity test 1 failed"
          echo "⚠️  WARNING: Similar sentences did not meet the high similarity threshold"
          echo "⚠️  WARNING: This is a non-blocking warning - workflow will continue"
          echo "=========================================="
        fi

        echo ""
        echo "[INFO] =========================================="
        echo "[INFO] Test 2: Dissimilar sentences (1 vs 3)"
        echo "[INFO] Sentence 1: ${{env.TEST_SENTENCE_1}}"
        echo "[INFO] Sentence 3: ${{env.TEST_SENTENCE_3}}"
        echo "[INFO] Expected: Low similarity (< ${{env.SIMILARITY_THRESHOLD_LOW}})"
        echo ""

        # Test 2: Dissimilar sentences should have low similarity
        python3 ./scripts/test_embedding_similarity.py \
          embedding_1.json \
          embedding_3.json \
          --threshold ${{env.SIMILARITY_THRESHOLD_LOW}} \
          --dissimilar \
          --labels "AI academic discipline 1956" "Pizza for dinner"
        TEST2_EXIT_CODE=$?

        if [ $TEST2_EXIT_CODE -ne 0 ]; then
          echo ""
          echo "=========================================="
          echo "⚠️  WARNING: Similarity test 2 failed"
          echo "⚠️  WARNING: Dissimilar sentences did not meet the low similarity threshold"
          echo "⚠️  WARNING: This is a non-blocking warning - workflow will continue"
          echo "=========================================="
        fi

        echo ""
        echo "[SUCCESS] =========================================="
        echo "[SUCCESS] Similarity tests completed (warnings above if any tests failed)"
        echo "[SUCCESS] =========================================="

        exit 0  # Always exit successfully

    # ========================= Upload log as artifact ======================================

    - name: Upload log artifact
      id: artifact-upload-log
      uses: actions/upload-artifact@v4
      with:
        overwrite: true
        retention-days: ${{env.GH_ARTIFACT_RETENTION}}
        name: ${{env.REPO_NAME}}-${{inputs.quantization}}-embedding-test-log
        path: ${{env.BASE_FNAME_LOG_FILE}}

    - name: Show log artifact ID
      id: show-artifact-id-log
      run:  echo 'Artifact ID is ${{ steps.artifact-upload-log.outputs.artifact-id }}'

    # ========================= Upload raw response as artifact ======================================

    - name: Upload raw response artifact
      id: artifact-upload-raw-response
      uses: actions/upload-artifact@v4
      with:
        overwrite: true
        retention-days: ${{env.GH_ARTIFACT_RETENTION}}
        name: ${{env.REPO_NAME}}-${{inputs.quantization}}-embedding-test-raw-response
        path: ${{env.BASE_FNAME_RAW_RESPONSE_FILE}}

    - name: Show raw response artifact ID
      id: show-artifact-id-raw-response
      run:  echo 'Artifact ID is ${{ steps.artifact-upload-raw-response.outputs.artifact-id }}'

    # ========================= Upload processed response as artifact ======================================

    - name: Upload processed response artifact
      id: artifact-upload-response
      uses: actions/upload-artifact@v4
      with:
        overwrite: true
        retention-days: ${{env.GH_ARTIFACT_RETENTION}}
        name: ${{env.REPO_NAME}}-${{inputs.quantization}}-embedding-test-response
        path: ${{env.BASE_FNAME_RESPONSE_FILE}}

    - name: Show processed response artifact ID
      id: show-artifact-id-response
      run:  echo 'Artifact ID is ${{ steps.artifact-upload-response.outputs.artifact-id }}'

