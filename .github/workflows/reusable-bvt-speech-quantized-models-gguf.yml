# This workflow runs Build Verification Tests (BVT) on the quantized speech models
# using llama.cpp utilities.
name: bvt-hf-speech-quantized-models-gguf

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      hf_token:
        required: true
    inputs:
      enable_speech_jobs:
        type: boolean
        required: false
        default: false
      repo_id:
        type: string
        required: true
      quantization:
        type: string
        required: true
      target_repo_owner:
        type: string
        required: true
      target_repo_name_ext:
        type: string
        required: true
      llamacpp_build_tag:
        type: string
        required: true
        description: "llama.cpp build tag to use (e.g., 'b6569', 'b6808', 'b8100'). Determines which binary tools to use from ./bin subdirectory."
      ext_log:
        type: string
        required: false
        default: '.log.txt'
      ext_response:
        type: string
        required: false
        default: '.response.txt'
      debug:
        type: boolean
        required: true
        default: false
      trace:
        type: boolean
        required: false
        default: false
      verbose:
        type: boolean
        required: false
        default: false
        description: "Enable verbose output for llama-cli (can cause slowdowns with per-token logging)"
      verify_runtime:
        type: boolean
        required: false
        default: true

# See: https://github.com/ggerganov/llama.cpp/blob/master/examples/server/tests/unit/test_completion.py
env:
  DEBUG: ${{inputs.debug}}
  VERBOSE: ${{inputs.verbose}}
  VERIFY_RUNTIME: ${{inputs.verify_runtime}}
  EXT_GGUF: .gguf
  EXT_NAME_F16: "-f16.gguf"
  LLAMA_CLI_TOOL: llama-mtmd-cli
  LLAMA_REQUEST_TEMP: 0
  LLAMA_REQUEST_CONTEXT_SIZE: 16384
  TEST_AUDIO_PATH: "test/audio/"
  TEST_AUDIO_FILE: "multilingual_sample.wav"
  # LLAMA_REQUEST_PROMPT_SYSTEM: ""
  LLAMA_REQUEST_PROMPT_USER: "Please you transcribe the audio file into written format."
  LLAMA_RESPONSE_REGEX: "(timothy|interfere|hearth|pêcheur)+"
  LLAMA_RESPONSE_WORDS:  "timothy,interfere,hearth,pêcheur"
  LLAMACPP_DIR: llama.cpp
  MODEL_DOWNLOAD_DIR: models
  QUANTIZED_MODEL_EXISTS: false
  F16_MMPROJ_MODEL_BASE_FILENAME: mmproj-model
  TEST_LLAMA_CLI: true
  GH_ARTIFACT_RETENTION: 2

  # Dynamically set variables (pre-declared to avoid linter warnings)
  REPO_ORG: ""  # Set in set-github-env step
  REPO_NAME: ""  # Set in set-github-env step
  TARGET_REPO_ID: ""  # Set in set-derivative-env-vars-1 step
  BASE_FNAME_QUANTIZED_GGUF: ""  # Set in set-derivative-env-vars-1 step
  BASE_FNAME_MMPROJ_GGUF: ""  # Set in set-derivative-env-vars-1 step
  BASE_FNAME_LOG_FILE: ""  # Set in set-derivative-env-vars-1 step
  BASE_FNAME_RESPONSE_FILE: ""  # Set in set-derivative-env-vars-1 step
  LOCAL_MODEL_PATH: ""  # Set in set-derivative-env-vars-2 step
  LOCAL_FNAME_QUANTIZED_GGUF: ""  # Set in set-derivative-env-vars-3 step
  LOCAL_FNAME_MMPROJ_GGUF: ""  # Set in set-derivative-env-vars-3 step
  IS_SPLIT_GGUF: "0"  # Set in test-quantized-model-exists: 1 = quantized GGUF was uploaded as shards
  SHARD1_FNAME: ""  # Set in test-quantized-model-exists: first shard filename when IS_SPLIT_GGUF=1

jobs:
  test-quantized-model:
    runs-on: macos-latest
    timeout-minutes: 30
    if: ${{ inputs.enable_speech_jobs == true }}
    steps:
    - uses: actions/checkout@v6
      with:
        sparse-checkout: |
          requirements.txt
          scripts/hf_model_file_exists.py
          scripts/hf_file_download.py
          scripts/get_projector_precision.py
          scripts/test_regex_match_file.py
          scripts/test_regex_match_file_2.py
          resources/json/latest/hf_collection_mapping_gguf.json
          test/audio
          bin/${{ inputs.llamacpp_build_tag }}/**
        sparse-checkout-cone-mode: false
        fetch-depth: 1
    - name: detect-platform
      run: |
        OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]' | sed 's/macos/darwin/')
        ARCH=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]' | sed 's/x64/x86_64/')
        echo "LLAMA_BIN_DIR=bin/${{ inputs.llamacpp_build_tag }}/${OS}-${ARCH}" >> $GITHUB_ENV
        echo "Detected platform: ${OS}-${ARCH} → LLAMA_BIN_DIR=bin/${{ inputs.llamacpp_build_tag }}/${OS}-${ARCH}"
    - name: confirm-environment
      run: |
        echo "[INFO] github.env:"
        echo "[INFO] >> run_id: '${{ github.run_id }}'"
        echo "[INFO] >> ref: '${{ github.ref }}', ref_name: '${{ github.ref_name }}', ref_type: '${{ github.ref_type }}'"
        echo "[INFO] >> workflow_ref: '${{ github.workflow_ref }}'"
        echo "[INFO] >> event_name: '${{ github.event_name }}'"
        echo "[INFO] >> event.: action: '${{ github.event.action }}'"
        echo "[INFO] >> event.: base_ref: '${{ github.event.base_ref }}'"
        echo "[INFO] >> event.: workflow_run.conclusion: '${{ github.event.workflow_run.conclusion }}'"
        echo "[INFO] >> event.release.: name: '${{ github.event.release.name }}', tag_name: '${{ github.event.release.tag_name }}'"
        echo "[INFO] >> llamacpp_build_tag: '${{ inputs.llamacpp_build_tag }}'"

    # - name: Dump GitHub context
    #   env:
    #     GH_CONTEXT: ${{ toJson(github) }}
    #   run: echo "$GH_CONTEXT"

    - name: Dump GitHub inputs
      env:
        GITHUB_INPUTS: ${{ toJson(inputs) }}
      run: echo "$GITHUB_INPUTS"

    # Note: at the current time, we cannot use Python versions > 3.11 due to HF and langchain deps.
    # Note: you can verify in a step using: run: python -c "import sys; print(sys.version)"
    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # primarily huggingface_hub
    - name: install-dependencies
      run: |
        python -m pip install -r ./requirements.txt
        pip list

    # Use this step to set values to the github context (shared across jobs/steps)
    # Note: using $GITHUB_OUTPUT sets values under the current step's namespace
    # whereas using $GITHUB_ENV sets values in the job's underlying environment.
    # Note: for each 'repo_id' we parse out e.g., REPO_ORG=ibm-granite REPO_NAME=granite-3.0-2b-instruct
    - name: set-github-env
      id: set_github_env
      run: |
        echo "REPO_ORG=$(dirname '${{ inputs.repo_id }}')" >> $GITHUB_ENV
        echo "REPO_NAME=$(basename '${{ inputs.repo_id }}')" >> $GITHUB_ENV

    - name: set-derivative-env-vars-1
      run: |
        # Get projector precision from JSON config (defaults to f16 if not specified)
        PROJECTOR_PRECISION=$(python ./scripts/get_projector_precision.py resources/json/latest/hf_collection_mapping_gguf.json "${{ env.REPO_NAME }}" "f16")
        echo "Projector precision for ${{ env.REPO_NAME }}: ${PROJECTOR_PRECISION}"

        echo "TARGET_REPO_ID=${{inputs.target_repo_owner}}/${{env.REPO_NAME}}${{inputs.target_repo_name_ext}}" >> $GITHUB_ENV
        echo "BASE_FNAME_QUANTIZED_GGUF=${{ env.REPO_NAME }}-${{inputs.quantization}}${{env.EXT_GGUF}}" >> $GITHUB_ENV
        echo "BASE_FNAME_MMPROJ_GGUF=${{ env.F16_MMPROJ_MODEL_BASE_FILENAME }}-${PROJECTOR_PRECISION}${{env.EXT_GGUF}}" >> $GITHUB_ENV
        echo "BASE_FNAME_LOG_FILE=${{env.REPO_NAME}}-${{inputs.quantization}}-${{env.LLAMA_CLI_TOOL}}${{inputs.ext_log}}" >> $GITHUB_ENV
        echo "BASE_FNAME_RESPONSE_FILE=${{env.REPO_NAME}}-${{inputs.quantization}}-${{env.LLAMA_CLI_TOOL}}${{inputs.ext_response}}" >> $GITHUB_ENV

    - name: set-derivative-env-vars-2
      run: |
        echo "LOCAL_MODEL_PATH=${{env.MODEL_DOWNLOAD_DIR}}/${{env.TARGET_REPO_ID}}" >> $GITHUB_ENV

    - name: set-derivative-env-vars-3
      run: |
        echo "LOCAL_FNAME_QUANTIZED_GGUF=${{env.LOCAL_MODEL_PATH}}/${{env.BASE_FNAME_QUANTIZED_GGUF}}" >> $GITHUB_ENV
        echo "LOCAL_FNAME_MMPROJ_GGUF=${{env.LOCAL_MODEL_PATH}}/${{env.BASE_FNAME_MMPROJ_GGUF}}" >> $GITHUB_ENV

    - name: verify-github-env
      run: |
        echo "================== Derivative Environment Variables 1 =================="
        echo "TARGET_REPO_ID='$TARGET_REPO_ID' (${{ env.TARGET_REPO_ID }})"
        echo "BASE_FNAME_QUANTIZED_GGUF='$BASE_FNAME_QUANTIZED_GGUF' (${{ env.BASE_FNAME_QUANTIZED_GGUF }})"
        echo "BASE_FNAME_MMPROJ_GGUF='$BASE_FNAME_MMPROJ_GGUF' (${{ env.BASE_FNAME_MMPROJ_GGUF }})"
        echo "BASE_FNAME_LOG_FILE='$BASE_FNAME_LOG_FILE' (${{ env.BASE_FNAME_LOG_FILE }})"
        echo "BASE_FNAME_RESPONSE_FILE='$BASE_FNAME_RESPONSE_FILE' (${{ env.BASE_FNAME_RESPONSE_FILE }})"
        echo "================== Derivative Environment Variables 2 =================="
        echo "LOCAL_MODEL_PATH='$LOCAL_MODEL_PATH' (${{ env.LOCAL_MODEL_PATH }})"
        echo "================== Derivative Environment Variables 3 =================="
        echo "LOCAL_FNAME_QUANTIZED_GGUF='$LOCAL_FNAME_QUANTIZED_GGUF' (${{ env.LOCAL_FNAME_QUANTIZED_GGUF }})"

    - name: verify-llama-mtmd-cli-runtime
      if: env.VERIFY_RUNTIME == 'true'
      continue-on-error: false
      run: |
        echo "Verifying llama-mtmd-cli runtime on ${{ runner.os }} using build tag: ${{ inputs.llamacpp_build_tag }}"
        LLAMA_CLI_PATH="./$LLAMA_BIN_DIR/${{env.LLAMA_CLI_TOOL}}"

        if [ ! -f "$LLAMA_CLI_PATH" ]; then
          echo "[ERROR] llama-mtmd-cli binary not found at $LLAMA_CLI_PATH"
          exit 1
        fi

        # Check if binary is executable
        if [ ! -x "$LLAMA_CLI_PATH" ]; then
          echo "[ERROR] llama-mtmd-cli binary is not executable"
          chmod +x "$LLAMA_CLI_PATH"
          echo "[INFO] Made binary executable"
        fi

        # Test basic execution (help/version)
        echo "Testing llama-mtmd-cli execution..."
        $LLAMA_CLI_PATH --version || $LLAMA_CLI_PATH --help || true

        if [ $? -ne 0 ]; then
          echo "[WARNING] llama-mtmd-cli execution test returned non-zero exit code"
          echo "Checking for dynamic library dependencies..."
          if command -v otool &> /dev/null; then
            echo "macOS: Checking dynamic libraries with otool..."
            otool -L $LLAMA_CLI_PATH
          elif command -v ldd &> /dev/null; then
            echo "Linux: Checking dynamic libraries with ldd..."
            ldd $LLAMA_CLI_PATH
          fi
        else
          echo "[SUCCESS] llama-mtmd-cli runtime verification passed"
        fi

    - name: test-quantized-model-exists
      run: |
        # First check for the unsplit (single-file) quantized GGUF.
        # If not found, probe for the first shard (-00001-of-NNNNN.gguf) which indicates
        # the quantized GGUF was uploaded as split files by the quantize workflow.
        UNSPLIT_EXISTS=$(python ./scripts/hf_model_file_exists.py ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_QUANTIZED_GGUF }} ${{secrets.hf_token}})
        echo "Unsplit file check → '$UNSPLIT_EXISTS'"

        if [[ "$UNSPLIT_EXISTS" == "True" ]]; then
          echo "✅ Unsplit quantized GGUF found: '${{env.BASE_FNAME_QUANTIZED_GGUF}}'"
          echo "QUANTIZED_MODEL_EXISTS=true" >> $GITHUB_ENV
          echo "IS_SPLIT_GGUF=0" >> $GITHUB_ENV
        else
          # Probe for first shard: <basename>-00001-of-0000N.gguf (N = 2..9)
          BASENAME="${{ env.BASE_FNAME_QUANTIZED_GGUF }}"
          BASENAME="${BASENAME%.gguf}"
          SHARD1_FOUND=""
          for N in $(seq -w 2 9); do
            CANDIDATE="${BASENAME}-00001-of-0000${N}.gguf"
            SHARD_EXISTS=$(python ./scripts/hf_model_file_exists.py ${{ env.TARGET_REPO_ID }} "$CANDIDATE" ${{secrets.hf_token}})
            if [[ "$SHARD_EXISTS" == "True" ]]; then
              SHARD1_FOUND="$CANDIDATE"
              echo "✅ Split quantized GGUF detected — first shard: '$SHARD1_FOUND'"
              echo "QUANTIZED_MODEL_EXISTS=true" >> $GITHUB_ENV
              echo "IS_SPLIT_GGUF=1" >> $GITHUB_ENV
              echo "SHARD1_FNAME=$SHARD1_FOUND" >> $GITHUB_ENV
              break
            fi
          done
          if [[ -z "$SHARD1_FOUND" ]]; then
            echo "❌ FAILURE: neither unsplit nor split quantized GGUF found in '${{ env.TARGET_REPO_ID }}'."
            exit 2
          fi
        fi

    - name: download-quantized-llm-gguf-hf-hub-download
      if: env.QUANTIZED_MODEL_EXISTS == 'true' && env.IS_SPLIT_GGUF == '0'
      run: |
        echo "Downloading unsplit quantized GGUF: '${{env.BASE_FNAME_QUANTIZED_GGUF}}'..."
        python ./scripts/hf_file_download.py ${{ env.MODEL_DOWNLOAD_DIR}} ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_QUANTIZED_GGUF }} ${{secrets.hf_token}}
        ls -al ${{env.MODEL_DOWNLOAD_DIR}}/${{ env.TARGET_REPO_ID }}/*${{env.EXT_GGUF}}

    - name: download-and-merge-split-quantized-gguf
      if: env.QUANTIZED_MODEL_EXISTS == 'true' && env.IS_SPLIT_GGUF == '1'
      run: |
        # The quantized GGUF was uploaded as shards. Download every shard then merge
        # them back into a single file using llama-gguf-split --merge.
        MERGE_TOOL="./$LLAMA_BIN_DIR/llama-gguf-split"
        if [ ! -f "$MERGE_TOOL" ]; then
          echo "::error::llama-gguf-split not found at $MERGE_TOOL (build tag: ${{ inputs.llamacpp_build_tag }})"
          exit 1
        fi
        chmod +x "$MERGE_TOOL"

        DEST_DIR="${{ env.MODEL_DOWNLOAD_DIR }}/${{ env.TARGET_REPO_ID }}"
        mkdir -p "$DEST_DIR"

        BASENAME="${{ env.BASE_FNAME_QUANTIZED_GGUF }}"
        BASENAME="${BASENAME%.gguf}"

        # Parse total shard count from the first shard filename
        FIRST="${{ env.SHARD1_FNAME }}"
        TOTAL=$(echo "$FIRST" | grep -oP '(?<=of-)\d+(?=\.gguf)')
        echo "Downloading $TOTAL shard(s) for '${{ env.BASE_FNAME_QUANTIZED_GGUF }}'..."

        for SHARD_INDEX in $(seq 1 $((10#$TOTAL))); do
          PADDED=$(printf "%05d" $SHARD_INDEX)
          SHARD_FILE="${BASENAME}-${PADDED}-of-${TOTAL}.gguf"
          echo "Downloading shard: '$SHARD_FILE'"
          python ./scripts/hf_file_download.py "${{ env.MODEL_DOWNLOAD_DIR }}" "${{ env.TARGET_REPO_ID }}" "$SHARD_FILE" ${{secrets.hf_token}}
          SHARD_PATH="$DEST_DIR/$SHARD_FILE"
          if [ ! -f "$SHARD_PATH" ]; then
            echo "::error::Expected shard not found after download: $SHARD_PATH"
            exit 1
          fi
          ls -lh "$SHARD_PATH"
        done

        # Merge all shards into a single quantized GGUF for testing
        FIRST_SHARD="$DEST_DIR/${{ env.SHARD1_FNAME }}"
        MERGED_FILE="$DEST_DIR/${{ env.BASE_FNAME_QUANTIZED_GGUF }}"
        echo "Merging shards → '$MERGED_FILE'"
        "$MERGE_TOOL" --merge "$FIRST_SHARD" "$MERGED_FILE"
        ls -lh "$MERGED_FILE"

        # Remove the individual shards to free runner disk space
        echo "Removing shard files to free disk space..."
        rm -f "$DEST_DIR/${BASENAME}"-*-of-*.gguf
        ls -lh "$DEST_DIR"

    - name: download-mmproj-gguf-hf-hub-download
      run: |
        echo "Downloading model: ${{env.BASE_FNAME_MMPROJ_GGUF}}..."
        python ./scripts/hf_file_download.py ${{ env.MODEL_DOWNLOAD_DIR}} ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_MMPROJ_GGUF }} ${{secrets.hf_token}}
        ls -al ${{env.MODEL_DOWNLOAD_DIR}}/${{ env.TARGET_REPO_ID }}/*${{env.EXT_GGUF}}

    - name: verify-downloaded-files
      if: env.DEBUG == 'true' && runner.os == 'macOS'
      run: |
        find . -name \*.gguf -type f
        find . -name \*.wav -type f

    - name: Print Storage & Memory Info (macOS)
      if: inputs.debug == true && runner.os == 'macOS'
      run: |
        df
        echo "--------------------"
        xcodebuild -version
        clang --version
        echo "--------------------"
        top -l 1 | grep -E "^CPU|^PhysMem"
        echo "--------------------"

    - name: Print Storage & Memory Info (Linux)
      if: inputs.debug == true  && runner.os == 'Linux'
      run: |
        df -h
        echo "--------------------"
        gcc --version || lsb_release -a
        echo "--------------------"
        free -h
        echo "--------------------"
        top -b -n 1 | head -n 5
        echo "--------------------"

    # OPTIMIZATION: Verbose flag is now configurable via inputs.verbose (default: true)
    # Verbose mode causes per-token parsing overhead; disable if tests timeout
    # Added --no-display-prompt and --simple-io to suppress ASCII art and progress indicators
    - name: test-speech-model
      if: env.TEST_LLAMA_CLI == 'true'
      timeout-minutes: 10
      continue-on-error: true
      run: |
        echo "invoking ${{env.LLAMA_CLI_TOOL}} from build tag: ${{ inputs.llamacpp_build_tag }}"
        echo "env.LOCAL_FNAME_MMPROJ_GGUF=${{env.LOCAL_FNAME_MMPROJ_GGUF}}"
        echo "env.LOCAL_FNAME_QUANTIZED_GGUF=${{env.LOCAL_FNAME_QUANTIZED_GGUF}}"
        echo "VERBOSE mode: ${{env.VERBOSE}}"

        VERBOSE_FLAG=""
        if [[ "${{env.VERBOSE}}" == "true" ]]; then
          VERBOSE_FLAG="--verbose"
        fi

        LLAMA_CLI_PATH="./$LLAMA_BIN_DIR/${{env.LLAMA_CLI_TOOL}}"

        # Note: Audio input flag may need to be adjusted based on llama.cpp speech support
        $LLAMA_CLI_PATH -m ${{env.LOCAL_FNAME_QUANTIZED_GGUF}} \
            --mmproj ${{env.LOCAL_FNAME_MMPROJ_GGUF}} \
            --audio ${{env.TEST_AUDIO_PATH}}${{env.TEST_AUDIO_FILE}} \
            -p "${{env.LLAMA_REQUEST_PROMPT_USER}}" \
            --temp ${{env.LLAMA_REQUEST_TEMP}} \
            --jinja \
            $VERBOSE_FLAG \
            --log-file ${{env.BASE_FNAME_LOG_FILE}} 1>${{env.BASE_FNAME_RESPONSE_FILE}}
        if [ $? -eq 1 ]; then
          echo "[ERROR] ${{env.LLAMA_CLI_TOOL}} failed:"
          ls -al
          echo "${{env.BASE_FNAME_LOG_FILE}}: '$(cat ${{env.BASE_FNAME_LOG_FILE}})'"
          echo "${{env.BASE_FNAME_RESPONSE_FILE}}: '$(cat ${{env.BASE_FNAME_RESPONSE_FILE}})'"
          exit 1
        fi
        echo "[SUCCESS] ${{env.LLAMA_CLI_TOOL}} succeeded:"
        echo "${{env.BASE_FNAME_LOG_FILE}}: '$(cat ${{env.BASE_FNAME_LOG_FILE}})'"
        echo "${{env.BASE_FNAME_RESPONSE_FILE}}: '$(cat ${{env.BASE_FNAME_RESPONSE_FILE}})'"
        echo "${{env.BASE_FNAME_RESPONSE_FILE}} ($(wc -w ${{env.BASE_FNAME_RESPONSE_FILE}} | awk '{print $1}') words):\n'$(cat ${{env.BASE_FNAME_RESPONSE_FILE}})'"

    - name: show-response
      run: |
        cat ${{env.BASE_FNAME_RESPONSE_FILE}}

    - name: test-llama-cli-response-with-regex
      if: env.TEST_LLAMA_CLI == 'true'
      run: |
        matched=$(python ./scripts/test_regex_match_file.py "${{env.LLAMA_RESPONSE_REGEX}}" ${{env.BASE_FNAME_RESPONSE_FILE}})
        echo "matched: '$matched'"
        if [[ "$matched" == "False" ]]; then
          echo "❌ [FAILURE] Regex \`${{env.LLAMA_RESPONSE_REGEX}}\` NOT matched in llama-speech-cli response."
        else
          echo "✅ [SUCCESS] Regex \`${{env.LLAMA_RESPONSE_REGEX}}\` matched in llama-speech-cli response."
        fi

    - name: test-llama-cli-response-with-regex-word-match
      if: env.TEST_LLAMA_CLI == 'true'
      run: |
        python_output=$(python ./scripts/test_regex_match_file_2.py "${{env.BASE_FNAME_RESPONSE_FILE}}" "${{env.LLAMA_RESPONSE_WORDS}}")
        echo "Full Python Output: $python_output"

        # Extract the last line of the output, which contains "True" or "False"
        return_value=$(echo "$python_output" | tail -n 1)

        # Use the extracted "boolean" string in a conditional (case-insensitive comparison)
        # Convert to lowercase using tr for portability across bash versions
        return_value_lower=$(echo "$return_value" | tr '[:upper:]' '[:lower:]')
        if [[ "$return_value_lower" == "true" ]]; then
          echo "✅ [SUCCESS]: $python_output"
        else
          echo "❌ [FAILURE]: $python_output"
        fi

    # ========================= Upload log as artifact ======================================

    - name: Upload log artifact
      if: env.TEST_LLAMA_CLI == 'true'
      id: artifact-upload-log
      uses: actions/upload-artifact@v6
      with:
        overwrite: true
        retention-days: ${{env.GH_ARTIFACT_RETENTION}}
        name: ${{env.REPO_NAME}}-${{inputs.quantization}}-${{env.LLAMA_CLI_TOOL}}-log
        path: ${{env.BASE_FNAME_LOG_FILE}}

    - name: Show log artifact ID
      if: env.TEST_LLAMA_CLI == 'true'
      id: show-artifact-id-log
      run:  echo 'Artifact ID is ${{ steps.artifact-upload-log.outputs.artifact-id }}'

    # ========================= Upload response as artifact ======================================

    - name: Upload response artifact
      if: env.TEST_LLAMA_CLI == 'true'
      id: artifact-upload-response
      uses: actions/upload-artifact@v6
      with:
        overwrite: true
        retention-days: ${{env.GH_ARTIFACT_RETENTION}}
        name: ${{env.REPO_NAME}}-${{inputs.quantization}}-${{env.LLAMA_CLI_TOOL}}-response
        path: ${{env.BASE_FNAME_RESPONSE_FILE}}

    - name: Show response artifact ID
      if: env.TEST_LLAMA_CLI == 'true'
      id: show-artifact-id-response
      run:  echo 'Artifact ID is ${{ steps.artifact-upload-response.outputs.artifact-id }}'



