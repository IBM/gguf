name: Build llama.cpp Binaries
run-name: "[RELEASE] Build llama.cpp Binaries [${{ inputs.llama_cpp_version }}]"

on:
  workflow_dispatch:
    inputs:
      llama_cpp_version:
        description: 'llama.cpp version (commit hash or tag)'
        required: true
        default: 'b9850'
        type: string
      release_tag_extension:
        description: 'Optional release tag extension (appended after date with dash). Date (YYYYMMDD) is always included. Example: if extension="v2", tag becomes "llama.cpp-b8100-20260415-v2"'
        required: false
        type: string
      build_macos_arm64:
        description: 'Build macOS ARM64 (Apple Silicon) binaries'
        required: false
        default: true
        type: boolean
      build_linux_arm64:
        description: 'Build Linux ARM64 (aarch64) binaries'
        required: false
        default: true
        type: boolean
      build_linux_x86_64:
        description: 'Build Linux x86_64 (Intel/AMD) binaries'
        required: false
        default: false
        type: boolean
      debug:
        description: 'Enable debug output'
        required: false
        default: false
        type: boolean
      minimize_acceleration:
        description: 'Disable all hardware acceleration for maximum compatibility'
        required: false
        default: false
        type: boolean
      enable_metal:
        description: 'Enable Metal GPU acceleration for macOS (Apple Silicon). Provides 10-50x speedup on M1/M2/M3/M4. Runtime detection ensures compatibility on all platforms.'
        required: false
        default: false
        type: boolean
      openssl_static:
        description: 'Force static linking of OpenSSL (avoids runtime dependencies on libssl/libcrypto)'
        required: false
        default: true
        type: boolean

env:
  LLAMA_CPP_REPO: 'https://github.com/ggerganov/llama.cpp.git'
  ARTIFACT_RETENTION_DAYS: 90
  # llama-run was removed after b6808, so only build it for this version and older
  LLAMA_RUN_LAST_VERSION: 6808
  # llama-completion was introduced at b8742; skip verification/packaging for older builds
  LLAMA_COMPLETION_FIRST_VERSION: 8742
  # llama-mtmd-cli was introduced at b8742; skip verification/packaging for older builds
  LLAMA_MTMD_FIRST_VERSION: 8742
  # --single-turn flag for llama-cli was introduced after b6808
  LLAMA_SINGLE_TURN_FIRST_VERSION: 6809

jobs:
  build-binaries:
    name: Build llama.cpp Binaries (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-latest # gguf-macos-mini
            platform_suffix: darwin-arm64
            build_enabled: ${{ inputs.build_macos_arm64 }}
          - platform: linux-arm64
            runner: ubuntu-24.04-arm # gguf-ubuntu-basic
            platform_suffix: linux-arm64
            build_enabled: ${{ inputs.build_linux_arm64 }}
          - platform: linux-x86_64
            runner: ubuntu-latest
            platform_suffix: linux-x86_64
            build_enabled: ${{ inputs.build_linux_x86_64 }}

    steps:
      - name: Print CMake version
        if: matrix.build_enabled
        run: |
          set -e
          echo "CMake version:"
          cmake --version || { echo "ERROR: CMake not found or failed to execute"; exit 1; }

      - name: Checkout repository
        if: matrix.build_enabled
        uses: actions/checkout@v6

      - name: Set llama.cpp version
        if: matrix.build_enabled
        id: set_version
        run: |
          VERSION="${{ inputs.llama_cpp_version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using llama.cpp version: $VERSION"

          # Determine if llama-run should be built (only for b$LLAMA_RUN_LAST_VERSION and older)
          INCLUDE_LLAMA_RUN="false"
          INCLUDE_LLAMA_COMPLETION="true"
          INCLUDE_LLAMA_MTMD="true"
          INCLUDE_SINGLE_TURN="true"
          if [[ "$VERSION" =~ ^b([0-9]+)$ ]]; then
            VERSION_NUM="${BASH_REMATCH[1]}"
            if [ "$VERSION_NUM" -le ${{ env.LLAMA_RUN_LAST_VERSION }} ]; then
              INCLUDE_LLAMA_RUN="true"
            fi
            if [ "$VERSION_NUM" -lt ${{ env.LLAMA_COMPLETION_FIRST_VERSION }} ]; then
              INCLUDE_LLAMA_COMPLETION="false"
            fi
            if [ "$VERSION_NUM" -lt ${{ env.LLAMA_MTMD_FIRST_VERSION }} ]; then
              INCLUDE_LLAMA_MTMD="false"
            fi
            if [ "$VERSION_NUM" -lt ${{ env.LLAMA_SINGLE_TURN_FIRST_VERSION }} ]; then
              INCLUDE_SINGLE_TURN="false"
            fi
          fi
          echo "include_llama_run=$INCLUDE_LLAMA_RUN" >> $GITHUB_OUTPUT
          echo "include_llama_completion=$INCLUDE_LLAMA_COMPLETION" >> $GITHUB_OUTPUT
          echo "include_llama_mtmd=$INCLUDE_LLAMA_MTMD" >> $GITHUB_OUTPUT
          echo "include_single_turn=$INCLUDE_SINGLE_TURN" >> $GITHUB_OUTPUT
          echo "Include llama-run in build: $INCLUDE_LLAMA_RUN (threshold: b${{ env.LLAMA_RUN_LAST_VERSION }})"
          echo "Include llama-completion in build: $INCLUDE_LLAMA_COMPLETION (first version: b${{ env.LLAMA_COMPLETION_FIRST_VERSION }})"
          echo "Include llama-mtmd-cli in build: $INCLUDE_LLAMA_MTMD (first version: b${{ env.LLAMA_MTMD_FIRST_VERSION }})"
          echo "Include --single-turn flag: $INCLUDE_SINGLE_TURN (first version: b${{ env.LLAMA_SINGLE_TURN_FIRST_VERSION }})"

      - name: Verify environment
        if: matrix.build_enabled
        run: |
          echo "CMake version:"
          cmake --version
          echo "System architecture:"
          uname -m

      - name: Clone llama.cpp
        if: matrix.build_enabled
        run: |
          git clone --depth 1 --branch ${{ steps.set_version.outputs.version }} ${{ env.LLAMA_CPP_REPO }}
          cd llama.cpp
          echo "Cloned llama.cpp at version: ${{ steps.set_version.outputs.version }}"
          git log -1 --oneline

      - name: Patch repack.cpp const-correctness (x86 AVX helpers)
        if: matrix.build_enabled && matrix.platform == 'linux-x86_64'
        run: |
          # PROBLEM: ggml/src/ggml-cpu/arch/x86/repack.cpp defines two static inline AVX helpers
          # (__avx_repeat_f32cx8_load and __avx_rearranged_f32cx8_load) with non-const ggml_fp16_t*
          # parameters, but they are called with const ggml_half* values (struct member `.d` fields).
          # GCC treats this implicit const-drop as a hard error, breaking the linux-x86_64 build.
          #
          # WORKAROUND: This step patches the two function signatures in-place with sed to add const,
          # making the call sites conformant. This is not ideal — it mutates cloned upstream source
          # rather than fixing the root cause — but it is the minimal intervention available here.
          #
          # REMOVE THIS STEP when either condition is met:
          #   1. The upstream llama.cpp version being built contains the fix (i.e. the two helpers
          #      already declare their first parameter as `const ggml_fp16_t *x`).
          #   2. The linux-x86_64 build target is dropped from this workflow entirely.
          REPACK="llama.cpp/ggml/src/ggml-cpu/arch/x86/repack.cpp"
          if [ -f "$REPACK" ]; then
            sed -i \
              's/static inline __m256 __avx_repeat_f32cx8_load(ggml_fp16_t \*x)/static inline __m256 __avx_repeat_f32cx8_load(const ggml_fp16_t *x)/' \
              "$REPACK"
            sed -i \
              's/static inline __m256 __avx_rearranged_f32cx8_load(ggml_fp16_t \*x,/static inline __m256 __avx_rearranged_f32cx8_load(const ggml_fp16_t *x,/' \
              "$REPACK"
            echo "Patched $REPACK"
          else
            echo "WARNING: $REPACK not found, skipping patch"
          fi

      - name: Configure CMake
        if: matrix.build_enabled
        run: |
          cd llama.cpp

          # Platform-specific configuration
          if [ "${{ matrix.platform }}" = "linux-arm64" ]; then
            echo "Configuring for Linux ARM64..."
            # Base flags for Linux ARM64
            CMAKE_FLAGS="-DCMAKE_SYSTEM_NAME=Linux"
            CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_SYSTEM_PROCESSOR=aarch64"
            CMAKE_FLAGS="$CMAKE_FLAGS -DBUILD_SHARED_LIBS=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_NATIVE_DEFAULT=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_BUILD_TYPE=Release"
            CMAKE_FLAGS="$CMAKE_FLAGS -DLLAMA_BUILD_EXAMPLES=ON"

            # Enable ARM64 SIMD optimizations (unless minimize_acceleration is true)
            if [ "${{ inputs.minimize_acceleration }}" != "true" ]; then
              CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_C_FLAGS=\"-march=armv8.2-a -mtune=generic\""
              CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_CXX_FLAGS=\"-march=armv8.2-a -mtune=generic\""
              CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_SVE=OFF"
            else
              CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_C_FLAGS=\"-march=armv8-a -mtune=generic\""
              CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_CXX_FLAGS=\"-march=armv8-a -mtune=generic\""
            fi
          elif [ "${{ matrix.platform }}" = "macos-arm64" ]; then
            echo "Configuring for macOS ARM64..."

            # Base flags for macOS ARM64 (cross-compilation)
            CMAKE_FLAGS="-DCMAKE_OSX_ARCHITECTURES=arm64"
            CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0"
            CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_SYSTEM_NAME=Darwin"
            CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_SYSTEM_PROCESSOR=arm64"
            CMAKE_FLAGS="$CMAKE_FLAGS -DBUILD_SHARED_LIBS=OFF"

            # Metal GPU acceleration (configurable via input parameter)
            # NOTE: GGML_METAL_EMBED_LIBRARY is NOT used here
            # Testing showed that embedding Metal shaders (GGML_METAL_EMBED_LIBRARY=ON) caused
            # significant performance degradation in BVT tests.
            if [ "${{ inputs.enable_metal }}" = "true" ]; then
              echo "Enabling Metal GPU acceleration for Apple Silicon..."
              CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_METAL=ON"
            else
              echo "Metal GPU acceleration disabled (CPU-only mode for maximum compatibility)"
              CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_METAL=OFF"
            fi

            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_NATIVE_DEFAULT=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_CROSSCOMPILING=TRUE"

            # Acceleration flags - Optimized for GitHub Actions M1 runners (2026)
            # Original (maximum compatibility, slow):
            # - CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_C_FLAGS=\"-march=armv8-a -mtune=generic\""
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_NO_ACCELERATE=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_ACCELERATE=ON"
            CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_C_FLAGS=\"-march=armv8.2-a -mtune=apple-m1\""

            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_SVE=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_BUILD_TYPE=Release"
            CMAKE_FLAGS="$CMAKE_FLAGS -DLLAMA_BUILD_EXAMPLES=ON"
          else
            echo "Configuring for Linux x86_64..."
            # Base flags for Linux x86_64
            CMAKE_FLAGS="-DCMAKE_SYSTEM_NAME=Linux"
            CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_SYSTEM_PROCESSOR=x86_64"
            CMAKE_FLAGS="$CMAKE_FLAGS -DBUILD_SHARED_LIBS=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_NATIVE_DEFAULT=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_C_FLAGS=\"-march=x86-64 -mtune=generic\""
            CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_CXX_FLAGS=\"-march=x86-64 -mtune=generic\""
            CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_BUILD_TYPE=Release"
            CMAKE_FLAGS="$CMAKE_FLAGS -DLLAMA_BUILD_EXAMPLES=ON"

            # Enable x86_64 SIMD optimizations (unless minimize_acceleration is true)
            if [ "${{ inputs.minimize_acceleration }}" != "true" ]; then
              CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_AVX=ON"
              CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_AVX2=ON"
              CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_FMA=ON"
            fi
          fi

          # Disable CURL unconditionally: the runner has no libcurl-dev and URL-based
          # model downloading is not needed in this pipeline. Safe across all versions:
          # older builds (e.g. b6808) where LLAMA_CURL defaults to ON will respect this;
          # newer builds where it was renamed to GGML_CURL or deprecated just emit a warning.
          CMAKE_FLAGS="$CMAKE_FLAGS -DLLAMA_CURL=OFF"

          # Optional OpenSSL static linking (only when openssl_static is true)
          if [ "${{ inputs.openssl_static }}" = "true" ]; then
            echo "Forcing static linking of OpenSSL..."
            CMAKE_FLAGS="$CMAKE_FLAGS -DOPENSSL_USE_STATIC_LIBS=ON"
          fi

          # Additional acceleration-disabling flags (only when minimize_acceleration is true)
          if [ "${{ inputs.minimize_acceleration }}" = "true" ]; then
            echo "Applying additional acceleration-disabling flags for maximum compatibility..."
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_METAL_EMBED_LIBRARY=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_ACCELERATE=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_BLAS=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_CUDA=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_VULKAN=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_KOMPUTE=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_SYCL=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_AVX=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_AVX2=OFF"
            CMAKE_FLAGS="$CMAKE_FLAGS -DGGML_FMA=OFF"
            if [ "${{ matrix.platform }}" = "linux-arm64" ]; then
              CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_C_FLAGS=\"-march=armv8-a -mtune=generic\""
              CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_CXX_FLAGS=\"-march=armv8-a -mtune=generic\""
            elif [ "${{ matrix.platform }}" = "macos-arm64" ]; then
              CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_CXX_FLAGS=\"-march=armv8-a -mtune=generic\""
            else
              CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_CXX_FLAGS=\"-march=x86-64 -mtune=generic\""
            fi
          fi

          # Save CMAKE_FLAGS for later use in README (save before creating build dir)
          echo "$CMAKE_FLAGS" > cmake_flags.txt

          # Execute cmake with all flags
          eval cmake -B build $CMAKE_FLAGS

          # Platform-specific compiler flag explanation
          if [ "${{ matrix.platform }}" = "linux-arm64" ]; then
            echo "Compiler flags for Linux ARM64:"
            echo "  -march=armv8.2-a: Target ARMv8.2-A instruction set (compatible with most modern ARM64 CPUs)"
            echo "  -mtune=generic: Optimize for generic ARM64 processors"
            echo "  Result: Binaries work on any ARMv8.2-A+ Linux arm64 system with reasonable performance"
          elif [ "${{ matrix.platform }}" = "macos-arm64" ]; then
            echo "Compiler flags for macOS ARM64 (optimized for GitHub Actions M1):"
            echo "  -march=armv8.2-a: Target ARMv8.2-A instruction set (M1 baseline)"
            echo "  -mtune=apple-m1: Optimize for Apple M1 CPU characteristics"
            echo "  GGML_ACCELERATE=ON: Enable Apple Accelerate framework (CPU-optimized BLAS, 2-4x faster)"
            if [ "${{ inputs.enable_metal }}" = "true" ]; then
              echo "  GGML_METAL=ON: Metal GPU acceleration enabled (10-50x faster on Apple Silicon)"
              echo "  GGML_METAL_EMBED_LIBRARY=ON: Metal shaders embedded in binary (self-contained)"
              echo "  Result: GPU-accelerated binaries with automatic runtime detection"
            else
              echo "  GGML_METAL=OFF: CPU-only mode (maximum compatibility, slower)"
              echo "  Result: CPU-only binaries optimized for M1 runners"
            fi
            echo "  Note: Compatible with all Apple Silicon (M1/M2/M3/M4)"
          else
            echo "Compiler flags for Linux x86_64:"
            echo "  -march=x86-64: Target baseline x86-64 instruction set"
            echo "  -mtune=generic: Optimize for generic x86_64 processors"
            echo "  Result: Binaries work on any x86_64 Linux system with reasonable performance"
          fi

      - name: Build binaries
        if: matrix.build_enabled
        run: |
          cd llama.cpp
          cmake --build build --config Release -j $(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Verify binaries exist
        if: matrix.build_enabled
        run: |
          cd llama.cpp/build/bin
          echo "Built binaries:"
          ls -lh
          echo ""
          echo "Checking for required binaries..."

          # Core binaries (always required)
          for binary in llama-cli llama-quantize llama-server llama-gguf llama-gguf-split llama-embedding; do
            if [ -f "$binary" ]; then
              echo "✓ $binary found"
            else
              echo "✗ $binary NOT FOUND"
              exit 1
            fi
          done

          # llama-completion: only available from b${{ env.LLAMA_COMPLETION_FIRST_VERSION }} onwards
          if [ "${{ steps.set_version.outputs.include_llama_completion }}" = "true" ]; then
            if [ -f "llama-completion" ]; then
              echo "✓ llama-completion found"
            else
              echo "✗ llama-completion NOT FOUND (expected for version ${{ steps.set_version.outputs.version }})"
              exit 1
            fi
          else
            echo "ℹ llama-completion not checked (not available before b${{ env.LLAMA_COMPLETION_FIRST_VERSION }}, building ${{ steps.set_version.outputs.version }})"
          fi

          # llama-mtmd-cli: only available from b${{ env.LLAMA_MTMD_FIRST_VERSION }} onwards
          if [ "${{ steps.set_version.outputs.include_llama_mtmd }}" = "true" ]; then
            if [ -f "llama-mtmd-cli" ]; then
              echo "✓ llama-mtmd-cli found"
            else
              echo "✗ llama-mtmd-cli NOT FOUND (expected for version ${{ steps.set_version.outputs.version }})"
              exit 1
            fi
          else
            echo "ℹ llama-mtmd-cli not checked (not available before b${{ env.LLAMA_MTMD_FIRST_VERSION }}, building ${{ steps.set_version.outputs.version }})"
          fi

          # See if llama-run is supported based upon the last version that was known to support it
          if [ "${{ steps.set_version.outputs.include_llama_run }}" = "true" ]; then
            if [ -f "llama-run" ]; then
              echo "✓ llama-run found (version ${{ steps.set_version.outputs.version }})"
            else
              echo "✗ llama-run NOT FOUND (expected for version ${{ steps.set_version.outputs.version }})"
              exit 1
            fi
          else
            echo "ℹ llama-run not checked (not built in version ${{ steps.set_version.outputs.version }})"
          fi

      - name: Run smoke tests
        if: matrix.build_enabled
        run: |
          cd llama.cpp/build/bin
          echo "Running smoke tests..."

          # Test llama-cli
          ./llama-cli --version || ./llama-cli --help | head -5

          # Test llama-completion (only from b${{ env.LLAMA_COMPLETION_FIRST_VERSION }} onwards)
          if [ "${{ steps.set_version.outputs.include_llama_completion }}" = "true" ]; then
            ./llama-completion --version || ./llama-completion --help | head -5
          else
            echo "Skipping llama-completion test (not available before b${{ env.LLAMA_COMPLETION_FIRST_VERSION }})"
          fi

          # Test llama-quantize
          ./llama-quantize --help | head -5

          # Test llama-server
          ./llama-server --version || ./llama-server --help | head -5

          # Test llama-run (only for b6808 and older)
          if [ "${{ steps.set_version.outputs.include_llama_run }}" = "true" ]; then
            echo "Testing llama-run (version ${{ steps.set_version.outputs.version }})..."
            ./llama-run --version || ./llama-run --help | head -5
          else
            echo "Skipping llama-run test (not built in version ${{ steps.set_version.outputs.version }})"
          fi

          # Test llama-mtmd-cli (only from b${{ env.LLAMA_MTMD_FIRST_VERSION }} onwards)
          if [ "${{ steps.set_version.outputs.include_llama_mtmd }}" = "true" ]; then
            ./llama-mtmd-cli --version || ./llama-mtmd-cli --help | head -5
          else
            echo "Skipping llama-mtmd-cli test (not available before b${{ env.LLAMA_MTMD_FIRST_VERSION }})"
          fi

          # Test llama-gguf
          echo "Testing llama-gguf..."
          ./llama-gguf 2>&1 | head -10 || echo "llama-gguf requires arguments"

          # Test llama-gguf-split
          echo "Testing llama-gguf-split..."
          ./llama-gguf-split 2>&1 | head -10 || echo "llama-gguf-split requires arguments"

          # Test llama-embedding
          echo "Testing llama-embedding..."
          ./llama-embedding --help | head -10

          echo "All smoke tests passed!"

      - name: List available devices
        if: matrix.build_enabled
        run: |
          cd llama.cpp/build/bin
          echo "=========================================="
          echo "Listing available devices for llama.cpp"
          echo "=========================================="
          if [ "${{ steps.set_version.outputs.include_llama_completion }}" = "true" ]; then
            ./llama-completion --list-devices || echo "Note: --list-devices flag may not be available in version ${{ steps.set_version.outputs.version }}"
          else
            ./llama-cli --help 2>&1 | head -3 || true
            echo "Note: llama-completion not available in version ${{ steps.set_version.outputs.version }} (introduced at b${{ env.LLAMA_COMPLETION_FIRST_VERSION }})"
          fi
          echo "=========================================="
          echo ""
          echo "This information shows what CPU/GPU devices are visible to llama.cpp"
          echo "in the GitHub Actions runner environment. This can help inform future"
          echo "decisions about compiler flags and hardware acceleration options."

      - name: Setup Python for model download
        if: matrix.build_enabled
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        if: matrix.build_enabled
        run: |
          pip install huggingface_hub

      - name: Download test model from HuggingFace
        if: matrix.build_enabled
        run: |
          cd llama.cpp/build/bin
          echo "Downloading small GGUF model for inference test..."
          python3 << 'EOF'
          from huggingface_hub import hf_hub_download
          import os

          # Download a small quantized model for testing
          repo_id = "mrutkows/granite-4.0-1b-GGUF"
          filename = "granite-4.0-1b-Q4_K_M.gguf"

          print(f"Downloading {filename} from {repo_id}...")
          model_path = hf_hub_download(
              repo_id=repo_id,
              filename=filename,
              local_dir=".",
              local_dir_use_symlinks=False
          )
          print(f"Model downloaded to: {model_path}")
          print(f"File size: {os.path.getsize(filename) / (1024*1024):.2f} MB")
          EOF

          ls -lh granite-4.0-1b-Q4_K_M.gguf

      - name: Test llama-cli with real model inference
        if: matrix.build_enabled
        timeout-minutes: 10
        run: |
          cd llama.cpp/build/bin
          echo "Testing llama-cli with actual inference on ${{ matrix.platform }} runner..."
          echo "This verifies the binary works with the build flags in GitHub Actions environment"
          echo ""

          # Run a simple inference test with verbose output and log file
          # --single-turn was added after b${{ env.LLAMA_SINGLE_TURN_FIRST_VERSION }}; omit for older versions
          SINGLE_TURN_FLAG=""
          if [ "${{ steps.set_version.outputs.include_single_turn }}" = "true" ]; then
            SINGLE_TURN_FLAG="--single-turn"
          fi

          ./llama-cli \
            -m granite-4.0-1b-Q4_K_M.gguf \
            -p "Why is the sky blue according to science?" \
            -n 128 \
            --temp 0.0 \
            $SINGLE_TURN_FLAG \
            --verbose \
            --log-file inference_test_error.log 2>&1 | tee inference_test.log

          EXIT_CODE=$?

          # Always display the full output
          echo ""
          echo "=== Full Inference Output ==="
          cat inference_test.log

          # Display error log if it exists
          if [ -f inference_test_error.log ]; then
            echo ""
            echo "=== Error Log (inference_test_error.log) ==="
            cat inference_test_error.log
          fi

          # Check if inference completed successfully
          if [ $EXIT_CODE -eq 0 ]; then
            echo ""
            echo "✅ SUCCESS: llama-cli inference test passed!"
            echo "Binary is confirmed working on ${{ matrix.platform }} with current build flags"
          else
            echo ""
            echo "❌ FAILURE: llama-cli inference test failed with exit code $EXIT_CODE"
            echo "Build flags may not be compatible with ${{ matrix.platform }} runners"
            exit 1
          fi

      - name: Display inference performance metrics
        if: matrix.build_enabled && always()
        run: |
          [ -d llama.cpp/build/bin ] && cd llama.cpp/build/bin || { echo "Build directory not found, skipping metrics"; exit 0; }
          if [ -f inference_test.log ]; then
            echo "=== Inference Performance Metrics ==="
            # Extract timing information from llama-cli output
            grep -E "(llama_perf|tokens per second|generated|prompt)" inference_test.log || echo "No performance metrics found"
          fi

      - name: Create build information README
        if: matrix.build_enabled
        run: |
          cd llama.cpp/build/bin

          # Read the actual CMAKE_FLAGS that were used
          CMAKE_FLAGS_USED=$(cat ../../cmake_flags.txt)

          # Format flags for better readability (one per line)
          CMAKE_FLAGS_FORMATTED=$(echo "$CMAKE_FLAGS_USED" | sed 's/ -D/\n-D/g' | sed 's/^-D/  -D/')

          # Determine if llama-run is included
          if [ "${{ steps.set_version.outputs.include_llama_run }}" = "true" ]; then
            LLAMA_RUN_BINARY="- **llama-run**: Simple inference runner"
          else
            LLAMA_RUN_BINARY="- **llama-run**: ⚠️ Not included (removed after b${{ env.LLAMA_RUN_LAST_VERSION }})"
          fi

          # Determine if llama-completion is included
          if [ "${{ steps.set_version.outputs.include_llama_completion }}" = "true" ]; then
            LLAMA_COMPLETION_BINARY="- **llama-completion**: Simple completion tool (no conversation mode, no banner)"
          else
            LLAMA_COMPLETION_BINARY="- **llama-completion**: ⚠️ Not included (introduced at b${{ env.LLAMA_COMPLETION_FIRST_VERSION }})"
          fi

          # Determine if llama-mtmd-cli is included
          if [ "${{ steps.set_version.outputs.include_llama_mtmd }}" = "true" ]; then
            LLAMA_MTMD_BINARY="- **llama-mtmd-cli**: Multi-turn multi-document CLI tool"
          else
            LLAMA_MTMD_BINARY="- **llama-mtmd-cli**: ⚠️ Not included (introduced at b${{ env.LLAMA_MTMD_FIRST_VERSION }})"
          fi

          # Set platform-specific information
          if [ "${{ matrix.platform }}" = "linux-x86_64" ]; then
            PLATFORM_NAME="Linux (linux-x86_64)"
            ARCHITECTURE="x86_64 (Intel/AMD 64-bit)"
            MIN_VERSION="N/A (portable Linux binary)"
            COMPILER_EXPLANATION="- **-march=x86-64**: Target baseline x86-64 instruction set (compatible with ALL x86_64 CPUs)
          - **-mtune=generic**: Optimize for generic x86_64 processors
          - **Result**: Binaries work on any x86_64 Linux system with reasonable performance"
            USAGE_NOTE="All binaries are statically linked and should run on any modern Linux x86_64 system without additional dependencies."
            BUILD_SUMMARY="- Native Linux x86_64 build
          - Software-only operations (hardware acceleration settings per minimize_acceleration flag)
          - Maximum compatibility across x86_64 platforms
          - Static linking for portability"
          elif [ "${{ matrix.platform }}" = "linux-arm64" ]; then
            PLATFORM_NAME="Linux (linux-arm64)"
            ARCHITECTURE="ARM64 (64-bit ARM / aarch64)"
            MIN_VERSION="N/A (portable Linux arm64 binary)"
            COMPILER_EXPLANATION="- **-march=armv8.2-a**: Target ARMv8.2-A instruction set (compatible with most modern ARM64 CPUs)
          - **-mtune=generic**: Optimize for generic ARM64 processors
          - **Result**: Binaries work on any ARMv8.2-A+ Linux arm64 system (AWS Graviton 2+, Ampere Altra, etc.)"
            USAGE_NOTE="All binaries are statically linked and should run on any modern Linux arm64 system (ARMv8.2-A or newer) without additional dependencies."
            BUILD_SUMMARY="- Native Linux arm64 build (ubuntu-24.04-arm runner)
          - Software-only operations (no GPU acceleration)
          - Compatible with AWS Graviton 2/3/4, Ampere Altra, and other ARMv8.2-A+ platforms
          - Static linking for portability"
          else
            PLATFORM_NAME="macOS (darwin-arm64)"
            ARCHITECTURE="ARM64 (Apple Silicon - M1 optimized)"
            MIN_VERSION="15.0 (Sequoia)"
            if [ "${{ inputs.enable_metal }}" = "true" ]; then
              COMPILER_EXPLANATION="- **-march=armv8.2-a**: Target ARMv8.2-A instruction set (M1 baseline, compatible with M1/M2/M3/M4)
          - **-mtune=apple-m1**: Optimize for Apple M1 CPU characteristics
          - **GGML_ACCELERATE=ON**: Apple Accelerate framework enabled (CPU-optimized BLAS, 2-4x faster)
          - **GGML_METAL=ON**: Metal GPU acceleration enabled (10-50x faster on Apple Silicon)
          - **Note**: Metal shaders are NOT embedded (GGML_METAL_EMBED_LIBRARY not used due to cross-compilation issues)
          - **Result**: GPU-accelerated binaries with runtime Metal shader compilation"
              USAGE_NOTE="All binaries are statically linked and GPU-accelerated for Apple Silicon. Metal acceleration is automatically detected at runtime - uses GPU on M1/M2/M3/M4, falls back to CPU on other platforms. Requires .metal shader files to be present at runtime."
              BUILD_SUMMARY="- Cross-compiled from x86_64 macOS to ARM64 target
          - Metal GPU acceleration enabled (shaders compiled at runtime, not embedded)
          - Apple Accelerate framework enabled for CPU operations
          - Automatic runtime detection (GPU on Apple Silicon, CPU fallback elsewhere)
          - Optimized for GitHub Actions M1 runners (2026 configuration)
          - Compatible with all Apple Silicon (M1/M2/M3/M4)
          - Static linking for portability
          - Note: Requires .metal files for GPU acceleration (not self-contained)"
            else
              COMPILER_EXPLANATION="- **-march=armv8.2-a**: Target ARMv8.2-A instruction set (M1 baseline, compatible with M1/M2/M3/M4)
          - **-mtune=apple-m1**: Optimize for Apple M1 CPU characteristics
          - **GGML_ACCELERATE=ON**: Apple Accelerate framework enabled (CPU-optimized BLAS, 2-4x faster)
          - **GGML_METAL=OFF**: Metal GPU acceleration disabled (CPU-only mode)
          - **Result**: CPU-only binaries optimized for GitHub Actions M1 runners"
              USAGE_NOTE="All binaries are statically linked and optimized for Apple Silicon M1 (GitHub Actions macos-latest runners). CPU-only mode for maximum compatibility. Compatible with all Apple Silicon chips (M1/M2/M3/M4)."
              BUILD_SUMMARY="- Cross-compiled from x86_64 macOS to ARM64 target
          - Apple Accelerate framework enabled for optimized CPU operations
          - CPU-only mode (Metal disabled for maximum compatibility)
          - Optimized for GitHub Actions M1 runners (2026 configuration)
          - Compatible with all Apple Silicon (M1/M2/M3/M4)
          - Static linking for portability"
            fi
          fi

          cat > BUILD_INFO.md << EOF
          # llama.cpp Build Information

          ## Build Details
          - **llama.cpp Version**: ${{ steps.set_version.outputs.version }}
          - **Build Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **Platform**: ${PLATFORM_NAME}
          - **Architecture**: ${ARCHITECTURE}
          - **Minimum OS Version**: ${MIN_VERSION}

          ## Input Parameters
          - **llama_cpp_version**: \`${{ inputs.llama_cpp_version }}\`
          - **target_platform**: \`${{ matrix.platform }}\`
          - **minimize_acceleration**: \`${{ inputs.minimize_acceleration }}\`
          - **enable_metal**: \`${{ inputs.enable_metal }}\`
          - **openssl_static**: \`${{ inputs.openssl_static }}\`
          - **debug**: \`${{ inputs.debug }}\`

          ## CMake Compiler Flags Used
          \`\`\`
          $CMAKE_FLAGS_FORMATTED
          \`\`\`

          ## Compiler Flag Explanation
          $COMPILER_EXPLANATION

          ## Included Binaries
          - **llama-cli**: Main command-line inference tool (conversation mode)
          $LLAMA_COMPLETION_BINARY
          - **llama-quantize**: Model quantization tool
          - **llama-server**: HTTP server for model inference
          $LLAMA_RUN_BINARY
          $LLAMA_MTMD_BINARY
          - **llama-gguf**: GGUF file inspection and manipulation tool
          - **llama-gguf-split**: GGUF file splitting tool for large models
          - **llama-embedding**: Embedding generation tool for text embeddings

          ## Usage
          ${USAGE_NOTE}

          ## Build Configuration Summary
          ${BUILD_SUMMARY}

          ---
          Built with GitHub Actions workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

          echo "Created BUILD_INFO.md"
          cat BUILD_INFO.md

      - name: Create zip archive
        if: matrix.build_enabled
        run: |
          cd llama.cpp/build/bin

          ZIP_NAME="llama-cpp-${{ steps.set_version.outputs.version }}-${{ matrix.platform_suffix }}.zip"

          # Base binaries (always included)
          BINARIES="llama-cli llama-quantize llama-server llama-gguf llama-gguf-split llama-embedding BUILD_INFO.md"

          # Add llama-completion only from b${{ env.LLAMA_COMPLETION_FIRST_VERSION }} onwards
          if [ "${{ steps.set_version.outputs.include_llama_completion }}" = "true" ] && [ -f "llama-completion" ]; then
            BINARIES="$BINARIES llama-completion"
            echo "Including llama-completion in archive (version ${{ steps.set_version.outputs.version }})"
          else
            echo "Excluding llama-completion from archive (version ${{ steps.set_version.outputs.version }}, introduced at b${{ env.LLAMA_COMPLETION_FIRST_VERSION }})"
          fi

          # Add llama-mtmd-cli only from b${{ env.LLAMA_MTMD_FIRST_VERSION }} onwards
          if [ "${{ steps.set_version.outputs.include_llama_mtmd }}" = "true" ] && [ -f "llama-mtmd-cli" ]; then
            BINARIES="$BINARIES llama-mtmd-cli"
            echo "Including llama-mtmd-cli in archive (version ${{ steps.set_version.outputs.version }})"
          else
            echo "Excluding llama-mtmd-cli from archive (version ${{ steps.set_version.outputs.version }}, introduced at b${{ env.LLAMA_MTMD_FIRST_VERSION }})"
          fi

          # Add llama-run only for b${{ env.LLAMA_RUN_LAST_VERSION }} and older
          if [ "${{ steps.set_version.outputs.include_llama_run }}" = "true" ] && [ -f "llama-run" ]; then
            BINARIES="$BINARIES llama-run"
            echo "Including llama-run in archive (version ${{ steps.set_version.outputs.version }})"
          else
            echo "Excluding llama-run from archive (version ${{ steps.set_version.outputs.version }})"
          fi

          zip -r "$ZIP_NAME" $BINARIES
          echo "Created archive: $ZIP_NAME"
          ls -lh "$ZIP_NAME"

      - name: Upload artifacts
        if: matrix.build_enabled
        uses: actions/upload-artifact@v6
        with:
          name: llama-cpp-binaries-${{ steps.set_version.outputs.version }}-${{ matrix.platform_suffix }}
          path: llama.cpp/build/bin/llama-cpp-${{ steps.set_version.outputs.version }}-${{ matrix.platform_suffix }}.zip
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

      - name: Debug output
        if: matrix.build_enabled && inputs.debug == true
        run: |
          echo "=== Environment ==="
          uname -a
          echo ""
          echo "=== CMake version ==="
          cmake --version
          echo ""
          echo "=== Compiler version ==="
          gcc --version
          echo ""
          echo "=== Build directory contents ==="
          find llama.cpp/build -type f -name "llama-*" -o -name "*.zip"

  upload-release-assets:
    name: Upload Release Assets
    needs: build-binaries
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Set release tag
        id: set_tag
        run: |
          # Always include build date (YYYYMMDD)
          BUILD_DATE=$(date -u +"%Y%m%d")

          # Append optional extension if provided (with dash separator)
          if [ -n "${{ inputs.release_tag_extension }}" ]; then
            TAG="llama.cpp-${{ inputs.llama_cpp_version }}-${BUILD_DATE}-${{ inputs.release_tag_extension }}"
            echo "Using release tag with extension: $TAG"
          else
            TAG="llama.cpp-${{ inputs.llama_cpp_version }}-${BUILD_DATE}"
            echo "Using release tag with date only: $TAG"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Display artifact structure
        run: |
          echo "Downloaded artifacts:"
          ls -R artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Find and copy zip files
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          echo "Release assets prepared:"
          ls -lh release-assets/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.set_tag.outputs.tag }}
          files: release-assets/*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Build Summary
    needs: build-binaries
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate summary
        run: |
          VERSION="${{ inputs.llama_cpp_version || 'b8100' }}"

          # Re-calculate version flags for summary job
          INCLUDE_LLAMA_RUN="false"
          INCLUDE_LLAMA_COMPLETION="true"
          INCLUDE_LLAMA_MTMD="true"
          if [[ "$VERSION" =~ ^b([0-9]+)$ ]]; then
            VERSION_NUM="${BASH_REMATCH[1]}"
            if [ "$VERSION_NUM" -le ${{ env.LLAMA_RUN_LAST_VERSION }} ]; then
              INCLUDE_LLAMA_RUN="true"
            fi
            if [ "$VERSION_NUM" -lt ${{ env.LLAMA_COMPLETION_FIRST_VERSION }} ]; then
              INCLUDE_LLAMA_COMPLETION="false"
            fi
            if [ "$VERSION_NUM" -lt ${{ env.LLAMA_MTMD_FIRST_VERSION }} ]; then
              INCLUDE_LLAMA_MTMD="false"
            fi
          fi

          echo "# llama.cpp Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Built Binaries" >> $GITHUB_STEP_SUMMARY
          echo "- llama-cli" >> $GITHUB_STEP_SUMMARY

          # Check if llama-completion should be included
          if [ "$INCLUDE_LLAMA_COMPLETION" = "true" ]; then
            echo "- llama-completion" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ~~llama-completion~~ (not available before b${{ env.LLAMA_COMPLETION_FIRST_VERSION }})" >> $GITHUB_STEP_SUMMARY
          fi

          echo "- llama-quantize" >> $GITHUB_STEP_SUMMARY
          echo "- llama-server" >> $GITHUB_STEP_SUMMARY

          # Check if llama-run should be included
          if [ "$INCLUDE_LLAMA_RUN" = "true" ]; then
            echo "- llama-run" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ~~llama-run~~ (not built in $VERSION)" >> $GITHUB_STEP_SUMMARY
          fi

          # Check if llama-mtmd-cli should be included
          if [ "$INCLUDE_LLAMA_MTMD" = "true" ]; then
            echo "- llama-mtmd-cli" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ~~llama-mtmd-cli~~ (not available before b${{ env.LLAMA_MTMD_FIRST_VERSION }})" >> $GITHUB_STEP_SUMMARY
          fi

          echo "- llama-gguf" >> $GITHUB_STEP_SUMMARY
          echo "- llama-gguf-split" >> $GITHUB_STEP_SUMMARY
          echo "- llama-embedding" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Platforms" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.build_macos_arm64 }}" = "true" ]; then
            echo "- ✅ macOS ARM64 (darwin-arm64)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⏭️ macOS ARM64 (skipped)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ inputs.build_linux_arm64 }}" = "true" ]; then
            echo "- ✅ Linux ARM64 (linux-arm64)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⏭️ Linux ARM64 (skipped)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ inputs.build_linux_x86_64 }}" = "true" ]; then
            echo "- ✅ Linux x86_64 (linux-x86_64)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⏭️ Linux x86_64 (skipped)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Zip files are available as workflow artifacts (90-day retention) and can be downloaded from the Actions tab." >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build-binaries.result }}" = "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **All builds completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Some builds failed. Check the logs above.**" >> $GITHUB_STEP_SUMMARY
          fi
