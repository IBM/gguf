# This workflow converts HF speech models to GGUF format using a multi-job structure:
# - Job 1: Detects Granite version and sets up shared variables
# - Job 2: Converts all speech models using convert_hf_to_gguf.py with --mmproj flag

name: speech-convert-hf-to-bf16-gguf-reusable

on:
  workflow_call:
    secrets:
      hf_token:
        required: true
      ibm_granite_token:
        required: true
    inputs:
      enable_speech_jobs:
        type: boolean
        required: false
        default: false
      repo_id:
        type: string
        required: true
      hf_collection_config:
        type: string
        required: true
      target_repo_owner:
        type: string
        required: true
      target_repo_name_ext:
        type: string
        required: true
      transformers_version:
        type: string
        required: false
        default: "4.52.1"
        description: "HuggingFace Transformers version to install (e.g., '4.52.1' or '4.57.3'). Defaults to 4.52.1 for Granite 3.x models."
      llamacpp_build_tag:
        type: string
        required: true
        description: "llama.cpp build tag to use (e.g., 'b6569', 'b6808', 'b8100'). Determines which llama.cpp version to clone."
      converted_quantization:
        type: string
        required: true
        description: "Quantization format for converted speech model LLM (e.g., 'f16' or 'bf16')"
      debug:
        type: boolean
        required: true
        default: false
      trace:
        type: boolean
        required: true
        default: false

env:
  DEF_SEP: "-"
  DEF_PRECISION: "${{ inputs.converted_quantization }}"
  DEF_MMPROJ_PRECISION: "f16"
  EXT_GGUF: .gguf
  EXT_NAME_F16: "-f16.gguf"
  EXT_NAME_BF16: "-bf16.gguf"
  F16_MMPROJ_MODEL_BASE_FILENAME: mmproj-model
  FIND_ARGS: "-not -path '*/.*' -print | sed -e 's;[^/]*/;|___;g;s;___|; |;g'"
  LLAMACPP_DIR: llama.cpp
  MODEL_DOWNLOAD_DIR: models
  SPEECH_PROJECTOR_KEYS_FILE: projector_keys.txt
  HF_HUB_DISABLE_XET: 1
  HF_HUB_ENABLE_HF_TRANSFER: 0
  HF_TRANSFORMERS_SPEECH_INIT_CHANGE: "4.52.1"

jobs:
  # ===========================================================================
  # Job 1: Detect Granite version and setup shared variables
  # ===========================================================================
  detect-and-setup:
    runs-on: ubuntu-latest
    if: ${{ inputs.enable_speech_jobs == true }}
    timeout-minutes: 5
    outputs:
      use_convert_script_with_mmproj: ${{ steps.detect.outputs.use_convert_script_with_mmproj }}
      repo_org: ${{ steps.setup.outputs.repo_org }}
      repo_name: ${{ steps.setup.outputs.repo_name }}
      target_repo_id: ${{ steps.setup.outputs.target_repo_id }}
      local_model_path: ${{ steps.setup.outputs.local_model_path }}
      base_fname_bf16_gguf: ${{ steps.setup.outputs.base_fname_bf16_gguf }}
      base_fname_mmproj_gguf: ${{ steps.setup.outputs.base_fname_mmproj_gguf }}
      projector_precision: ${{ steps.setup.outputs.projector_precision }}
      speech_encoder_path: ${{ steps.setup.outputs.speech_encoder_path }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/hf_model_download_snapshot.py
            scripts/check_model_architecture_support.py
            scripts/get_projector_precision.py
            resources/json/latest/hf_collection_mapping_gguf.json
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: install-dependencies
        run: |
          python -m pip install huggingface-hub transformers==${{ inputs.transformers_version }}
          echo "✅ Installed transformers version: ${{ inputs.transformers_version }}"

      - name: Dump GitHub inputs
        if: ${{ inputs.debug }}
        env:
          GITHUB_INPUTS: ${{ toJson(inputs) }}
        run: echo "$GITHUB_INPUTS"

      - name: setup-shared-variables
        id: setup
        run: |
          REPO_ORG=$(dirname '${{ inputs.repo_id }}')
          REPO_NAME=$(basename '${{ inputs.repo_id }}')

          # Dynamically construct filename using converted_quantization parameter
          # This matches the construction method in reusable-quantize-speech-upload-gguf.yml
          BASE_FNAME_CONVERTED_GGUF="${REPO_NAME}${{env.DEF_SEP}}${{ inputs.converted_quantization }}${{env.EXT_GGUF}}"

          # Get projector precision from JSON config (defaults to f16 if not specified)
          PROJECTOR_PRECISION=$(python ./scripts/get_projector_precision.py resources/json/latest/hf_collection_mapping_gguf.json "${REPO_NAME}" "f16")
          echo "Projector precision for ${REPO_NAME}: ${PROJECTOR_PRECISION}"

          echo "repo_org=$REPO_ORG" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "target_repo_id=${{inputs.target_repo_owner}}/${REPO_NAME}${{inputs.target_repo_name_ext}}" >> $GITHUB_OUTPUT
          echo "local_model_path=${{ env.MODEL_DOWNLOAD_DIR }}/${{ inputs.repo_id }}" >> $GITHUB_OUTPUT
          echo "base_fname_bf16_gguf=${BASE_FNAME_CONVERTED_GGUF}" >> $GITHUB_OUTPUT
          echo "base_fname_mmproj_gguf=${{ env.F16_MMPROJ_MODEL_BASE_FILENAME }}-${PROJECTOR_PRECISION}${{env.EXT_GGUF}}" >> $GITHUB_OUTPUT
          echo "projector_precision=${PROJECTOR_PRECISION}" >> $GITHUB_OUTPUT
          echo "speech_encoder_path=speech_encoder" >> $GITHUB_OUTPUT

          # Set DEF_MMPROJ_PRECISION for downstream use
          echo "DEF_MMPROJ_PRECISION=${PROJECTOR_PRECISION}" >> $GITHUB_ENV

      - name: download-model-snapshot
        run: |
          python ./scripts/hf_model_download_snapshot.py ${{ env.MODEL_DOWNLOAD_DIR }} ${{ steps.setup.outputs.repo_org }} ${{ steps.setup.outputs.repo_name }} ${{secrets.ibm_granite_token}}

      - name: validate-model-architecture-support
        id: validate-arch
        run: |
          echo "🔍 Checking model architecture: ${{ steps.setup.outputs.repo_name }}"

          DEBUG_FLAG=""
          if [ "${{ inputs.debug }}" = "true" ]; then
            DEBUG_FLAG="--debug"
            echo "Debug mode enabled - will show full architecture list on failure"
          fi

          if python ./scripts/check_model_architecture_support.py ${{ steps.setup.outputs.local_model_path }} $DEBUG_FLAG; then
            echo "✅ Model architecture validation PASSED"
          else
            echo "❌ Model architecture validation FAILED"
            echo "::error::Model architecture is not supported by transformers version ${{ inputs.transformers_version }}"
            echo "::error::The model cannot be converted with the current transformers version"
            echo "::error::Consider updating transformers_version input parameter"
            exit 1
          fi

      - name: detect-granite-version
        id: detect
        run: |
          REPO_NAME=$(basename '${{ inputs.repo_id }}')
          echo "REPO_NAME: $REPO_NAME"

          # All speech models (Granite 3.x and 4.x) use convert_hf_to_gguf.py with --mmproj flag
          # This step is preserved for future version-specific differentiation if needed
          echo "use_convert_script_with_mmproj=true" >> $GITHUB_OUTPUT
          echo "Detected speech model: will use convert_hf_to_gguf.py with --mmproj"

      - name: verify-outputs
        run: |
          echo "use_convert_script_with_mmproj: ${{ steps.detect.outputs.use_convert_script_with_mmproj }}"
          echo "repo_org: ${{ steps.setup.outputs.repo_org }}"
          echo "repo_name: ${{ steps.setup.outputs.repo_name }}"
          echo "target_repo_id: ${{ steps.setup.outputs.target_repo_id }}"
          echo "local_model_path: ${{ steps.setup.outputs.local_model_path }}"
          echo "base_fname_bf16_gguf: ${{ steps.setup.outputs.base_fname_bf16_gguf }}"
          echo "base_fname_mmproj_gguf: ${{ steps.setup.outputs.base_fname_mmproj_gguf }}"
          echo "speech_encoder_path: ${{ steps.setup.outputs.speech_encoder_path }}"

  # ===========================================================================
  # Job 2: Convert speech models using convert_hf_to_gguf.py with --mmproj
  # ===========================================================================
  convert-speech:
    needs: detect-and-setup
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            requirements.txt
            scripts/hf_model_download_snapshot.py
            scripts/hf_model_upload.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: shallow-clone-llamacpp
        uses: actions/checkout@v6
        with:
          path: ${{ env.LLAMACPP_DIR }}
          repository: 'ggerganov/llama.cpp'
          ref: ${{ inputs.llamacpp_build_tag }}
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            convert_hf_to_gguf.py
            conversion
            convert_lora_to_gguf.py
            requirements/requirements-convert_hf_to_gguf.txt
            requirements/requirements-convert_legacy_llama.txt
            gguf-py/gguf
            scripts

      - name: print-llamacpp-clone
        run: |
          echo "=========================================="
          echo "llama.cpp cloned from build tag: ${{ inputs.llamacpp_build_tag }}"
          echo "=========================================="
          ls -al llama.cpp

      - name: install-dependencies
        run: |
          python -m pip install -r ./requirements.txt
          python -m pip install -r ./llama.cpp/requirements/requirements-convert_hf_to_gguf.txt
          pip uninstall --yes transformers
          pip install transformers==${{ inputs.transformers_version }}
          echo "✅ Installed transformers version: ${{ inputs.transformers_version }}"

      - name: download-model-snapshot
        run: |
          python ./scripts/hf_model_download_snapshot.py ${{ env.MODEL_DOWNLOAD_DIR }} ${{ needs.detect-and-setup.outputs.repo_org }} ${{ needs.detect-and-setup.outputs.repo_name }} ${{secrets.ibm_granite_token}}

      - name: convert-mmproj-with-convert-script
        run: |
          echo "DEF_MMPROJ_PRECISION=${{env.DEF_MMPROJ_PRECISION}}"
          echo "local_model_path=${{ needs.detect-and-setup.outputs.local_model_path }}"
          echo "speech_encoder_path=${{ needs.detect-and-setup.outputs.speech_encoder_path }}"
          mkdir -p ${{ needs.detect-and-setup.outputs.speech_encoder_path }}
          # Convert the speech encoder (mmproj) component
          # The convert_hf_to_gguf.py script will use transformers AutoModel classes
          # to load the model architecture if it's not directly supported by the script
          echo "base_fname_mmproj_gguf=${{ needs.detect-and-setup.outputs.base_fname_mmproj_gguf }}"
          python ./llama.cpp/convert_hf_to_gguf.py ${{ needs.detect-and-setup.outputs.local_model_path }} \
            --outfile ${{ needs.detect-and-setup.outputs.speech_encoder_path }}/${{ needs.detect-and-setup.outputs.base_fname_mmproj_gguf }} \
            --outtype ${{env.DEF_MMPROJ_PRECISION}} \
            --mmproj \
            --verbose
          ls -al ${{ needs.detect-and-setup.outputs.speech_encoder_path }}

      - name: upload-mmproj-f16-gguf-to-target-repo
        run: |
          python ./scripts/hf_model_upload.py ${{ needs.detect-and-setup.outputs.target_repo_id }} ${{ needs.detect-and-setup.outputs.speech_encoder_path }}/${{ needs.detect-and-setup.outputs.base_fname_mmproj_gguf }} ${{secrets.hf_token}} ${{github.workflow_ref}} ${{github.run_id}}

      - name: convert-speech-model-llm-to-gguf-bf16
        run: |
          echo "DEF_PRECISION=${{env.DEF_PRECISION}}"
          echo "local_model_path=${{ needs.detect-and-setup.outputs.local_model_path }}"
          echo "base_fname_bf16_gguf=${{ needs.detect-and-setup.outputs.base_fname_bf16_gguf }}"
          # Convert the language model (LLM) component
          # The convert_hf_to_gguf.py script will use transformers AutoModel classes
          # to load the model architecture if it's not directly supported by the script
          python ./llama.cpp/convert_hf_to_gguf.py ${{ needs.detect-and-setup.outputs.local_model_path }} \
            --outfile ${{ needs.detect-and-setup.outputs.base_fname_bf16_gguf }} \
            --outtype ${{env.DEF_PRECISION}} \
            --verbose
          ls -al *.gguf

      - name: upload-speech-llm-bf16-gguf-to-target-repo
        run: |
          python ./scripts/hf_model_upload.py ${{ needs.detect-and-setup.outputs.target_repo_id }} ${{ needs.detect-and-setup.outputs.base_fname_bf16_gguf }} ${{secrets.hf_token}} ${{github.workflow_ref}} ${{github.run_id}}

      - name: check-for-lora-adapter
        id: check-lora
        run: |
          # Check if adapter_config.json exists in the model directory
          if [ -f "${{ needs.detect-and-setup.outputs.local_model_path }}/adapter_config.json" ]; then
            echo "✅ LoRA adapter found - will convert"
            echo "has_lora=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️  No LoRA adapter found - skipping LoRA conversion"
            echo "has_lora=false" >> $GITHUB_OUTPUT
          fi

      - name: convert-lora-adapter-to-gguf-bf16
        if: steps.check-lora.outputs.has_lora == 'true'
        run: |
          echo "Converting LoRA adapter to GGUF format with bf16 quantization"
          LORA_FNAME="${{ needs.detect-and-setup.outputs.repo_name }}-lora${{env.DEF_SEP}}${{ inputs.converted_quantization }}${{env.EXT_GGUF}}"
          echo "lora_filename=$LORA_FNAME"

          # Convert LoRA adapter using convert_lora_to_gguf.py
          python ./llama.cpp/convert_lora_to_gguf.py \
            ${{ needs.detect-and-setup.outputs.local_model_path }} \
            --outfile "$LORA_FNAME" \
            --outtype ${{env.DEF_PRECISION}} \
            --verbose

          ls -al *lora*.gguf

      - name: upload-lora-adapter-bf16-gguf-to-target-repo
        if: steps.check-lora.outputs.has_lora == 'true'
        run: |
          LORA_FNAME="${{ needs.detect-and-setup.outputs.repo_name }}-lora${{env.DEF_SEP}}${{ inputs.converted_quantization }}${{env.EXT_GGUF}}"
          python ./scripts/hf_model_upload.py ${{ needs.detect-and-setup.outputs.target_repo_id }} "$LORA_FNAME" ${{secrets.hf_token}} ${{github.workflow_ref}} ${{github.run_id}}

