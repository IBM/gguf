# This workflow:
# - Downloads the source HF (safetensors) speech model from the Hugging Face hub.
# - Uses HF Transformers to save just the LLM portion of the speech model
# - Convert the LLM model to f16 GGUF
# - Quantizes the f16 GGUF to the designated 'quantization' (e.g., Q4_0, Q4_K_M, etc.) defined in the build matrix.
# - Uploads the quantized GGUF to target 'repo_id'.

name: quantize-speech-llm-upload-gguf-reusable

on:
  workflow_call:
    secrets:
      hf_token:
        required: true
    inputs:
      enable_speech_jobs:
        type: boolean
        required: false
        default: false
      repo_id:
        type: string
        required: true
      quantization:
        type: string
        required: true
      hf_collection_config:
        type: string
        required: true
      target_repo_owner:
        type: string
        required: true
      target_repo_name_ext:
        type: string
        required: true
      llamacpp_build_tag:
        type: string
        required: true
        description: "llama.cpp build tag to use (e.g., 'b6569', 'b6808', 'b8100'). Determines which binary tools to use from ./bin subdirectory."
      converted_quantization:
        type: string
        required: true
        description: "Base quantization format of the converted model (e.g., 'f16', 'bf16'). Used to construct the filename of the base model to download."
      debug:
        type: boolean
        required: true
        default: false
      trace:
        type: boolean
        required: false
        default: false

env:
  DEF_SEP: "-"
  EXT_GGUF: .gguf
  BF16_FILE_EXISTS: "0"
  FIND_ARGS: "-not -path '*/.*' -print | sed -e 's;[^/]*/;|___;g;s;___|; |;g'"
  LLAMACPP_DIR: llama.cpp
  MODEL_DOWNLOAD_DIR: models

  # Dynamically set variables (pre-declared to avoid linter warnings)
  REPO_ORG: ""  # Set in set-github-env step
  REPO_NAME: ""  # Set in set-github-env step
  TARGET_REPO_ID: ""  # Set in set-derivative-env-vars-2 step
  BASE_FNAME_QUANTIZED_GGUF: ""  # Set in set-derivative-env-vars-1 step
  LOCAL_MODEL_PATH: ""  # Set in set-derivative-env-vars-1 step
  LOCAL_FNAME_BF16_GGUF: ""  # Set in set-derivative-env-vars-2 step
  LOCAL_FNAME_QUANTIZED_GGUF: ""  # Set in set-derivative-env-vars-2 step
  IS_SPLIT_GGUF: "0"  # Set in test-bf16-exists: 1 = bf16 was uploaded as shards
  SHARD1_FNAME: ""  # Set in test-bf16-exists: first shard filename when IS_SPLIT_GGUF=1
  GGUF_QUANTIZED_UPLOAD_FILES: ""  # Set in split-quantized-gguf-if-oversized (shard list, or single file)

jobs:
  quantize:
    runs-on: macos-latest
    if: ${{ inputs.enable_speech_jobs == true }}
    env:
      HF_HUB_DISABLE_XET: 1
      HF_HUB_ENABLE_HF_TRANSFER: 0
    steps:
    - uses: actions/checkout@v6

    - name: detect-platform
      run: |
        OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]' | sed 's/macos/darwin/')
        ARCH=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]' | sed 's/x64/x86_64/')
        echo "LLAMA_BIN_DIR=bin/${{ inputs.llamacpp_build_tag }}/${OS}-${ARCH}" >> $GITHUB_ENV
        echo "Detected platform: ${OS}-${ARCH} → LLAMA_BIN_DIR=bin/${{ inputs.llamacpp_build_tag }}/${OS}-${ARCH}"

    - run: |
        echo "[INFO] github.env:"
        echo "[INFO] >> run_id: '${{ github.run_id }}'"
        echo "[INFO] >> ref: '${{ github.ref }}', ref_name: '${{ github.ref_name }}', ref_type: '${{ github.ref_type }}'"
        echo "[INFO] >> workflow_ref: '${{ github.workflow_ref }}'"
        echo "[INFO] >> run_id: '${{ github.run_id }}'"
        echo "[INFO] >> event_name: '${{ github.event_name }}'"
        echo "[INFO] >> event.: action: '${{ github.event.action }}'"
        echo "[INFO] >> event.: base_ref: '${{ github.event.base_ref }}'"
        echo "[INFO] >> event.: workflow_run.conclusion: '${{ github.event.workflow_run.conclusion }}'"
        echo "[INFO] >> event.release.: name: '${{ github.event.release.name }}', tag_name: '${{ github.event.release.tag_name }}'"

    - name: confirm-environment
      run: |
        uname -a
        echo "runner.os: ${{ runner.os }}"
        echo "runner.arch: ${{ runner.arch }}"
        echo "github.workspace: ${{ github.workspace }}"
        echo "llamacpp_build_tag: ${{ inputs.llamacpp_build_tag }}"
        echo "env.EXT_GGUF: ${{ env.EXT_GGUF }}"
        echo "env.EXT_NAME_BF16: ${{ env.EXT_NAME_BF16 }}"
        echo "env.BF16_FILE_EXISTS: ${{ env.BF16_FILE_EXISTS }}"
        echo "env.FIND_ARGS: ${{ env.FIND_ARGS }}"
        echo "env.LLAMACPP_DIR: ${{ env.LLAMACPP_DIR }}"
        echo "env.MODEL_DOWNLOAD_DIR: ${{ env.MODEL_DOWNLOAD_DIR }}"

    # if: ${{ github.event.inputs.debug }}
    - name: Dump GitHub inputs
      env:
        GITHUB_INPUTS: ${{ toJson(inputs) }}
      run: echo "$GITHUB_INPUTS"

    # Use this step to set values to the github context (shared across jobs/steps)
    # Note: using $GITHUB_OUTPUT sets values under the current step's namespace
    # whereas using $GITHUB_ENV sets values in the job's underlying environment.
    # Note: for each 'repo_id' we parse out e.g., REPO_ORG=ibm-granite REPO_NAME=granite-3.0-2b-instruct
    - name: set-github-env
      id: set_github_env
      run: |
        echo "REPO_ORG=$(dirname '${{ inputs.repo_id }}')" >> $GITHUB_ENV
        echo "REPO_NAME=$(basename '${{ inputs.repo_id }}')" >> $GITHUB_ENV

    - name: set-derivative-env-vars-1
      run: |
        echo "BASE_FNAME_BF16_GGUF=${{ env.REPO_NAME }}${{ env.DEF_SEP }}${{ inputs.converted_quantization }}${{env.EXT_GGUF}}" >> $GITHUB_ENV
        echo "BASE_FNAME_QUANTIZED_GGUF=${{ env.REPO_NAME }}-${{inputs.quantization}}${{env.EXT_GGUF}}" >> $GITHUB_ENV
        echo "LOCAL_MODEL_PATH=${{env.MODEL_DOWNLOAD_DIR}}/${{ inputs.repo_id }}" >> $GITHUB_ENV

    # NOTE: we MUST have the target quant. model (output) in a sep. directory as the source f16 model (input)
    # or streaming will cause a SIGSEV error
    - name: set-derivative-env-vars-2
      run: |
        echo "TARGET_REPO_ID=${{inputs.target_repo_owner}}/${{env.REPO_NAME}}${{inputs.target_repo_name_ext}}" >> $GITHUB_ENV
        echo "LOCAL_FNAME_BF16_GGUF=${{env.MODEL_DOWNLOAD_DIR}}/${{inputs.target_repo_owner}}/${{env.REPO_NAME}}${{inputs.target_repo_name_ext}}/$BASE_FNAME_BF16_GGUF" >> $GITHUB_ENV
        echo "LOCAL_FNAME_QUANTIZED_GGUF=${{env.BASE_FNAME_QUANTIZED_GGUF}}" >> $GITHUB_ENV

    # echo "BASE_FNAME_F16_GGUF='$BASE_FNAME_F16_GGUF' (${{ env.BASE_FNAME_F16_GGUF }})"
    - name: verify-github-env
      run: |
        echo "================== GITHUB_ENV ====================="
        echo "REPO_ORG=$REPO_ORG"
        echo "REPO_NAME=$REPO_NAME"
        echo "================== Derivative Environment Variables 1 =================="
        echo "BASE_FNAME_BF16_GGUF='$BASE_FNAME_F16_GGUF' (${{ env.BASE_FNAME_BF16_GGUF }})"
        echo "BASE_FNAME_QUANTIZED_GGUF='$BASE_FNAME_QUANTIZED_GGUF' (${{ env.BASE_FNAME_QUANTIZED_GGUF }})"
        echo "LOCAL_MODEL_PATH='$LOCAL_MODEL_PATH' (${{ env.LOCAL_MODEL_PATH }})"
        echo "================== Derivative Environment Variables 2 =================="
        echo "TARGET_REPO_ID='$TARGET_REPO_ID' (${{ env.TARGET_REPO_ID }})"
        echo "LOCAL_FNAME_BF16_GGUF='$LOCAL_FNAME_BF16_GGUF' (${{ env.LOCAL_FNAME_BF16_GGUF }})"
        echo "LOCAL_FNAME_QUANTIZED_GGUF='$LOCAL_FNAME_QUANTIZED_GGUF' (${{ env.LOCAL_FNAME_QUANTIZED_GGUF }})"

    - name: List all environment variables
      if: ${{ github.event.inputs.debug }}
      run: env | sort

    # Note: at the current time, we cannot use Python versions > 3.11 due to HF and langchain deps.
    # Note: you can verify in a step using: run: python -c "import sys; print(sys.version)"
    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # Sparse checkout llama-quantize binary from GGUF repo based on build tag
    # IMPORTANT: clean: false preserves files from the initial checkout and any downloaded files
    - name: sparse-checkout-llama-quantize-binary
      uses: actions/checkout@v6
      with:
        clean: false
        sparse-checkout: |
          bin/${{ inputs.llamacpp_build_tag }}/**
          requirements.txt
          scripts/
        sparse-checkout-cone-mode: false
        fetch-depth: 1

    - name: verify-llama-quantize-binary
      run: |
        echo "=========================================="
        echo "Using llama-quantize from build tag: ${{ inputs.llamacpp_build_tag }}"
        echo "=========================================="
        ls -al ./$LLAMA_BIN_DIR/llama-quantize
        if [ ! -f "./$LLAMA_BIN_DIR/llama-quantize" ]; then
          echo "[ERROR] llama-quantize binary not found at ./$LLAMA_BIN_DIR/llama-quantize"
          exit 1
        fi
        chmod +x ./$LLAMA_BIN_DIR/llama-quantize
        echo "[SUCCESS] llama-quantize binary found and made executable"

    - name: install-general-dependencies
      run: |
        python -m pip install -r ./requirements.txt
        pip list

    - name: Print Storage & Memory Info (macOS)
      if: inputs.debug == true && runner.os == 'macOS'
      run: |
        df
        echo "--------------------"
        xcodebuild -version
        clang --version
        echo "--------------------"
        top -l 1 | grep -E "^CPU|^PhysMem"
        echo "--------------------"

    - name: Print Storage & Memory Info (Linux)
      if: inputs.debug == true  && runner.os == 'Linux'
      run: |
        df -h
        echo "--------------------"
        gcc --version || lsb_release -a
        echo "--------------------"
        free -h
        echo "--------------------"
        top -b -n 1 | head -n 5
        echo "--------------------"

    # output=$(python ./scripts/hf_model_file_exists.py ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_F16_GGUF }} ${{secrets.hf_token}})
    - name: test-bf16-exists
      run: |
        # First check for the unsplit (single-file) bf16 GGUF.
        # If not found, check for the first shard (-00001-of-NNNNN.gguf) which indicates
        # the bf16 was uploaded as split files by the convert workflow.
        UNSPLIT_OUTPUT=$(python ./scripts/hf_model_file_exists.py ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_BF16_GGUF }} ${{secrets.hf_token}})
        echo "Unsplit file check → output: '$UNSPLIT_OUTPUT'"

        if [[ "$UNSPLIT_OUTPUT" == "True" ]]; then
          echo "✅ Unsplit bf16 GGUF found."
          echo "BF16_FILE_EXISTS=1" >> $GITHUB_ENV
          echo "IS_SPLIT_GGUF=0" >> $GITHUB_ENV
        else
          # Probe for the first shard: <basename>-00001-of-<N>.gguf
          BASENAME="${{ env.BASE_FNAME_BF16_GGUF }}"
          BASENAME="${BASENAME%.gguf}"
          SHARD1_FOUND=""
          for N in $(seq -w 2 9); do
            CANDIDATE="${BASENAME}-00001-of-0000${N}.gguf"
            SHARD_OUTPUT=$(python ./scripts/hf_model_file_exists.py ${{ env.TARGET_REPO_ID }} "$CANDIDATE" ${{secrets.hf_token}})
            if [[ "$SHARD_OUTPUT" == "True" ]]; then
              SHARD1_FOUND="$CANDIDATE"
              echo "✅ Split bf16 GGUF detected — first shard: '$SHARD1_FOUND'"
              echo "BF16_FILE_EXISTS=1" >> $GITHUB_ENV
              echo "IS_SPLIT_GGUF=1" >> $GITHUB_ENV
              echo "SHARD1_FNAME=$SHARD1_FOUND" >> $GITHUB_ENV
              break
            fi
          done
          if [[ -z "$SHARD1_FOUND" ]]; then
            echo "ℹ️  No unsplit or split bf16 GGUF found in HF."
            echo "BF16_FILE_EXISTS=0" >> $GITHUB_ENV
            echo "IS_SPLIT_GGUF=0" >> $GITHUB_ENV
          fi
        fi

    - name: download-bf16-gguf-hf-hub-download
      if: env.BF16_FILE_EXISTS == '1' && env.IS_SPLIT_GGUF == '0'
      run: |
        echo "Downloading unsplit ${{ inputs.converted_quantization }} GGUF using hf_file_download..."
        echo "--------------------"
        echo "MODEL_DOWNLOAD_DIR=${{env.MODEL_DOWNLOAD_DIR}}"
        echo "BASE_FNAME_BF16_GGUF=${{env.BASE_FNAME_BF16_GGUF}}"
        echo "TARGET_REPO_ID=${{env.TARGET_REPO_ID}}"
        python ./scripts/hf_file_download.py ${{ env.MODEL_DOWNLOAD_DIR}} ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_BF16_GGUF }} ${{secrets.hf_token}}
        ls -al ${{env.MODEL_DOWNLOAD_DIR}}/${{ env.TARGET_REPO_ID }}/*.gguf

    - name: download-and-merge-split-bf16-gguf-from-hf
      if: env.BF16_FILE_EXISTS == '1' && env.IS_SPLIT_GGUF == '1'
      run: |
        # The bf16 GGUF was uploaded as shards. Download every shard then merge them
        # back into a single file using llama-gguf-split --merge.
        MERGE_TOOL="./$LLAMA_BIN_DIR/llama-gguf-split"
        if [ ! -f "$MERGE_TOOL" ]; then
          echo "::error::llama-gguf-split not found at $MERGE_TOOL (build tag: ${{ inputs.llamacpp_build_tag }})"
          exit 1
        fi
        chmod +x "$MERGE_TOOL"

        DEST_DIR="${{ env.MODEL_DOWNLOAD_DIR }}/${{ env.TARGET_REPO_ID }}"
        mkdir -p "$DEST_DIR"

        BASENAME="${{ env.BASE_FNAME_BF16_GGUF }}"
        BASENAME="${BASENAME%.gguf}"

        # Parse total shard count from the first shard filename
        FIRST="${{ env.SHARD1_FNAME }}"
        TOTAL=$(echo "$FIRST" | grep -oP '(?<=of-)\d+(?=\.gguf)')
        echo "Downloading $TOTAL shard(s) for '${{ env.BASE_FNAME_BF16_GGUF }}'..."

        for SHARD_INDEX in $(seq 1 $((10#$TOTAL))); do
          PADDED=$(printf "%05d" $SHARD_INDEX)
          SHARD_FILE="${BASENAME}-${PADDED}-of-${TOTAL}.gguf"
          echo "Downloading shard: '$SHARD_FILE'"
          python ./scripts/hf_file_download.py "${{ env.MODEL_DOWNLOAD_DIR }}" "${{ env.TARGET_REPO_ID }}" "$SHARD_FILE" ${{secrets.hf_token}}
          SHARD_PATH="$DEST_DIR/$SHARD_FILE"
          if [ ! -f "$SHARD_PATH" ]; then
            echo "::error::Expected shard not found after download: $SHARD_PATH"
            exit 1
          fi
          ls -lh "$SHARD_PATH"
        done

        # Merge all shards into a single bf16 GGUF for quantization
        FIRST_SHARD="$DEST_DIR/${{ env.SHARD1_FNAME }}"
        MERGED_FILE="$DEST_DIR/${{ env.BASE_FNAME_BF16_GGUF }}"
        echo "Merging shards → '$MERGED_FILE'"
        "$MERGE_TOOL" --merge "$FIRST_SHARD" "$MERGED_FILE"
        ls -lh "$MERGED_FILE"

        # Remove the individual shards to free disk space
        echo "Removing shard files to free disk space..."
        rm -f "$DEST_DIR/${BASENAME}"-*-of-*.gguf
        ls -lh "$DEST_DIR"

        echo "LOCAL_FNAME_BF16_GGUF=$MERGED_FILE" >> $GITHUB_ENV

    - name: verify-bf16-gguf-hf-hub-download
      run: |
        echo downloaded files...
        echo "--------------------"
        find . -name \*.gguf -type f
        echo "--------------------"
        echo "LOCAL_FNAME_BF16_GGUF=${{env.LOCAL_FNAME_BF16_GGUF}}"
        if [ -f ${{env.LOCAL_FNAME_BF16_GGUF}} ]; then
          echo "File exists"
        else
          env | sort
          echo "File does not exist. env.LOCAL_FNAME_BF16_GGUF=${{env.LOCAL_FNAME_BF16_GGUF}}"
          exit 1
        fi

    - name: quantize-gguf
      run: |
        echo "--------------------"
        echo "Using llama-quantize from build tag: ${{ inputs.llamacpp_build_tag }}"
        echo "LOCAL_FNAME_BF16_GGUF='$LOCAL_FNAME_BF16_GGUF' (${{ env.LOCAL_FNAME_BF16_GGUF }})"
        echo "LOCAL_FNAME_QUANTIZED_GGUF='$LOCAL_FNAME_QUANTIZED_GGUF' (${{ env.LOCAL_FNAME_QUANTIZED_GGUF }})"
        echo "--------------------"
        sudo ./$LLAMA_BIN_DIR/llama-quantize ${{ env.LOCAL_FNAME_BF16_GGUF }} ${{ env.LOCAL_FNAME_QUANTIZED_GGUF }} ${{inputs.quantization}}

    - name: find-gguf-files
      if: inputs.debug == true
      run: |
        find . -name \*.gguf -type f
        ls -al .
        echo "--------------------"

    - name: split-quantized-gguf-if-oversized
      run: |
        # HuggingFace LFS enforces a 50 GB per-file limit.
        # Split the quantized GGUF into shards when it exceeds 45 GiB.
        HF_MAX_BYTES=$((45 * 1024 * 1024 * 1024))   # 45 GiB safety threshold
        SPLIT_SIZE_MiB=45000                           # shard size passed to llama-gguf-split

        FILE_BYTES=$(stat -f%z "$LOCAL_FNAME_QUANTIZED_GGUF" 2>/dev/null || stat -c%s "$LOCAL_FNAME_QUANTIZED_GGUF")
        echo "Quantized GGUF: '$LOCAL_FNAME_QUANTIZED_GGUF' — ${FILE_BYTES} bytes (threshold: ${HF_MAX_BYTES})"

        if [ "$FILE_BYTES" -gt "$HF_MAX_BYTES" ]; then
          echo "⚠️  File exceeds HF 50 GB limit — splitting with llama-gguf-split..."
          SPLIT_TOOL="./$LLAMA_BIN_DIR/llama-gguf-split"
          if [ ! -f "$SPLIT_TOOL" ]; then
            echo "::error::llama-gguf-split not found at $SPLIT_TOOL (build tag: ${{ inputs.llamacpp_build_tag }})"
            exit 1
          fi
          chmod +x "$SPLIT_TOOL"
          BASENAME="${LOCAL_FNAME_QUANTIZED_GGUF%.gguf}"
          "$SPLIT_TOOL" --split-max-size "${SPLIT_SIZE_MiB}M" \
                        "$LOCAL_FNAME_QUANTIZED_GGUF" \
                        "$BASENAME"
          rm -f "$LOCAL_FNAME_QUANTIZED_GGUF"
          ls -lh ${BASENAME}-*.gguf
          GGUF_QUANTIZED_UPLOAD_FILES=$(ls ${BASENAME}-*.gguf | tr '\n' ' ')
          echo "✅ Split produced: $GGUF_QUANTIZED_UPLOAD_FILES"
        else
          echo "✅ File is within the 50 GB limit — no split needed."
          GGUF_QUANTIZED_UPLOAD_FILES="$LOCAL_FNAME_QUANTIZED_GGUF"
        fi
        echo "GGUF_QUANTIZED_UPLOAD_FILES=$GGUF_QUANTIZED_UPLOAD_FILES" >> $GITHUB_ENV

    - name: delete-previous-upload
      run: |
        # Delete any previously uploaded file(s) matching the quantized GGUF base name.
        # Handles both single-file and split-shard cases.
        BASENAME="${{ env.BASE_FNAME_QUANTIZED_GGUF }}"
        BASENAME="${BASENAME%.gguf}"

        # Check & delete unsplit file
        exists=$(python ./scripts/hf_model_file_exists.py ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_QUANTIZED_GGUF }} ${{secrets.hf_token}})
        if [[ "$exists" == "True" ]]; then
          echo "Deleting previous unsplit upload: ${{ env.BASE_FNAME_QUANTIZED_GGUF }}"
          python ./scripts/hf_file_delete.py ${{ env.TARGET_REPO_ID }} ${{ env.BASE_FNAME_QUANTIZED_GGUF }} ${{secrets.hf_token}}
        fi

        # Check & delete any previous shards (probe up to 9 total shards)
        for N in $(seq -w 2 9); do
          for I in $(seq -w 1 $N); do
            SHARD="${BASENAME}-0000${I}-of-0000${N}.gguf"
            shard_exists=$(python ./scripts/hf_model_file_exists.py ${{ env.TARGET_REPO_ID }} "$SHARD" ${{secrets.hf_token}})
            if [[ "$shard_exists" == "True" ]]; then
              echo "Deleting previous shard: $SHARD"
              python ./scripts/hf_file_delete.py ${{ env.TARGET_REPO_ID }} "$SHARD" ${{secrets.hf_token}}
            fi
          done
        done

    - name: upload-quantized-gguf-model
      run: |
        echo "GGUF_QUANTIZED_UPLOAD_FILES='$GGUF_QUANTIZED_UPLOAD_FILES' (${{ env.GGUF_QUANTIZED_UPLOAD_FILES }})"
        echo "TARGET_REPO_ID=${{env.TARGET_REPO_ID}}"
        for FILE in $GGUF_QUANTIZED_UPLOAD_FILES; do
          echo ">> Uploading: '$FILE'"
          ls -lh "$FILE"
          python ./scripts/hf_model_upload.py ${{ env.TARGET_REPO_ID }} "$FILE" ${{secrets.hf_token}} ${{github.workflow_ref}} ${{github.run_id}}
        done



