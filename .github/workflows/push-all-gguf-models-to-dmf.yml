# This workflow discovers all GGUF files in a HuggingFace repository and pushes them to IBM datastores.
# It uses the HuggingFace REST API to find all GGUF files and invokes the reusable workflow for each one.
name: push-all-gguf-models-to-dmf

on:
  workflow_dispatch:
    inputs:
      enable_dmf_push:
        type: boolean
        required: false
        default: false
        description: 'Enable DMF push operations'
      repo_id:
        type: string
        required: true
        description: 'HuggingFace repository ID (e.g., ibm-granite/granite-4.1-3b)'
      model_size:
        type: string
        required: true
        description: 'Model size (e.g., 3b, 8b, 13b)'
      target_repo_owner:
        type: string
        required: true
        description: 'Target repository owner (e.g., ibm-granite)'
      target_repo_name_ext:
        type: string
        required: false
        default: '-GGUF'
        description: 'Target repository name extension (e.g., -GGUF)'
      exclude_pattern:
        type: string
        required: false
        default: ''
        description: 'Regex pattern to exclude files (e.g., ".*-bf16-.*-of-.*\.gguf$" to skip multi-part bf16 files)'
      ext_log:
        type: string
        required: false
        default: '.log.txt'
        description: 'Log file extension'
      ext_response:
        type: string
        required: false
        default: '.response.txt'
        description: 'Response file extension'
      debug:
        type: boolean
        required: false
        default: false
        description: 'Enable debug mode'
      trace:
        type: boolean
        required: false
        default: false
        description: 'Enable trace mode'

env:
  DEBUG: ${{inputs.debug}}
  EXT_GGUF: .gguf

jobs:
  discover-gguf-files:
    runs-on: ubuntu-latest
    outputs:
      quantizations: ${{ steps.parse_files.outputs.quantizations }}
      file_count: ${{ steps.parse_files.outputs.file_count }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install -r ./requirements.txt
        pip list
    
    - name: Set environment variables
      run: |
        echo "REPO_ORG=$(dirname '${{ inputs.repo_id }}')" >> $GITHUB_ENV
        echo "REPO_NAME=$(basename '${{ inputs.repo_id }}')" >> $GITHUB_ENV
        echo "TARGET_REPO_ID=${{inputs.target_repo_owner}}/$(basename '${{ inputs.repo_id }}')${{inputs.target_repo_name_ext}}" >> $GITHUB_ENV
    
    - name: List and parse GGUF files
      id: parse_files
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        echo "[INFO] Listing files in repository: ${{ env.TARGET_REPO_ID }}"
        
        # Get all files from the HuggingFace repository
        file_list=$(python ./scripts/hf_repo_list_files.py "${{ env.TARGET_REPO_ID }}" "$HF_TOKEN")
        
        echo "[INFO] Raw file list output:"
        echo "$file_list"
        
        # Parse GGUF files and extract quantizations
        export EXCLUDE_PATTERN='${{ inputs.exclude_pattern }}'
        export MODEL_NAME='${{ env.REPO_NAME }}'
        quantizations=$(python3 <<'PYTHON_SCRIPT'
        import sys
        import re
        import json
        import os
        
        # Read the file list output
        file_list_str = """$file_list"""
        
        # Get parameters from environment
        exclude_pattern = os.environ.get('EXCLUDE_PATTERN', '')
        model_name = os.environ.get('MODEL_NAME', '')
        
        if not model_name:
            print("[ERROR] MODEL_NAME not set", file=sys.stderr)
            print("[]", end="")
            sys.exit(1)
        
        # Extract the list from the output
        match = re.search(r"file_list: (\[.*\])", file_list_str, re.DOTALL)
        if not match:
            print("[]", end="")
            sys.exit(0)
        
        # Parse the Python list representation
        list_str = match.group(1)
        try:
            files = eval(list_str)
        except Exception as e:
            print(f"[]", end="")
            sys.exit(0)
        
        # Compile exclude pattern if provided
        exclude_regex = None
        if exclude_pattern:
            try:
                exclude_regex = re.compile(exclude_pattern)
                print(f"[INFO] Using exclude pattern: {exclude_pattern}", file=sys.stderr)
            except re.error as e:
                print(f"[WARNING] Invalid exclude pattern '{exclude_pattern}': {e}", file=sys.stderr)
                exclude_regex = None
        
        # Pattern to detect split GGUF files: {base}-{part}-of-{total}.gguf
        # Example: granite-4.1-30b-bf16-00001-of-00005.gguf
        split_pattern = re.compile(r'^(.+)-(\d{5})-of-(\d{5})\.gguf$')
        
        # Filter for GGUF files and extract quantizations
        quantizations = []
        excluded_count = 0
        split_groups = {}  # Track split file groups
        
        for gguf_file in files:
            if not gguf_file.endswith('.gguf'):
                continue
            
            # Check if file matches exclude pattern
            if exclude_regex and exclude_regex.search(gguf_file):
                print(f"[INFO] Excluding file (matches pattern): {gguf_file}", file=sys.stderr)
                excluded_count += 1
                continue
            
            # Check if this is a split GGUF file
            split_match = split_pattern.match(gguf_file)
            if split_match:
                base_pattern = split_match.group(1)
                part_num = split_match.group(2)
                total_parts = split_match.group(3)
                
                # Only process the first part of each split group
                if base_pattern not in split_groups:
                    split_groups[base_pattern] = {
                        'total_parts': total_parts,
                        'first_file': gguf_file
                    }
                    
                    # Extract quantization from base_pattern
                    # Remove model_name prefix
                    if not base_pattern.startswith(model_name):
                        print(f"[WARNING] Split file '{gguf_file}' does not start with model name '{model_name}', skipping", file=sys.stderr)
                        continue
                    
                    suffix = base_pattern[len(model_name):]
                    if suffix.startswith('-'):
                        suffix = suffix[1:]
                    
                    if not suffix:
                        print(f"[WARNING] Could not extract quantization from split file '{gguf_file}', skipping", file=sys.stderr)
                        continue
                    
                    quantization = suffix
                    quantization_clean = quantization.replace('_', '')
                    served_model_name = f"ibm-granite/{model_name}-{quantization_clean}-gguf"
                    
                    print(f"[INFO] Detected split GGUF group: {base_pattern} ({total_parts} parts)", file=sys.stderr)
                    
                    quantizations.append({
                        "quantization": quantization,
                        "served_model_name": served_model_name,
                        "filename": gguf_file,
                        "is_split": True,
                        "split_base_pattern": base_pattern,
                        "total_parts": int(total_parts)
                    })
                continue
            
            # Handle regular (non-split) GGUF files
            # Remove .gguf extension
            base_name = gguf_file.replace('.gguf', '')
            
            # Check if filename starts with model_name
            if not base_name.startswith(model_name):
                print(f"[WARNING] File '{gguf_file}' does not start with model name '{model_name}', skipping", file=sys.stderr)
                continue
            
            # Extract the part after model_name
            # Expected format: {model_name}-{quantization}.gguf
            suffix = base_name[len(model_name):]
            
            # Remove leading dash if present
            if suffix.startswith('-'):
                suffix = suffix[1:]
            
            if not suffix:
                print(f"[WARNING] Could not extract quantization from '{gguf_file}', skipping", file=sys.stderr)
                continue
            
            # The suffix is the quantization (e.g., Q8_0, Q5_K_M)
            quantization = suffix
            
            # Generate served_model_name by removing underscores from quantization
            quantization_clean = quantization.replace('_', '')
            served_model_name = f"ibm-granite/{model_name}-{quantization_clean}-gguf"
            
            quantizations.append({
                "quantization": quantization,
                "served_model_name": served_model_name,
                "filename": gguf_file,
                "is_split": False
            })
        
        # Output summary
        print(f"[INFO] Total GGUF files found: {len(files)}", file=sys.stderr)
        print(f"[INFO] Files excluded by pattern: {excluded_count}", file=sys.stderr)
        print(f"[INFO] Split GGUF groups detected: {len(split_groups)}", file=sys.stderr)
        print(f"[INFO] Files to process: {len(quantizations)}", file=sys.stderr)
        
        # Output as JSON
        print(json.dumps(quantizations), end="")
        PYTHON_SCRIPT
        )
        
        echo "[INFO] Parsed quantizations:"
        echo "$quantizations" | python3 -m json.tool || echo "$quantizations"
        
        # Count files
        file_count=$(echo "$quantizations" | python3 -c "import sys, json; print(len(json.loads(sys.stdin.read())))" 2>/dev/null || echo "0")
        
        echo "[INFO] Total GGUF files found: $file_count"
        
        # Set outputs
        echo "quantizations=$quantizations" >> $GITHUB_OUTPUT
        echo "file_count=$file_count" >> $GITHUB_OUTPUT
    
    - name: Display discovered files
      run: |
        echo "=========================================="
        echo "GGUF Files Discovery Summary"
        echo "=========================================="
        echo "Repository: ${{ env.TARGET_REPO_ID }}"
        echo "Total GGUF files: ${{ steps.parse_files.outputs.file_count }}"
        echo "Files:"
        echo '${{ steps.parse_files.outputs.quantizations }}' | python3 -m json.tool || echo '${{ steps.parse_files.outputs.quantizations }}'

  push-model:
    needs: discover-gguf-files
    if: ${{ needs.discover-gguf-files.outputs.file_count > 0 && inputs.enable_dmf_push }}
    strategy:
      matrix:
        model: ${{ fromJson(needs.discover-gguf-files.outputs.quantizations) }}
      fail-fast: false
      max-parallel: 3
    uses: ./.github/workflows/reusable-push-models-to-dmf.yml
    with:
      enable_language_jobs: true
      repo_id: ${{ inputs.repo_id }}
      quantization: ${{ matrix.model.quantization }}
      model_size: ${{ inputs.model_size }}
      target_repo_owner: ${{ inputs.target_repo_owner }}
      target_repo_name_ext: ${{ inputs.target_repo_name_ext }}
      ext_log: ${{ inputs.ext_log }}
      ext_response: ${{ inputs.ext_response }}
      debug: ${{ inputs.debug }}
      trace: ${{ inputs.trace }}
      is_split_gguf: ${{ matrix.model.is_split || false }}
    secrets:
      hf_token: ${{ secrets.HF_TOKEN }}
      IBM_DMF_TOKEN: ${{ secrets.IBM_DMF_TOKEN }}
      ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
      ARTIFACTORY_API_KEY: ${{ secrets.ARTIFACTORY_API_KEY }}

  summary:
    needs: [discover-gguf-files, push-model]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Display summary
      run: |
        echo "=========================================="
        echo "Workflow Execution Summary"
        echo "=========================================="
        echo "Repository: ${{ inputs.repo_id }}"
        echo "Target Repository: ${{ inputs.target_repo_owner }}/$(basename '${{ inputs.repo_id }}')${{ inputs.target_repo_name_ext }}"
        echo "Total GGUF files discovered: ${{ needs.discover-gguf-files.outputs.file_count }}"
        echo "DMF Push Enabled: ${{ inputs.enable_dmf_push }}"
        echo "Discovery Job Status: ${{ needs.discover-gguf-files.result }}"
        echo "Push Job Status: ${{ needs.push-model.result }}"
        echo "=========================================="

