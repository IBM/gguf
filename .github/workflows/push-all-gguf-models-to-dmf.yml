# This workflow discovers all GGUF files in a HuggingFace repository and pushes them to IBM datastores.
# It uses the HuggingFace REST API to find all GGUF files and invokes the reusable workflow for each one.
name: push-all-gguf-models-to-dmf

on:
  workflow_dispatch:
    inputs:
      enable_dmf_push:
        type: boolean
        required: false
        default: false
        description: 'Enable DMF push operations'
      repo_id:
        type: string
        required: true
        description: 'HuggingFace repository ID (e.g., ibm-granite/granite-4.1-3b)'
      model_size:
        type: string
        required: true
        description: 'Model size (e.g., 3b, 8b, 13b)'
      target_repo_owner:
        type: string
        required: true
        description: 'Target repository owner (e.g., ibm-granite)'
      target_repo_name_ext:
        type: string
        required: false
        default: '-GGUF'
        description: 'Target repository name extension (e.g., -GGUF)'
      exclude_quantizations:
        type: string
        required: false
        default: ''
        description: 'Comma-separated list of quantization names to exclude (case-insensitive substring match). Example: "Q4_K_M,Q5_K_S" skips any file whose name contains those quantizations.'
      skip_split_gguf:
        type: boolean
        required: false
        default: true
        description: 'Skip split (multi-shard) GGUF files. Default true — only single-file quantizations are pushed.'
      ext_log:
        type: string
        required: false
        default: '.log.txt'
        description: 'Log file extension'
      ext_response:
        type: string
        required: false
        default: '.response.txt'
        description: 'Response file extension'
      debug:
        type: boolean
        required: false
        default: false
        description: 'Enable debug mode'
      trace:
        type: boolean
        required: false
        default: false
        description: 'Enable trace mode'

env:
  DEBUG: ${{inputs.debug}}
  EXT_GGUF: .gguf

jobs:
  discover-gguf-files:
    runs-on: ubuntu-latest
    outputs:
      quantizations: ${{ steps.parse_files.outputs.quantizations }}
      file_count: ${{ steps.parse_files.outputs.file_count }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install -r ./requirements.txt
        pip list
    
    - name: Set environment variables
      run: |
        echo "REPO_ORG=$(dirname '${{ inputs.repo_id }}')" >> $GITHUB_ENV
        echo "REPO_NAME=$(basename '${{ inputs.repo_id }}')" >> $GITHUB_ENV
        echo "TARGET_REPO_ID=${{inputs.target_repo_owner}}/$(basename '${{ inputs.repo_id }}')${{inputs.target_repo_name_ext}}" >> $GITHUB_ENV
    
    - name: List and parse GGUF files
      id: parse_files
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        EXCLUDE_QUANTIZATIONS: ${{ inputs.exclude_quantizations }}
        SKIP_SPLIT_GGUF: ${{ inputs.skip_split_gguf }}
        QUANTIZATIONS_FILE: gguf-quantizations.json
      run: |
        set -euo pipefail

        echo "[INFO] Listing GGUF quantizations in repository: ${TARGET_REPO_ID}"

        args=("${TARGET_REPO_ID}" "${REPO_NAME}" "${HF_TOKEN}" "${QUANTIZATIONS_FILE}")
        if [[ -n "${EXCLUDE_QUANTIZATIONS}" ]]; then
          args+=(--exclude-quantizations "${EXCLUDE_QUANTIZATIONS}")
        fi
        if [[ "${SKIP_SPLIT_GGUF}" == "true" ]]; then
          args+=(--skip-split)
        fi

        python ./scripts/hf_repo_filter_gguf_quantizations_files.py "${args[@]}"

        echo "[INFO] Parsed quantizations:"
        echo "Quantization files found to push: "
        jq '.' "${QUANTIZATIONS_FILE}"

        file_count=$(jq 'length' "${QUANTIZATIONS_FILE}")
        echo "[INFO] Total GGUF quantizations to process: ${file_count}"

        echo "quantizations=$(jq -c '.' "${QUANTIZATIONS_FILE}")" >> "$GITHUB_OUTPUT"
        echo "file_count=${file_count}" >> "$GITHUB_OUTPUT"

    - name: Display discovered files
      run: |
        echo "=========================================="
        echo "GGUF Files Discovery Summary"
        echo "=========================================="
        echo "Repository: ${{ env.TARGET_REPO_ID }}"
        echo "Total GGUF files: ${{ steps.parse_files.outputs.file_count }}"
        echo "Files:"
        echo '${{ steps.parse_files.outputs.quantizations }}' | jq '.'

  push-model:
    needs: discover-gguf-files
    if: ${{ needs.discover-gguf-files.outputs.file_count > 0 && inputs.enable_dmf_push }}
    strategy:
      matrix:
        model: ${{ fromJson(needs.discover-gguf-files.outputs.quantizations) }}
      fail-fast: false
      max-parallel: 3
    uses: ./.github/workflows/reusable-push-models-to-dmf.yml
    with:
      enable_dmf_push: ${{ inputs.enable_dmf_push }}
      repo_id: ${{ inputs.repo_id }}
      quantization: ${{ matrix.model.quantization }}
      model_size: ${{ inputs.model_size }}
      target_repo_owner: ${{ inputs.target_repo_owner }}
      target_repo_name_ext: ${{ inputs.target_repo_name_ext }}
      ext_log: ${{ inputs.ext_log }}
      ext_response: ${{ inputs.ext_response }}
      debug: ${{ inputs.debug }}
      trace: ${{ inputs.trace }}
      is_split_gguf: ${{ matrix.model.is_split || false }}
    secrets:
      hf_token: ${{ secrets.HF_TOKEN }}
      IBM_DMF_TOKEN: ${{ secrets.IBM_DMF_TOKEN }}
      ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
      ARTIFACTORY_API_KEY: ${{ secrets.ARTIFACTORY_API_KEY }}

  summary:
    needs: [discover-gguf-files, push-model]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Display summary
      run: |
        echo "=========================================="
        echo "Workflow Execution Summary"
        echo "=========================================="
        echo "Repository: ${{ inputs.repo_id }}"
        echo "Target Repository: ${{ inputs.target_repo_owner }}/$(basename '${{ inputs.repo_id }}')${{ inputs.target_repo_name_ext }}"
        echo "Total GGUF files discovered: ${{ needs.discover-gguf-files.outputs.file_count }}"
        echo "DMF Push Enabled: ${{ inputs.enable_dmf_push }}"
        echo "Discovery Job Status: ${{ needs.discover-gguf-files.result }}"
        echo "Push Job Status: ${{ needs.push-model.result }}"
        echo "=========================================="

